    notes: |
      Read-only REST surface. All 60
      endpoints are GET-only, all use
      `enhancedApiHandler` with
      `auth: { required: true }` only
      (no `permissions` array), all
      return
      `{ success: true, result, message:
      "", error: null }`. Write
      operations (create / update /
      delete for vital signs, doctor
      notes, nurse notes,
      prescriptions, pharmacy
      requests, service requests,
      clinical documents) live on
      `OPDEmrService` / `IPDEmrService`
      but are reached via
      `next-safe-action` server
      actions invoked from RSC — they
      are NOT part of this
      documentation set.

      ## Architectural notes

      1. **Service reuse via
         constructor config.** The
         entire OPD / ED / Daycare
         sub-tree (54 of the 60
         routes) is powered by a
         single class `OPDEmrService`
         (in
         `src/app/(dashboard)/shared/emr/opd/service/opd-emr.service.ts`),
         constructed 9 different ways
         with different `moduleType`
         configs:
           - `opdEmrService` —
             `moduleType: "OPD"`.
           - `edEmrService` —
             `moduleType: "ED"`,
             `appointmentModule:
             ModuleEnum.EMERGENCY`,
             `includeEdProxyBillJoints:
             true`.
           - `daycareEmrService` —
             `moduleType: "DAYCARE"`.
           - `hdOpdEmrService` —
             `moduleType: "HD_OPD"`.
           - `hdEdEmrService` —
             `moduleType: "HD_ED"`.
           - `endoOpdEmrService` —
             `moduleType: "ENDO_OPD"`.
           - `endoEdEmrService` —
             `moduleType: "ENDO_ED"`.
           - `otOpdEmrService` —
             `moduleType: "OT_OPD"`.
           - `otEdEmrService` —
             `moduleType: "OT_ED"`.

         The IPD sub-tree (5 routes
         plus the clinical-document
         activity log) uses a
         separate class
         `IPDEmrService` (in
         `src/app/(dashboard)/shared/emr/ipd/service/ipd-emr.service.ts`),
         constructed 3 ways:
           - `ipdEmrService` —
             `moduleType: "HD"`.
           - `cathLabIpdEmrService` —
             `moduleType: "CATH_LAB"`.
           - `endoIpdEmrService` —
             `moduleType: "ENDO"`.

         The top-level
         `(emr)/emr/...` patient
         tabs (9 routes) use a third
         service, `PatientEmrService`
         (in
         `src/app/(dashboard)/shared/emr/services/patient-emr.service.ts`),
         which fans out to a single
         repository
         `PatientEmrRepository
         .getPatientEmrRawRecords`
         (etc.) to fetch raw records
         from each care setting, then
         merges + sorts + paginates
         them in JS.

      2. **No RBAC permissions
         declared** on any of the
         60 endpoints. All 60 use
         `auth: { required: true }`
         with no `permissions: []`
         array. EMR data is
         clinically sensitive (vital
         signs, doctor notes,
         prescriptions,
         investigations) so RBAC
         gating is worth confirming
         with the team.

      3. **Empty-on-missing-filter
         contract.** The 9
         `*/service-request` list
         endpoints (across opd / ed /
         daycare sub-trees) return
         `{ emrServiceRequests: [],
         totalCount: 0 }` when
         either `patientId` or
         `appointmentId` is missing
         from the query — **no
         400 / 404** is raised. This
         is a silent contract:
         clients must treat the
         empty result as "missing
         filter" rather than "no
         data". Worth surfacing in
         the OpenAPI description as
         an `x-runtime-note`.

      4. **Module-level
         moduleType enum on the
         OPD-EMR list** —
         `getOpdEmrSchema` does NOT
         expose a `moduleType` filter
         (the schema is just
         `baseQuerySchema.transform
         (transformPaginationSchema)`).
         The `moduleType` is encoded
         at the service level (each
         of the 9 services filters
         internally to a single
         `moduleType`). So clients
         cannot query "all OPD EMRs
         across all modules" — they
         must hit each of the 9
         sub-tree paths separately.

      5. **IPD-EMR `moduleType`
         filter is partial.** The
         IPD list schema
         (`getIpdEmrSchema`) accepts
         `moduleType: HD | ENDO | OT`
         as an optional query param,
         but NOT `CATH_LAB` (cathlab
         is exposed via the
         separate
         `/cathlab-ipd-emr` path).
         The `/ipd-emr/{id}` detail
         route also accepts
         `moduleType` as a query
         param (read via
         `_req.nextUrl.searchParams
         .get("moduleType")` and
         cast to the union type —
         a malformed value is passed
         through unchecked).

      6. **IPD detail `[id]` has an
         extra `moduleType` query
         param** that the OPD /
         ED / Daycare sub-trees do
         not expose. The cathlab and
         endo IPD sub-trees do NOT
         accept a `moduleType` query
         param on detail.

      7. **"empty on missing
         filter" is silent.** The
         9
         `*/service-request` lists
         never 4xx. The detail
         endpoints
         (`*/service-request/{id}`)
         DO throw a 404 with
         `AppError "Service request
         not found"` via
         `OPDEmrService
         .getEmrServiceRequestById`
         when the id is unknown.

      8. **The top-level
         `(emr)/emr/clinical-documents/{id}/activities`
         route imports
         `edEmrService`** — a
         misnomer. The
         `edEmrService` export is
         an `OPDEmrService` instance
         configured with
         `moduleType: "ED"`. The
         `getEmrClinicalDocumentActivities`
         method is module-agnostic,
         so the import name is
         effectively cosmetic. The
         actual data is the activity
         log of any
         `EmrClinicalDocument` row
         regardless of `moduleType`.

      9. **Decimal coercion in
         vital signs.** The
         `PatientEmrService
         .getPatientVitalSignsTabData`
         method maps the
         `Decimal` DB columns
         (`systolicBloodPressure`,
         `weight`, etc.) to JS
         `number` via `Number(item.
         systolicBloodPressure)`
         (a `Decimal.toNumber()`
         equivalent). This is fine
         for display but lossy for
         very precise values. The
         prescription tab takes the
         opposite approach —
         `decimalToString` keeps
         the dosage columns as
         `string | null`.

      10. **Service-request
          `moduleType` enum on the
          flattened response** is
          the full
          `ServiceCategoryModule`
          enum (LAB, XRAY, CT, MRI,
          ULTRASOUND, ECG, ECHO) —
          an OPD-EMR service request
          can be any of these.

      11. **Schema-side empty
          list on missing filter
          for service-request
          lists**: the 9
          `*/service-request`
          endpoints all use
          `defaultQuerySchema.and(
          z.object({
          appointmentId:
          z.string().optional(),
          patientId:
          z.string().optional() }))`
          — both extra fields are
          `.optional()`. The service
          method
          `OPDEmrService
          .getEmrServiceRequests`
          then guards with `if
          (!patientId ||
          !appointmentId) return {
          emrServiceRequests: [],
          totalCount: 0 }`.

      12. **The
          `defaultRepositoryContext
          .moduleType` on the IPD
          side is `"HD"`** — the
          `ipdEmrService` default
          config filters to HD. The
          `moduleType` query param
          on the list endpoint lets
          callers switch to ENDO or
          OT. There's no way to
          query "all IPD EMRs
          across modules" via a
          single call.

      13. **Pharmacy requests are
          OPD-only.** The
          `opd-emr/pharmacy-request*`
          paths have no siblings
          under ed-emr, daycare-emr,
          endo-opd-emr, hd-opd-emr,
          ot-opd-emr, etc. IPD uses
          a separate pharmacy-request
          surface
          (`/ipd-list/pharmacy-request*`).

