    notes: |
      30 procedures (24 GET paths + 4 main-procedure
      mutations on `/api/main-procedures`: GET /
      POST / PUT / DELETE — all declared on the
      same `route.ts` file and all wired through
      `enhancedApiHandler`).

      Key findings:

        1. **No RBAC on any of the 30 endpoints.**
           All use either `auth: { required: true }`
           (most) or legacy `apiHandler` /
           `apiHandler` + `verifyApiAuth()` /
           raw `GET` with manual session check.
           No `permissions` array declared
           anywhere. OPD billing data is
           clinically sensitive (full patient
           data, all bill line-items, member-card
           discounts, refund eligibility,
           pharmacy backfill) — RBAC gating may
           be appropriate.

        2. **4 different handler patterns** are
           used across the 27 route files:
             a. `enhancedApiHandler` with
                `auth: { required: true }` (most
                list / by-id endpoints).
             b. `apiHandler` + explicit
                `verifyApiAuth()` (1 route:
                `/opd-billings`).
             c. `apiHandler` without explicit
                `verifyApiAuth()` (5 routes:
                `/opd-billings/{id}`,
                `/opd-billings/{id}/details`,
                `/opd-billing-log/{id}`,
                `/opd-billing-pharmacy-sale`,
                `/proxybill-by-patientId/{id}`).
             d. **Raw `GET` + manual
                `AuthService.getSession()` check
                + `prisma.opdPackageBill.findMany`**
                (1 route:
                `/package-bills/room-types`).

        3. **The OPD module has 5 distinct
           response-envelope shapes**:
             a. Standard envelope
                `{ success, result, error: "",
                message: "" }` (most).
             b. Envelope with
                `error: null` / `error: nullable`
                instead of `error: ""` (the
                `opd-ot-request*` and
                `opd-refund-bills*` family).
             c. **Typo'd envelope** with
                `messag: ""` (no `e`)
                —
                `find-opd-billings` route.
             d. Envelope with `result: null` and
                no `totalCount` wrapper
                (log + raw
                `getOPDBillingPharmacySale`
                + by-id fallthroughs).
             e. **Non-standard raw envelope**
                `{ roomTypes: [...] }` for
                `/package-bills/room-types`.

        4. **`OpdBillingService.getById` is the
           most heavily decorated object in the
           entire OpenAPI surface.** The 6-stage
           decoration chain is:
             1. `getById` (raw `findById`).
             2. `applyCancellableServices`
                (sets
                `OPDBillingService[].cancellable`
                based on lab / imaging / proxy
                state — different rules for
                lab/imaging vs other services).
             3. `attachCancellableProcedures`
                (sets
                `opdBillingProcedures[].cancellable`
                based on proxy procedure-bill).
             4. `attachMemberData` (decorates
                services with
                `memberCardTypeService` /
                `memberCardServiceUsage`).
             5. `backFillPharmacyItemsSaleReturn`
                (recomputes `remainingQty`).
             6. `backFillProxyPharmacyItems`
                (attaches `cancelRecord` from
                the proxy-bill pharmacy sale).
           The un-decorated raw variant is
           exposed at
           `/api/opd-billings/{id}/details`.

        5. **`OpdBillingService` is wired
           manually in the constructor** with
           7 private fields
           (`opdBillingRepository`,
           `paymentMethodsRepository`,
           `imagingService`,
           `opdMemberCardService`,
           `servicesService`,
           `pharmacySaleService`,
           `opdProxyService`,
           `opdAppointmentService`) — no
           container / no DI.

        6. **`OpdRefundService` and
           `OpdPackageBillService` are the only
           OPD services that go through a
           `ServiceContainer`** —
           `OpdRefundServiceContainer` and
           `opdPackageBillServiceContainer`
           respectively. The other services
           (`OpdOTRequestService`, the
           `*Procedure` and `*ServicePackage`
           services) are constructed inline in
           the route file.

        7. **`OpdOTRequestService` is a
           singleton** (`export const
           opdOTRequestService = new
           OPDOTRequestService()`) — it has 3
           private fields: the OPD-OT repo, the
           appointment service, and the IPD-OT
           repo (used to share
           `generateMonthlyResetId` with the IPD
           path).

        8. **OT-request-id generation
           (`OTRID-YYYY-MM-NNNNNN`)** is
           delegated to the IPD-OT repository
           via `generateMonthlyResetId("OTRID",
           (date) =>
           ipdOTRequestRepository.findLastOTRequestIdForMonth(date, tx))`
           — the OPD service **reuses the IPD
           repo for id-generation** so the two
           share a single monthly counter.

        9. **`/api/opd-ot-request/{id}` returns
           `result: null` on miss** (no HTTP
           404). The by-id endpoint does NOT
           throw — callers must check `result
           != null`.

        10. **`/api/opd-ot-request/{id}` is
            decorated with the deep include
            tree** (patient with full demo,
            operationType, anesthesiaType,
            building, room with ward/floor/wardRoomType.roomType,
            referralDoctor with
            user+specialization, referralClinic,
            createdBy / updatedBy). The
            `OPDOTRequest` schema in the
            schemas file documents the
            top-level wrapper; the embedded
            `otrequest` field is the full
            `OtRequest` shape (cross-module
            stub — the OT module documents the
            full shape).

        11. **`/api/opd-emr-services-by-appointment`
            is the only OPD endpoint that uses
            the `Query<>` interface pattern**
            (the DDD contracts layer at
            `src/app/contracts/`). All other
            OPD endpoints go through a
            `*Service` class.

        12. **`/api/opd-emr-services-by-appointment`
            throws 400 with `"OPD EMR
            not found!"` when the
            (appointment, patient) pair has no
            `OPDEMR` row** — note this is
            `AppError(..., 400)`, not 404, which
            is inconsistent with the rest of the
            project (most by-id endpoints return
            200 + `result: null`).

        13. **`/api/opd-refund-bills/find-opd-billings`
            short-circuits when no
            `query.search`** — returns
            `{ opdBillings: [], totalCount: 0 }`
            without hitting the database. The
            intent is to require the user to
            type a search term before any work
            happens.

        14. **`/api/opd-refund-bills/find-opd-billings/{id}`
            filters the OPD bill to only
            still-refundable items.** The
            filter is `!isCancel &&
            cancellable && !alreadyInRefundBill`
            applied to services, procedures,
            and pharmacy items. Items that have
            already been refunded (in any
            `OpdRefundBill` linked to this
            `OPDBilling`) are excluded.

        15. **`/api/package-bills/room-types` is
            the most divergent route in the
            OPD module.** Manual session
            check, raw `prisma` call, no
            `*Handler` wrapper, no service
            layer, returns a non-standard
            envelope `{ roomTypes: [...] }`, and
            a 400 on missing `patientId` with a
            custom error shape `{ error: "..." }`.
            Should be refactored to use the
            `apiHandler` / `enhancedApiHandler`
            + service pattern.

        16. **`/api/package-bills/service-packages`
            force-overrides `status` to
            `ACTIVE`** when missing
            (`status: query.status ?? "ACTIVE"`)
            — different from the
            `/api/service-package` route which
            respects the `status` filter.

        17. **`/api/proxybill-by-patientId/{id}`
            has a leftover
            `console.log("Patient Id route", id)`
            in the handler.** Should be removed
            in a separate cleanup.

        18. **`OpdBillingRepository.getOPDBillingPharmacySale`
            is a stub** — the `include` block
            is commented out, so the
            `OPDBillingPharmacySale` rows
            returned have **no nested data**
            (no `OPDBilling`, no `pharmacySale`,
            no `opdBillingPharmacySaleItems`).
            The route is used for the
            link-table admin screen and the
            slim shape is intentional, but the
            call-site cast (`return logs as
            unknown as OPDBillingPharmacySale[]`)
            hides the fact that the rows are
            empty.

        19. **`OpdBillingService.updateOPDBillingPaymentStatus`
            has a payment-status-handler
            pattern** — `PAID` /
            `UNPAID` / `CANCEL` are each
            handled by a separate state handler
            (`OpdPaidHandler`,
            `OpdUnpaidStateHandler`,
            `OpdCancelStateHandler`). The
            cancel handler rolls back member-card
            usage counters via
            `opdMemberCardService.updateUsageWhenPaymentStatusCancel`
            inside the same `prisma.$transaction`
            as the billing update. This is
            exposed only via server actions,
            not the REST surface.

        20. **The `OPDBilling` schema is the
            largest single entity documented
            in the project so far** (~60
            top-level fields when decorated).
            The 6-stage decoration chain means
            a single response can be several
            KB. The by-id routes
            (`/opd-billings/{id}`,
            `/opd-billings/{id}/details`) both
            return this shape.

