    notes: |
      13 read endpoints, no mutations on the REST
      surface (write operations are server-action only
      — not in scope here).

      Key findings:

        1. **Manifest had 12 routes but the file tree
           has 13.** The file tree includes one
           `services-for-hd` route that was not
           previously listed. Documented and updated
           `routes_count` to 13.

        2. **No RBAC on any of the 13 endpoints.** All
           use `auth: { required: true }` with no
           `permissions` array. HD data is clinically
           sensitive (vital signs, dialysis access
           sides, serology) — RBAC gating may be
           appropriate.

        3. **`HdContainerService` is an 8-dependency
           composition root.** It wires `HdService` +
           `HDRequestService` + 3 phlebotomy /
           proxy-bill / pharmacy sale services. The
           container re-exports 3 EMR service
           singletons (`opdEmrService`, `edEmrService`,
           `ipdEmrService` — all aliases for the
           HD-specific OPD-EMR / ED-EMR / IPD-EMR
           instances) but those are not consumed at
           the route layer.

        4. **`HdService` extends
           `ProxyBillTemplateService`** with
           `department = DepartmentEnum.HD` and
           `pharmacyBillInvoicePrefix = "HD"`. So IPD
           daily bills generated from HD bills get
           the `HD/...` prefix.

        5. **`createHdProxyBill` is more permissive
           than the endo equivalent.** The OPD branch
           (in `resolveHDRequestForOPDProxyBill`)
           **does NOT throw when no `APPROVED` HD
           request is found for the appointment** —
           the corresponding throw is commented out
           (see `hd.service.ts:141-147`). This means
           HD-OPD bills can be created without an
           underlying HD request, whereas
           Endo/CathLab/OT-OPD enforce one.

        6. **`deleteHdProxyBill` throws 400 when the
           linked bill is `PAID`** ("Cannot delete HD
           billing lines because payment is already
           completed"). The `updateHdProxyBill`
           counterpart has the same guard commented
           out (see `hd.service.ts:198-203`).

        7. **Bug carried over from the Endo
           template.** The repository method
           `HdRepository.deleteProxyBillRequestLink`
           hard-codes `requestType: "ENDO"` in its
           `where` clause (see
           `hd.repository.ts:619`). For HD bills this
           will fail to find the link at delete time
           (the HD link has `requestType: "HD"`) —
           the `super.deleteProxyBill` call will
           succeed, but the unlinking will not.

        8. **`/hd-infection-screening` is the only
           infection-screening endpoint in the
           project that accepts EITHER `patientId` or
           `hdRequestId`** (enforced by `.refine` —
           "Provide patientId or hdRequestId"). The
           other modules' infection-screening
           endpoints only accept a request id. The
           route branches:
             - `hdRequestId` →
               `HdService.getInfectionScreening` →
               `HDRequestService.getInfectionScreening`
               (finds by id, no status filter).
             - `patientId` →
               `HdService.getInfectionScreeningForBillingPatient`
               → finds latest `APPROVED` for patient.

        9. **No `OPDEMR` exclusion on
           `getAppointmentForHd`.** The repo filter
           is `opdEmr: { none: {} }` (i.e. "no OPD
           EMR for this appointment"), but there is
           no equivalent `hdEmr` / `ipdEmr` filter.
           The result may include appointments that
           already have an HD EMR.

        10. **`appointmentType.modules has HD` filter
            is commented out** in
            `getAppointmentForHd` (see
            `hd.repository.ts:467-471` — "TODO:
            confirm with product team"). So the
            result today can include non-HD
            appointment types. The `module` filter is
            still active in `getHdAppointments` and
            `getHdConfirmedPatients`, but not in
            `getAppointmentForHd`.

        11. **`getHdAppointments` runs a separate
            `referral.findMany`** to attach a
            `referral` row to each appointment. The
            `referral` is a top-level field on the
            appointment (not inside a `Referral[]`
            array), attached by id-matching.

        12. **`getHdConfirmedPatients` returns
            `Appointment` rows, not `Patient` rows.**
            Each "patient" item is an appointment with
            the related `patient`, `ProxyBill[]`, and
            `appointmentType`. Counter to the
            `getPatientForHd` response which returns
            actual `Patient` rows.

        13. **Strict `HDRequest.status` state machine
            is enforced server-side.** From
            `HDRequestService.updateHDRequestStatus`:
              - `REQUESTED → APPROVED | CANCELLED` only.
              - `APPROVED → CANCELLED` only (NOT
                `REQUESTED`).
              - `CANCELLED` and `COMPLETED` are
                terminal — no transitions out.
            The matching `Appointment.status` is
            auto-synced via `hdRequestStatusMap`
            (`APPROVED ↔ CONFIRMED`, etc.) when the
            source department is `OPD`/`ED`.

        14. **Module auto-rewrite OPD → ED for
            emergency patients** (same as Endo):
            `HDRequestService.createHDRequest` sets
            `payload.sourceDepartment =
            HDRequestSourceDepartment.ED` when
            `patient.patientType ===
            PatientType.EMERGENCY`.

        15. **`HDRequest.deleteHDRequest` is a
            server-action only path** (not exposed
            via REST). It enforces:
              - `status: REQUESTED` only,
              - `hasServicesAdded: false`,
              - only requester (or HD MO) can delete
                (else 403).
            Throws `AppError` 400/403/404 as
            appropriate.

        16. **`HDRequest.opdRequestId` enables an
            OPD→IPD transfer flow** like Endo, but
            with a simpler hard-delete: the create
            transaction just `tx.hDRequest.delete(...)`s
            the prior request (no junction
            `deleteMany` chain, because HD doesn't
            have junction tables). Activity log:
            "Transferred OPD HD Request to IPD".

