shared:
  - id: error_envelope
    inferred: true
    documented: true
    file: docs/schemas/common.yaml
    description: |
      tRPC error envelope (src/lib/trpc/trpc.ts `errorFormatter`):
      `{ signature: "AppError" | "TRPCError" | "UnknownError", message, httpStatus, code }`.
      REST routes also surface AppError; shape varies (NextResponse.json with status).
      Formalised in docs/schemas/common.yaml#/ErrorEnvelope.
  - id: pagination
    inferred: true
    documented: true
    file: docs/schemas/common.yaml
    description: |
      tRPC: `defaultQuerySchema` in `src/utils/pagination-utils.ts:49-57` —
      `{ page, limit, search?, start?, end? }` transformed to
      `{ page, limit, offset, ... }`. Documented as `PaginationQuery` in
      `docs/schemas/common.yaml`. Used by every list-style tRPC procedure.

      REST list endpoints appear to follow a similar pattern
      (`?page=&pageSize=&search=&...`) but the exact shape varies per
      route. To be confirmed per REST module as it is documented.
  - id: session
    inferred: true
    description: |
      Cookie-based session (`sid`, httpOnly, lax). Stored in Prisma `Session` model
      with expiry handled by AuthService. Argon2 password hashing.
  - id: middleware
    inferred: false
    note: No root `middleware.ts` exists. Auth is enforced inside each route/procedure
      via `verifyAuth()` (REST) or `authProcedure`/`authorizeProcedure` (tRPC).
  - id: server-actions
    inferred: true
    description: |
      Many writes go through `next-safe-action` server actions
      (src/lib/safe-action.ts) invoked from RSC. They are NOT mounted as HTTP
      routes and are out of scope for OpenAPI generation.

# -----------------------------------------------------------------------------
# Mixed-style notes
# -----------------------------------------------------------------------------
trpc_note: |
  This project uses BOTH REST and tRPC. Both must be documented.

  REST (437 routes) is mounted directly under /api/**. The natural module
  boundary is the route group folder under src/app/api/(group)/. Each group
  is one module in this manifest.

  tRPC (28 routers) is mounted at /api/trpc/<router>.<procedure>. The
  catch-all is at src/app/api/trpc/[trpc]/route.ts. Each file in
  src/lib/trpc/routers/ is one module, prefixed with `trpc-` to keep ids
  unique (e.g. `trpc-auth` is the tRPC auth router; the REST auth surface
  lives in the `common` module under `(common)/auth/**`).

  Per-procedure security in tRPC:
    - publicProcedure        → no security
    - authProcedure          → SessionAuth required
    - authorizeProcedure(a,s)→ SessionAuth + x-required-permission: { action, subject }
      (action ∈ Action enum, subject ∈ Subject enum — see roles router)

  Module ordering suggestion (smallest first to validate patterns):
    1. system            (2 routes, public)
    2. trpc-auth         (login/session flows)
    3. trpc-roles        (defines Action/Subject enums other routers depend on)
    4. trpc-departments, trpc-stores, trpc-categories, trpc-sub-categories,
       trpc-units, trpc-payment-methods, trpc-default-setting,
       trpc-hospital-info, trpc-suppliers, trpc-store-mapping
       (small lookup tables)
    5. trpc-users, trpc-batch, trpc-items, trpc-selling-price-groups
    6. appointment       (REST — small, illustrates patterns)
    7. membership, daycare, ed, cathlab, endo, hd, ot (REST)
    8. opd, imaging, lab, pharmacy (REST)
    9. ipd, emr, common  (REST — largest)
   10. security, root    (final phases)
