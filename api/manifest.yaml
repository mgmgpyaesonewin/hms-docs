      - GET /api/member-card-list/{id}
      - GET /api/member-card-by-patient
      - GET /api/member-card/usage-count
      - GET /api/member-card/room-usage-count
      - GET /api/member-list
    notes: |
      8 GET-only endpoints. The module has no
      mutations on the REST surface — create /
      edit / delete of `MemberCard` and
      `MemberCardType` happen via server actions
      under `member-card-list/features/*.actions.ts`
      (not in scope for the OpenAPI REST
      surface).

      The original manifest listed a
      `src/app/api/(membership)/member-card/route.ts`
      file that does not exist — only the two
      sub-routes (`usage-count`, `room-usage-count`)
      are real.

      Key findings:

        1. **No RBAC on any of the 8 endpoints.**
           All routes use either
           `apiHandler` + `verifyApiAuth()`,
           `enhancedApiHandler` with
           `auth: { required: true }`, or a raw
           `GET` function with no auth check
           beyond the `enhancedApiHandler`
           wrapper. The membership module is
           clinically sensitive (patient
           identifiers, member-card pricing,
           service usage) — RBAC gating may be
           appropriate.

        2. **3 different response-envelope
           patterns** are used across the 8
           routes:
             a. `apiHandler` + `verifyApiAuth()`
                (5 routes) — returns
                `{ success: true, result, error: "", message: "" }`.
            b. `apiHandler` (no explicit
                `verifyApiAuth()`, 2 routes) —
                same envelope, but auth relies on
                the handler internals (not the
                explicit `verifyApiAuth` call).
             c. `enhancedApiHandler` (1 route,
                `/member-card-by-patient`) —
                same envelope, declared via the
                handler config
                (`auth: { required: true }`).
             d. **Raw `GET` + `new PrismaClient()`**
                (2 routes,
                `/member-card/usage-count`,
                `/member-card/room-usage-count`)
                — returns
                `{ usageCount, lastUsedAt, previousUsedAt }`
                directly (no `success` / `result` /
                `error` / `message` wrapper) and a
                400 with
                `{ message: "Invalid query", issues }`
                on validation failure.
           The membership module is the only
           place in the codebase that uses the
           `error: ""` (string) variant instead of
           `error: null` — this is an
           inconsistency the team may want to
           normalise.

        3. **2 routes instantiate a fresh
           `PrismaClient()` per request.**
           `/member-card/usage-count` and
           `/member-card/room-usage-count` both
           do `import { PrismaClient } from
           "@prisma/client"; const prisma = new
           PrismaClient();` inside the route
           file — bypassing the shared
           `src/lib/db.ts` singleton. The shared
           singleton attaches itself to
           `globalThis` in dev to survive HMR
           and has a 20s transaction timeout;
           this anti-pattern loses both. The
           team should refactor these two routes
           to `import { prisma } from "@/lib/db"`.

        4. **The list / detail endpoints
           redundantly declare filters that the
           repository never applies.** Each of
           `getMemberCardTypeSchema`,
           `getMemberCardSchema`,
           `getMemberListSchema` accepts `id?`
           and `status?` but the corresponding
           repository methods only honour
           `memberCardTypeId`, `search`,
           `start` / `end`, and pagination.
           Captured as `x-implementation-note` on
           the affected operations.

        5. **`MemberCardType` list / detail
           differ on `hasValidActiveMemberCard`.**
           The list endpoint projects
           `hasValidActiveMemberCard` per row
           (via the `_count` member-card join
           with the
           `validFrom ≤ now ≤ validTo` filter).
           The detail endpoint does NOT — the
           field is omitted. Use the list
           endpoint when you need the
           "can-this-be-edited" check; the
           detail endpoint omits it.

        6. **`MemberCard` / `MemberCardType`
           detail responses do not throw 404.**
           Both `getMemberCardById` and
           `getMemberCardTypeById` return
           `result: null` on miss with HTTP 200.
           The `error: ""` (string) is also
           returned instead of `error: null`.
           Callers must check `result != null`.

        7. **`MemberCard.memberCardId` is
           unique across the table**
           (`@unique` on the Prisma model). The
           service enforces this case-insensitively
           via
           `memberCardRepository.existsByNameExceptId`
           (used on update) and
           `getMemberCardByName` (used on create).
           Update returns 409 "Member Card name
           already exists" on collision; create
           returns 409 "This Member Card ID
           already exists.".

        8. **`/member-card/usage-count` and
           `/member-card/room-usage-count` are
           2 distinct usage-counter
           tables.** The first reads
           `PatientMemberCardServiceUsage` (per
           service, keyed by
           `memberCardTypeServiceId`); the second
           reads
           `PatientMemberCardTypeRoomChargeUsage`
           (per card-type, keyed by
           `memberCardTypeId`). They are NOT
           interchangeable — the first is for
           service-discount counts, the second
           for room-charge discount counts.

        9. **Member-card-type edit / delete is
           blocked when ≥ 1 active valid card
           exists.** `MemberCardTypeService`
           checks
           `hasValidActiveMemberCard(typeId)`
           before allowing edit or delete. The
           "active valid" filter is the same as
           the list endpoint's
           `hasValidActiveMemberCard` check
           (`isActive: true` AND
           `validFrom ≤ now ≤ validTo`). The
           block message is shared via
           `usedMemberCardTypeBlockMessage`.

        10. **Typo in repository method name.**
            `MemberCardRepository.getMemeberCardWithPatiendId`
            (sic — both "Memeber" and "Patiend"
            are misspelled). Called from
            `MemberCardService.getMemberCardWithPatientId`.

        11. **Manifest drift.** The original
            `shared_schemas: [MemberCard, MemberCardType, Member]`
            was a placeholder. `Member` is
            actually `MemberList` in the
            codebase — `Member` is the
            colloquial name; the Prisma model
            is `MemberList`. The new
            `shared_schemas` list reflects the
            actual exposed shapes.

