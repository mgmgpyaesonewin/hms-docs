      # Supporting file shared with submodule-appointment:
      - src/lib/dir-utils.ts
    shared_schemas: [ModuleCheckResponse]
    procedures:
      - GET /api/submodules/opd/module-check
    notes: |
      Sibling of `submodule-appointment` — same handler shape,
      directory and env flag swapped. Single public probe for the
      private OPD submodule.

      Two checks must pass for a 200:
        1. `NEXT_PUBLIC_OPD_MODULE_ENABLED !== "false"`.
        2. The filesystem directory
           `<cwd>/src/app/(dashboard)/opd` is non-empty
           (recursively walked via `readDirRecursive` and checked
           with `hasEmptyDir` from `src/lib/dir-utils.ts`).

      On any failure returns HTTP 404 with a
      `{ success: false, result: null, message }` envelope. Same
      status-code semantics as the appointment probe — 404 is
      used for every failure mode (not just resource-not-found).

      All security/operational findings mirror `submodule-appointment`:
      no auth, sync filesystem I/O on the request thread, loose
      env flag check, human-readable English `message` field.

  - id: appointment
    kind: rest
    status: documented
    routes_count: 7
    files:
      - src/app/api/(appointment)/appointments/route.ts
      - src/app/api/(appointment)/appointments/[id]/route.ts
      - src/app/api/(appointment)/appointments/upcoming/route.ts
      - src/app/api/(appointment)/appointment-type/route.ts
      - src/app/api/(appointment)/doctor-time-slot/route.ts
      - src/app/api/(appointment)/doctor-time-slot/[id]/route.ts
      - src/app/api/(appointment)/doctor-time-slot/booking-slots/route.ts
      # Supporting files discovered while documenting this module:
      - src/app/(dashboard)/shared/appointment/schemas/appointment/get-appointments-schema.ts
      - src/app/(dashboard)/shared/appointment/schemas/appointment/get-upcoming-appointments-schema.ts
      - src/app/(dashboard)/shared/appointment/schemas/doctor-time-slot/get-doctor-time-slot.schema.ts
      - src/app/(dashboard)/shared/appointment/schemas/doctor-time-slot/get-timeslots-for-booking.schema.ts
      - src/app/(dashboard)/shared/appointment/services/appointment.service.ts
      - src/app/(dashboard)/shared/appointment/services/appointment-type.service.ts
      - src/app/(dashboard)/shared/appointment/services/doctor-time-slot.service.ts
      - src/app/(dashboard)/shared/appointment/repositories/appointment.repository.ts
      - src/app/(dashboard)/shared/appointment/repositories/appointment-type.repository.ts
      - src/app/(dashboard)/shared/appointment/repositories/doctor-time-slot.repository.ts
      - src/app/(dashboard)/shared/appointment/types/appointment.types.ts
      - src/app/(dashboard)/shared/appointment/types/appointment-type.types.ts
      - src/app/(dashboard)/shared/appointment/types/doctor-time-slot.types.ts
      - src/utils/api-handler.ts
    shared_schemas: [Appointment, AppointmentType, DoctorTimeSlot, TimeslotForBooking, ScheduleInput, TimeSlot]
    procedures:
      - GET /api/appointments
      - GET /api/appointments/upcoming
      - GET /api/appointments/{id}
      - GET /api/appointment-type
      - GET /api/doctor-time-slot
      - GET /api/doctor-time-slot/{id}
      - GET /api/doctor-time-slot/booking-slots
    notes: |
      Read-only REST surface. Write operations (book / edit /
      status) live on the service but are reached via server
      actions / tRPC — they are NOT part of this documentation
      set.

      Key findings:
        1. **No RBAC permissions declared** on any of the seven
           endpoints. All use `auth: { required: true }` with no
           `permissions` array. Appointment data includes
           patient PII and doctor info, so RBAC gating may be
           appropriate. Worth confirming with the team.
        2. **Two path segments are misnamed**:
             - `/api/appointments/{id}` takes a **patient id**,
               not an appointment id. Handler calls
               `getAppointmentsByPatientId(id)`.
             - `/api/doctor-time-slot/{id}` takes a **doctor
               id**, not a schedule id. The repo uses
               `prisma.doctor.findUnique`, not a schedule
               lookup.
        3. **Inconsistent field naming across repositories**:
             - `appointment-types` returns `count` (not
               `totalCount`).
             - `appointments` and `doctor-time-slot` return
               `totalCount`.
             - `doctor-time-slot` `totalCount` is a
               **distinct** doctor count (from
               `groupBy({ by: ["doctorId"] })`), not a row
               count.
        4. **TS type / runtime mismatch on
           `Appointment.appointmentType.modules`**: the TS type
           declares the projection as
           `Pick<AppointmentType, "id"|"name"|"createdAt"|"updatedAt"|"modules">`
           but the Prisma `include` selects only
           `id`, `name`, `createdAt`, `updatedAt` (no
           `modules`).
        5. **`getAppointmentsByPatientId` repo method has no
           explicit return-type annotation** — clients cannot
           rely on the response shape from TypeScript alone.
        6. **`flattenDoctorSpecialization` runs after the
           Prisma include** selects the `doctor.specialization`
           relation. The TS type's
           `Appointment.doctor.specialization: string` is the
           post-flattening contract; the raw Prisma row is a
           relation object.
        7. **Three different "extra" envelope field shapes**
           are used across the seven endpoints — `{ success,
           result, message }`, `{ success, result, message,
           error: null }`, and `{ success, result, message,
           error: "" }`. The error field is empty/null on
           success; only `apiHandler` populates it on failure.
        8. **`getTimeslotsForBooking`** requires both
           `doctorId` and `date` as query params — the service
           throws 400 if either is missing, but the Zod schema
           has them as `.optional()`, so the 400 is from the
           service, not from Zod. `getTimeslotsForBooking` also
           throws 404 if the doctor doesn't exist.

