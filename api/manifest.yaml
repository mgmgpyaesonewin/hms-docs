    notes: |
      Read-only REST surface. All 7 endpoints
      are GET-only, all use
      `enhancedApiHandler` with
      `auth: { required: true }` only — **no
      RBAC permissions declared** on any
      endpoint. All 7 return
      `{ success: true, result, message: "",
      error: null }`.

      Architectural note: the daycare bill is
      **not** a separate `DaycareBill` model.
      It's a `ProxyBill` row with
      `department = DepartmentEnum.DAYCARE`.
      The `DayCareService` extends
      `ProxyBillTemplateService` and inherits
      `getProxyBillList` / `getProxyBillById`
      / `getProxyBillActivites` from the
      proxy-bill parent. The 4 daycare-specific
      overrides are `getDayCareAppointment`,
      `getDayCareConfirmedPatients`,
      `getPatientForDaycare`,
      `getAppointmentForDaycare`. The
      `DaycareContainerService` wires up the
      daycare repository, the proxy-bill
      repository, the stock service, the
      pharmacy-sale service, the patient
      repository, and the IPD-daily-bill
      service — a heavy DI graph shared
      across daycare / ED / cathlab / ot /
      endo / hd / opd "proxy bill" use cases.

      Key findings:
        1. **No RBAC permissions declared**
           on any of the 7 endpoints. PII
           (patient names, phone numbers,
           nrcNo) is exposed freely.
        2. **Schema-typo in
           `getDayCareConfirmedPatientSchema`**
           — the schema is just
           `z.object({}).merge(baseQuerySchema)`,
           so there's **no status filter**
           exposed despite the endpoint name
           suggesting one. The "confirmed"
           filter is hard-coded in the
           repository.
        3. **`getProxyBillList` schema
           defaults `departmentType = ED`** —
           a copy-paste from the ED
           proxy-bill list. The
           `DayCareService.department =
           DAYCARE` field overrides at the
           repository level, but the Zod
           default is misleading.
        4. **Repository method name typo**:
           `ProxyBillRepository.getProxyBillActivites`
           (missing 'y' — should be
           "Activities"). The route path uses
           the correct spelling
           (`/api/daycare/{id}/activities`).
        5. **`patientGroup` filter on
           `/daycare/list` is bare
           `z.string()`** — inconsistent
           with the OPD list which uses
           `nativeEnum(patientGroup)`.
        6. **Daycare bills share the
           `createProxyBillSchema` rules** —
           at least one of
           `serviceBill.services`,
           `teamFees`, `servicePackageBill`,
           `pharmacyBill`, `procedureBill`
           must be present. If
           `departmentType = OT`,
           `mainProcedureId` is required.
        7. **Heavy PII exposure** on
           `/api/patients-for-daycare` —
           reuses the OPD patient list
           schema (name, phone, nrcNo,
           township, region, etc.).
        8. **PII exposure on the appointment
           list** — full appointment rows
           with patient identifiers,
           doctor names, and timestamps.

