  - id: trpc-suppliers
    kind: trpc
    status: documented
    routes_count: 6
    files:
      - src/lib/trpc/routers/suppliers.ts
      # Supporting files discovered while documenting this module:
      - src/app/(dashboard)/common/set-up/suppliers/features/schemas/create-supplier-schema.ts
      - src/app/(dashboard)/common/set-up/suppliers/features/schemas/update-supplier-schema.ts
      - src/app/(dashboard)/common/set-up/suppliers/features/schemas/query-supplier-schema.ts
      - src/app/(dashboard)/common/set-up/suppliers/features/schemas/validate-id-schema.ts
      - src/app/(dashboard)/common/set-up/suppliers/features/supplier-service.ts
      - src/app/(dashboard)/common/set-up/suppliers/features/supplier-repository.ts
      - src/app/(dashboard)/common/set-up/suppliers/features/supplier-errors.ts
      - src/app/(dashboard)/common/set-up/suppliers/features/types/index.ts
    shared_schemas:
      - Supplier
      - ContactPerson
      - PaymentInfo
      - ContactPersonInput
      - PaymentInfoInput
      - CreateSupplierInput
      - UpdateSupplierInput
      - DeleteSupplierInput
      - SupplierQueryInput
      - GetSuppliersResponse
      - GetTotalSuppliersCountResponse
    procedures:
      - suppliers.createSupplier
      - suppliers.getSuppliers
      - suppliers.getTotalSuppliersCount
      - suppliers.getSupplierById
      - suppliers.updateSupplierById
      - suppliers.deleteSupplierById
    notes: |
      CRUD over the `Supplier` model. Six procedures; five use
      `authProcedure`, `deleteSupplierById` uses
      `verifyPasswordProcedure`. **None** use `authorizeProcedure` —
      any authenticated user can manage suppliers. Suppliers are
      upstream of GRN, purchase orders, and items, so this is a
      privileged surface — worth gating behind a
      `manage_suppliers` action subject.

      Key findings:
        1. **`supplierId` is a human-friendly code** generated
           client-side by `generateCustomId("SID", lastSupplier?.supplierId)`
           (e.g. `SID00001`, `SID00002`, ...). Monotonic with the
           most recent supplier. The `supplierId` column has a
           `@unique` constraint in Prisma, but uniqueness is
           enforced at the service layer (not the DB) — if two
           creates race, the second could theoretically land on the
           same code before Prisma picks it up.
        2. **`getSupplierById` returns `null` on miss** — the
           service calls `prisma.supplier.findUnique(...)` directly
           with no `throw if null`. Callers must check the result
           for `null`.
        3. **Full-replacement pattern on update** for child
           tables. The repository's `updateSupplierById` runs a
           5-step `prisma.$transaction`:
             1. `deleteMany` on `SupplierContactPerson`.
             2. `createMany` with the new contact persons.
             3. `deleteMany` on `SupplierPaymentInfo`.
             4. `createMany` with the new payment infos.
             5. `update` the parent `Supplier` row.
           **On conflict the entire transaction rolls back** —
           the contact-person / payment-info changes are not
           partially applied.
        4. **Mutation responses are message-only** —
           `createSupplier`, `updateSupplierById`, and
           `deleteSupplierById` all return
           `{ message: "..." }` and do NOT return the affected
           row. This differs from `stores.updateStore` (returns
           `StoreBare`) and `departments.updateDepartment` (returns
           `DepartmentBare`). Callers needing the row should
           re-fetch via `getSupplierById`.
        5. **`status` is a boolean on the wire, an enum in
           storage.** The service translates:
             - `status: true`  → `supplierStatus.ACTIVE`.
             - `status: false` → `supplierStatus.INACTIVE`.
           So the wire schema (`CreateSupplierInput.status`) is
           `boolean`, but the response shape (`Supplier.status`)
           is the enum string. **The inverse encoding is a foot-gun
           for clients** — the storage form has 2 values but the
           wire form is `true` / `false`.
        6. **`paymentInfos` empty-row filter**: the Zod schema
           applies a `.transform` that drops entries where every
           field is `null`/empty (i.e. an "empty row" the user
           might have left in the form). This is a UX-friendly
           shape on the wire but means a client cannot
           programmatically send an empty array to mean "no
           payment infos" — the transform normalises both.
        7. **`bankId` is commented out in two places** —
             - The Zod schema
               (`create-supplier-schema.ts:26` /
               `update-supplier-schema.ts:26`).
             - The repository's `select` on `getSupplierById`
               (`supplier-repository.ts:108-113`).
           The `SupplierPaymentInfo.bankId` Prisma column exists,
           but the wire shape doesn't surface it and the read
           doesn't include the bank join. Looks like an
           in-progress feature.
        8. **Typo in `PaymentFrequency` enum** — the value is
           `QUATERLY` (one A), not `QUARTERLY`. Preserved verbatim
           from
           `src/app/(dashboard)/common/set-up/suppliers/features/types/index.ts:18`.
           Renaming would be a breaking change for any persisted
           value.
        9. **Same input-schema-override bug** as
           `auth.resetPassword` / `departments.deleteDepartment` /
           `stores.deleteStore` — the `verifyPasswordProcedure`
           base schema (requiring `verifyPassword`) is overridden
           by `.input(validateIdSchema)` (just `{ id }`), so the
           middleware reads `undefined` at runtime.
       10. **Source filename typo** — `supplier-repository.ts` is
           missing the `s` in "repository" (`reposi t ory`). Same
           misspelling in the import statement on
           `suppliers.ts:4`.
       11. **`revalidatePath("set-up/suppliers")` is called with
           a non-`/` prefix** — other routers in this folder use
           `revalidatePath("/set-up/...")`. Both work in Next.js
           (the leading slash is optional for plain path strings)
           but the inconsistency is worth flagging.
       12. **Module-level singleton service**: the feature folder
           exports `supplierService = new SupplierService(new
           SupplierRepository(prisma))` at module scope
           (`supplier-service.ts:148-150`). The router does not
           import this singleton — it instantiates a fresh
           `SupplierService` on every call. The singleton is
           exported but unused (presumably for future use).

