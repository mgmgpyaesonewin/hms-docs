    notes: |
      14 procedures (13 GET routes + 1 POST). The
      `OTContainerService` is a 16-dep composition
      root (12 private + 3 public EMR service
      singletons + 1 `otService` getter) wiring
      `OTService` ← `OTRepository` +
      `ProxyBillRepository` + `ProxyBillStockService`
      + `IPDDailyBillService` +
      `ProxyBillIPDMembershipService` +
      `IPDOTRequestRepository` + `IPDOTRequestService`
      + 9 more (stock, pharmacy sale, patient repo,
      EMR service singletons).

      Key findings:

        1. **No RBAC on any of the 14 endpoints.**
           All use `auth: { required: true }` with
           no `permissions` array. OT data is
           clinically sensitive (vital signs,
           serology, surgical team, infection
           screening, IPD room) — RBAC gating may
           be appropriate.

        2. **`OTService` extends
           `ProxyBillTemplateService`** with
           `department = DepartmentEnum.OT` and
           `pharmacyBillInvoicePrefix = "OT"`. So
           IPD daily bills generated from OT bills
           get the `OT-MM-YY-NNNNNN` prefix. The
           `createOTProxyBill` flow chains:
             - resolve OT request
               (`resolveOTRequestForOPDProxyBill`
               if OPD/ED, requires `appointmentId`;
               `resolveOTRequestForIPDProxyBill` if
               IPD, requires `otRequestId` +
               `admissionId`),
             - call `super.createProxyBill(...)`,
             - create `ProxyBillRequestLink`
               (`requestType: "OT"`),
             - `markOTRequestAsBilled` (sets
               `hasServicesAdded: true`; for IPD
               also sets `status: COMPLETED`).

        3. **`mainProcedureId` is required at OT
           proxy-bill create time.** Enforced by
           `createProxyBillSchema.superRefine` when
           `departmentType === DepartmentEnum.OT`
           (the `endoRequestId` / `hdRequestId`
           cross-department fields are NOT
           validated for presence — they may be
           present but unused for OT). The
           `proxyMainProcedure` sidecar table
           stores the link.

        4. **Two on-miss semantics for OT request
           by-id routes.** `/api/ipd-ot-requests/{id}`
           returns
           `success: false, result: null, message: "OT request not found"`
           with HTTP 200 (the route does NOT throw
           404). `/api/ot-requests/{id}` is the slim
           label projection and returns
           `result: null` on miss (also HTTP 200,
           `success: true`).

        5. **`OTRequest` has 6 `String[]` columns
           for staff** — `surgeonId`, `anesthetistId`,
           `assistantDoctorId`, `assistantNurseId`
           (arrays of doctor/user ids). The flat
           `OTRequestList` validator does NOT
           materialise these. The by-id route
           (`/ipd-ot-requests/{id}`) materialises
           them via `findByIdWithStaff` →
           `fetchAllOTStaff` (4 parallel queries
           against `prisma.doctor` / `prisma.user`).
           Note: assistant-nurse ids point to
           `User.id`, not `Doctor.id`.

        6. **OT request list is `OTRequestList`
           (flat), NOT the IPD wrapper.** Backed
           by
           `IPDOTRequestRepository.getOTRequestList`
           using the `otRequestListValidator`. The
           IPD-side list (`/ipd-ot-requests`) uses
           the `ipdOTRequestValidator` and returns
           `{ ipdOTRequests, count }`. Both share
           the same `getOTRequestSchema` filter
           set.

        7. **`OTRequest` status state machine is
           server-side enforced.** From
           `IPDOTRequestService.updateOTRequestStatus`:
             - `CANCELLED` and `COMPLETED` are
               terminal (no transitions out).
             - `APPROVED → BOOKED` blocked.
             - `BOOKED` → `APPROVED` or `CANCELLED`
               only.
             - `APPROVED` → `CANCELLED` only, and
               blocked when `hasServicesAdded: true`.
             - OPD / EMERGENCY: status syncs to
               the linked appointment
               (`REQUESTED → BOOKED`,
               `APPROVED → CONFIRMED`,
               `CANCELLED → CANCELLED`).

        8. **`otRequest-by-patient` reshapes the
           response** for the patient-context view:
             - `otRequestId` ← `requestId`
             - `procedure`   ← `operationType`
             - `remarks`     ← `remark`
           The route accepts `patientId` (min 1
           char) and optional `appointmentId` /
           `admissionId`. The `patientId` schema
           uses `z.string().min(1)` — NOT a UUID,
           unlike most other routes.

        9. **The OT infection-screening endpoint
           uses `getInfectionScreeningDisplay`**
           (`src/utils/infection-screening.ts`)
           to map the serology fields
           (`hbAg | hcv | hiv | vdrl | otherScreening`)
           to `"Positive" | "Negative" | "Pending"`.
           The `isPositiveAlert` field is
           `displayLabel === "Positive"`. The
           endpoint derives from the **latest
           APPROVED OT request** for the patient
           (or returns the empty state if none).

        10. **The `tab` filter on OT request list
            is mapped to a `patientType` filter.**
            The schema enum is `[OPD, IPD, EMERGENCY]`
            but the repository's `typeMap` also
            recognises `LOCAL` and `FOREIGNER` as
            `PatientType` values — the schema does
            not expose them, but the repository
            would honour them if passed. Defaults
            to `OPD`.

        11. **OT module is split across two
            service instances.** Routes
            `ot/list` / `ot/{id}` /
            `ot/{id}/activities` /
            `ot-requests-for-proxy` /
            `appointments-for-ot` /
            `patients-for-ot` /
            `ot-infection-screening` go through
            `OTContainerService.otService.*`.
            Routes `ot-request-list` /
            `ot-request-by-patient` /
            `ot-requests/{id}` /
            `ipd-ot-requests` /
            `ipd-ot-requests/{id}` /
            `doctors-for-ot/{ids}` go through
            the standalone `ipdOTRequestService`
            singleton. There is no DI / IoC
            framework — every route file
            `new`s its own service or imports
            the singleton.

        12. **Manifest drift** — the existing
            manifest listed two stale files
            that don't exist:
            `src/app/api/(ot)/ot-requests/route.ts`
            (no GET on the bare `ot-requests`
            path; only the `[id]` child route
            exists) and
            `src/app/api/(ot)/ot/route.ts`
            (the list endpoint lives at
            `ot/list/route.ts` and exports BOTH
            `GET` and `POST`). The actual file
            count is **13** (not the manifest's
            15, even though the manifest
            `routes_count: 13` accidentally
            matched the file count). The new
            `routes_count: 13` reflects the
            real route-file count and the
            `procedures` list reflects the 14
            operations (since `ot/list` serves
            both GET and POST on one file).

        13. **`/doctors-for-ot/{ids}` takes a
            comma-separated ids path param.**
            The route splits on `,` and trims
            whitespace per id. Empty ids are
            filtered out before the
            `prisma.doctor.findMany` call.

        14. **`/ot-requests-for-proxy` requires
            both `patientId` AND `admissionId`
            (UUID).** Returns `{ id, label }`
            shaped rows. Filters to
            `status: APPROVED,
            hasServicesAdded: false, no active
            proxyBillRequestLink, ipdOTRequest.admissionId
            = input`. This is the picker used
            by the proxy-bill UI to link the new
            bill to a specific OT request.

