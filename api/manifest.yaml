             - `getCTListSchema` ≡ `getECGListSchema`
               ≡ `getECHOListSchema` ≡
               `getMRIListSchema` ≡
               `getUltrasoundListSchema` ≡
               `getXRayListSchema`.
           All take `patientGroup?`,
           `patientType?: OPD | IPD | EMERGENCY`
           (defaulting to `OPD`),
           `status?: ImagingServiceStatus`, plus
           standard pagination.

        4. **`ImagingService` (the master) uses a
           strategy registry pattern** to dispatch
           creation logic per `ServiceCategoryModule`.
           See
           `strategies/imaging-strategy-registry.ts`:
           each module (CT, MRI, etc.) registers an
           `IImagingCreationStrategy` and the master
           `ImagingService.createImagingRecords`
           groups `OPDBillingService` rows by module
           and dispatches them in parallel.

        5. **`ImagingListWithRequiredOpdBilling` type
           wrapper makes `opdBilling` and
