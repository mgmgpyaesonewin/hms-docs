      - GET /api/endo-requests-for-proxy
      - GET /api/endo-infection-screening
      - GET /api/appointments-for-endo
      - GET /api/patients-for-endo
    notes: |
      12 read endpoints + 1 mutation (`POST
      /api/endo/report`). The mutation creates the
      `EndoReport` linked to a `ProxyBillRequestLink`.

      Key findings:

        1. **No RBAC on any of the 12 endpoints**. All
           use `auth: { required: true }` with no
           `permissions` array. Endo data is clinically
           sensitive (vital signs, serology, surgical
           team, infection screening) — RBAC gating
           may be appropriate.

        2. **`EndoContainerService` is a 7-dependency
           composition root.** It wires `EndoService` +
           `EndoRequestService` + 5 phlebotomy /
           proxy-bill / pharmacy sale services. The
           container also re-exports the endo-specific
           EMR service singletons (`opdEmrService`,
           `edEmrService`, `ipdEmrService` — all
           `endoOpdEmrService` / `endoEdEmrService` /
           `endoIpdEmrService` aliases). Routes only
           touch `service.endoService.*`; the EMR
           exports are unused at the route layer.

        3. **`EndoService` extends
           `ProxyBillTemplateService`** with
           `department = DepartmentEnum.ENDO` and
           `pharmacyBillInvoicePrefix = "ENDO"`. So
           IPD daily bills generated from endo bills
           get the `ENDO/...` prefix. The
           `createEndoProxyBill` flow chains:
             - resolve endo request (by appointmentId
               for OPD or by endoRequestId +
               admissionId for IPD),
             - call `super.createProxyBill(...)`,
             - create `ProxyBillRequestLink`,
             - mark the request as billed
               (`hasServicesAdded: true` for OPD/ED;
               `status: COMPLETED` for IPD).

        4. **`guardIpdEndoListEditDeleteLocked`
           prevents editing/deleting an IPD endo
           proxy bill after final-bill paid + report
           delivered.** Throws `AppError` 400 with a
           specific message. This is a service-level
           guard, not visible in the REST contract
           (the create-update-delete endpoints are
           server-action only — not in scope here).

        5. **`EndoRequest` and `EndoReport` are linked
           via `ProxyBillRequestLink.requestType: "ENDO"`.
           One report per active link (soft-deleted links
           ignored). Report create is gated on the link
           being non-deleted and of type `ENDO` — the
           repository throws a plain `Error` (NOT a
           typed `AppError`) on mismatch, which
           surfaces as a 500 unless the request handler
           translates it.

        6. **Infection-screening display is derived
           from serology fields.** The
           `getInfectionScreeningDisplay` util in
           `src/utils/infection-screening.ts` maps
           `hbAg | hcv | hiv | vdrl | otherScreening`
           to `"Positive" | "Negative" | "Pending"`.
           The `isPositiveAlert` field is a convenience
           (`displayLabel === "Positive"`).

        7. **Module auto-rewrites from OPD → ED** for
           emergency patients:
           `EndoRequestService.createEndoRequest` sets
           `payload.module = EndoRequestModule.ED`
           when `patient.patientType ===
           PatientType.EMERGENCY`.

        8. **`EndoReport` status state machine is
           partial.** The only documented status
           transition is `ENTERED → DELIVERED`,
           gated on the linked proxy bill being
           paid (`paymentStatus !== UNPAID`). The
           reverse transition is not supported and
           there is no separate "REVIEWED" / "SIGNED"
           step in this module.

        9. **`EndoRequestValidator` includes the
           surgical team via four separate
           `*Junction` arrays**
           (`endoRequestSurgeons[]`,
           `endoRequestAnesthetists[]`,
           `endoRequestAssistantDoctors[]`,
           `endoRequestAssistantNurses[]`). Each is
           a many-to-many join with a per-row payload
           (e.g. `surgeonId`, `assistantNurseId`).
           Update flow does a `deleteMany` on all four
           junctions before re-creating them (full
           replacement).

        10. **`EndoRequest.status` state machine is
            enforced server-side.** From
            `EndoRequestService.updateEndoRequestStatus`:
              - `REQUESTED` → `APPROVED | CANCELLED`
                only.
              - `APPROVED` cannot go back to `REQUESTED`.
              - `APPROVED → CANCELLED` is blocked
                when `hasServicesAdded: true`.
              - `CANCELLED` and `COMPLETED` are
                terminal — no transitions out.
            The matching side-effect on the
            `Appointment` (when present) is to
            sync status via the
            `endoRequestStatusMap` (`APPROVED ↔
            CONFIRMED`, etc.).

        11. **OpdRequestId field in create schema
            supports "transfer OPD → IPD" flow.**
            When `opdRequestId` is provided, the
            create transaction `deleteMany`s the four
            junction tables for that prior request
            and then `delete`s the prior `EndoRequest`
            row — i.e. the prior OPD request is
            *hard-deleted* (not soft-deleted) as part
            of the transfer. Activity log entry:
            "Transferred OPD Endo Request to IPD".

        12. **Create-report exclusive entry
            validation** throws 400 for any of:
              - > 1 attachment URL,
              - no result AND no template AND no
                attachment (must set one),
              - both text/template AND attachment
                (must pick one side).

        13. **`/endo-requests/{id}/report` looks up
            the report via the active
            `ProxyBillRequestLink` chain** (not via a
            direct `endoReport.endoRequestId` foreign
            key). The route is for IPD, where the
            lookup is by `endoRequestId` because the
            proxy bill was created from the request.
            The OPD counterpart is implicit — OPD
            reports are looked up by proxy bill id
            (`/endo/report/{id}`).

