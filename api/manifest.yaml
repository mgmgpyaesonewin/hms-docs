# docs/manifest.yaml
# Project inventory for OpenAPI generation.
# Source of truth for which modules have been documented.

project:
  name: ycare-hms
  framework: nextjs
  api_style: mixed
  version: 1.1.12.dev
  description: YCare HMS — multi-tenant Hospital Management System (Next.js 15, Prisma/Postgres, Mantine, tRPC + REST)
  trpc_mount: /api/trpc
  url_mapping: |
    Next.js App Router strips route groups (parenthesised dirs) from URLs.
    A file at src/app/api/(group)/foo/route.ts serves at /api/foo.
    Route groups are an organisational concern only — the OpenAPI paths in
    docs/paths/<module>.yaml MUST NOT include the (group) segment.
    Confirmed against src/scripts/route-mapping.ts and next.config.ts
    (the legacy rewrites there apply to page.tsx only, not to route.ts).

modules:
  # =========================================================================
  # REST modules — one per route group under src/app/api/
  # =========================================================================

  - id: system
    kind: rest
    status: documented
    routes_count: 2
    files:
      - src/app/api/health/route.ts
      - src/app/api/sentry-example-api/route.ts
    shared_schemas: [HealthSnapshot, HealthError]

  - id: submodule-appointment
    kind: rest
    status: documented
    routes_count: 1
    note: Private git submodule (per project memory). Documentation optional depending on access.
    files:
      - src/app/api/submodules/appointment/module-check/route.ts
      # Supporting file discovered while documenting this module:
      - src/lib/dir-utils.ts
    shared_schemas: [ModuleCheckResponse]
    procedures:
      - GET /api/submodules/appointment/module-check
    notes: |
      Single public endpoint — a "module provisioned" probe used
      by the dashboard to detect whether the private appointment
      submodule has been cloned and is enabled. No auth required.

      Two checks must pass for a 200:
        1. `NEXT_PUBLIC_APPOINTMENT_MODULE_ENABLED !== "false"`.
        2. The filesystem directory
           `<cwd>/src/app/(dashboard)/appointment` is non-empty
           (recursively walked via `readDirRecursive` from
           `src/lib/dir-utils.ts:17-35` and checked with
           `hasEmptyDir` at `src/lib/dir-utils.ts:37-50`).

      On any failure returns HTTP 404 with a
      `{ success: false, result: null, message }` envelope. The
      status code is **404 for every failure mode** (env disabled,
      dir missing, fallback) — not just resource-not-found
      semantics. Clients must branch on `success` / `message`, not
      on the status code alone.

      Notable security/operational findings:
        1. **No auth** — endpoint is publicly reachable. Leaks
           whether the submodule is initialised (via the env flag
           and dir-walk) and the filesystem path. Minor info
           disclosure, consistent with other health probes.
        2. **Sync filesystem I/O on the request thread** —
           `fs.readdirSync` / `fs.statSync` walk the appointment
           tree synchronously. Acceptable for a rare probe; not
           for hot paths.
        3. **Loose env flag check** —
           `NEXT_PUBLIC_APPOINTMENT_MODULE_ENABLED === "false"`
           treats unset, empty, "0", "no", and any non-`"false"`
           value as "enabled". The flag is also exposed to the
           client (`NEXT_PUBLIC_*`), so it ships in the browser
           bundle.
        4. **`message` is human-readable English**, not a
           machine-readable code. Clients should still branch on
           `success` first.

