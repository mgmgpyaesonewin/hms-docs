      - src/app/api/(cathlab)/cathlab/patients-for-cathlab/route.ts
      - src/app/api/(cathlab)/cath-lab-requests-for-billing/route.ts
      - src/app/api/(cathlab)/cathlab-requests/route.ts
      - src/app/api/(cathlab)/cathlab-requests/[id]/route.ts
      - src/app/api/(cathlab)/cathlab-infection-screening/route.ts
      # Supporting files discovered while documenting this module:
      - src/app/(dashboard)/shared/cathlab/schemas/get-cathlab.schema.ts
      - src/app/(dashboard)/shared/cathlab/schemas/get-patients-for-cathlab.schema.ts
      - src/app/(dashboard)/shared/cathlab/schemas/cathlab-request/get-cathlab-request.schema.ts
      - src/app/(dashboard)/shared/cathlab/services/cathlab.service.ts
      - src/app/(dashboard)/shared/cathlab/services/cathlab-request.service.ts
      - src/app/(dashboard)/shared/cathlab/repositories/cathlab.repository.ts
      - src/app/(dashboard)/shared/cathlab/repositories/cathlab-request.repository.ts
      - src/utils/infection-screening.ts
    shared_schemas: [CathLabWithPaymentStatus, CathLabRequest]
    procedures:
      - GET /api/cathlab
      - GET /api/cathlab/{id}
      - GET /api/cathlab/{id}/audits
      - GET /api/cathlab/patients-for-cathlab
      - GET /api/cath-lab-requests-for-billing
      - GET /api/cathlab-requests
      - GET /api/cathlab-requests/{id}
      - GET /api/cathlab-infection-screening
    notes: |
      Read-only REST surface. Write operations (create / update
      / delete CathLab, create / update / delete
      CathLabRequest, update company-direct items, update
      service items) live on the services but are reached via
      server actions / tRPC — they are NOT part of this
      documentation set.

      Key findings:
        1. **No RBAC permissions declared** on any of the
           eight endpoints. All use
           `auth: { required: true }` with no `permissions`
           array. Cathlab data is clinically sensitive — RBAC
           gating may be appropriate.
        2. **`paymentStatus` is derived**, not stored — the
           list endpoint walks
           `admission.ipddailyBills.ipdfinalBillWithDailyBills.ipdFinalBill.paymentStatus`
           on every call and stamps `PAID` if any linked
           daily bill is in a paid IPD final bill, else
           `UNPAID`.
        3. **`cathLabRequestStatus` is `.optional()` in the
           Zod schema but the repo treats it as required** —
           the `where` clause is built unconditionally with
           `cathLabRequestStatus: query.cathLabRequestStatus`,
           so omitting it would match only patients with
           `cathLabRequestStatus: undefined`.
        4. **Some `getById` endpoints return `null` instead
           of 404**: `GET /api/cathlab/{id}`,
           `GET /api/cathlab/{id}/audits`, and
           `GET /api/cathlab-requests/{id}`.
        5. **`CathLabAudit.createdBy.role.name` is included
           in the audits response** — distinctive from the
           rest of the application, which only projects
           `id`/`fullName`/`username` for the publisher
           projection.
        6. **`patientGroup` and `patientType` filter inputs
           are accepted as raw strings** (not nativeEnum),
           with the repo casting to Prisma enum types.
           Malformed values throw at the Prisma layer,
           surfaced as generic 500.
        7. **Dead code in the service file** — commented-out
           earlier `deleteCathLab` (lines 398-511) and
           `updateCathLabCompanyDirectItems`
           (lines 627-652), superseded by the active
           versions.
        8. **The `CathLab` Prisma model has deeply-nested
           includes** (admission → ipddailyBills →
           ipdfinalBillWithDailyBills → ipdFinalBill) that
           can produce a large response payload for a
           single list row. Worth confirming the perf
           characteristics of `findCathLabs`.
        9. **Two parallel REST sub-areas** are exposed
           under `cathlab` and `cathlab-requests` (and the
           `cath-lab-requests-for-billing` summary). The
           two are conceptually distinct entities (CathLab
           is the billable record, CathLabRequest is the
           upstream request that gates the billable one).

