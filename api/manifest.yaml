      # Supporting files discovered while documenting this module:
      - src/app/(dashboard)/shared/pharmacy/services/store-mapping.service.ts
      - src/app/(dashboard)/shared/pharmacy/repositories/store-mapping-repository.ts
      - src/app/(dashboard)/shared/pharmacy/schemas/store/create-store-mapping-schema.ts
      - src/app/(dashboard)/shared/pharmacy/schemas/store/update-store-mapping-schema.ts
      - src/app/(dashboard)/shared/pharmacy/types/store-mapping.types.ts
    shared_schemas:
      - CreateStoreMappingInput
      - UpdateStoreMappingInput
      - DeleteStoreMappingInput
      - GetStoreMappingsResponse
      - GetTotalStoreMappingsCountResponse
      - UserWithMappedStores
      - UserWithMappedStoresById
      - MappedStoreEntry
      - CreatedStoreMappingRow
      - SwitchStoresResponse
    procedures:
      - storeMapping.getStoreMappings
      - storeMapping.storeMappingTotalCounts
      - storeMapping.getStoreMappingById
      - storeMapping.createStoreMapping
      - storeMapping.updateStoreMapping
      - storeMapping.deleteStoreMapping
      - storeMapping.getSwitchStores
    notes: |
      CRUD over the `StoreMapping` model — the user × store join
      that drives per-user store switching. 8 procedures; 7 use
      `authProcedure`, `deleteStoreMapping` uses
      `verifyPasswordProcedure`. **None** use `authorizeProcedure` —
      any authenticated user can manage store mappings. Store
      mappings drive per-user store switching, so this is a
      privileged surface — worth gating behind a
      `manage_store_mappings` action subject.

      Architectural note: the read endpoints return rows rooted
      at the `User` model (with `mappedStores[]` as a side
      relation), not the `StoreMapping` model itself. The router
      file lives under `routers/store-mapping.ts` but the
      implementation is user-centric.

      Key findings:
        1. **`getStoreMappingById` takes a user id, not a
           `StoreMapping` row id.** The router reads `id` from
           the input and passes it straight to
           `prisma.user.findFirst({ where: { id } })` — the table
           being queried is `User`, not `StoreMapping`.
        2. **Misleading "User already exists" / "User not found"
           errors**. The service's
           `storeMappingRepository.findExistingUser(userId)`
           actually queries
           `prisma.storeMapping.findFirst({ where: { userId } })`
           — the check is really "user already has at least one
           `StoreMapping` row" / "user has no `StoreMapping`
           rows", not whether the user themselves exist. The
           error messages "User already exists" (409 on create)
           and "User not found" (404 on update / delete) are
           misleading.
        3. **`storeMappingTotalCounts` returns the raw
           `prisma.storeMapping.groupBy` result**, NOT a single
           count integer. The array length is the "number of
           distinct users with a mapping" — but clients that
           read the field as a single number will get a runtime
           error. This is a silent-contract gotcha.
        4. **Full-replacement pattern on update**. The
           repository's `updateStoreMapping` runs a 2-step
           `prisma.$transaction`:
             1. `deleteMany` on `StoreMapping.userId`.
             2. `create` (one per `storeId`).
           **On conflict the entire transaction rolls back** —
           the user is not left with partial mappings.
        5. **Delete is a `deleteMany` on `userId`** (deletes ALL
           `StoreMapping` rows for that user in one call). The
           `deleteStoreMapping` mutation takes a single input
           field `id` which the service uses as `userId` (the
           field is renamed at the call site). The response is
           the `deleteMany` result (`{ count }`).
        6. **No date-range filter on `getStoreMappings`**. The
           repository's `buildWhereQuery` only handles `search`
           (and filters to users with `mappedStores: { some: {} }`).
        7. **Misleading search filter** — the
           `storeMappingRepository.buildWhereQuery` overrides the
           default `search` semantics to only target `username`.
           Other routers' `buildWhereQuery` match against
           `fullName`, `username`, `phoneNo`, etc. This one only
           does `username`. (Other prisma-searchable fields are
           not searched.)
        8. **Module-level singleton service is exported but
           unused**. `storeMappingService = new
           StoreMappingService(new StoreMappingRepository(prisma))`
           is exported from `store-mapping.service.ts:58-60`, but
           the router creates a fresh `StoreMappingService` on
           every call. The singleton is presumably for future use
           but adds a bit of dead code.
        9. **Same input-schema-override bug** as
           `auth.resetPassword` / `departments.deleteDepartment` /
           `stores.deleteStore` / `suppliers.deleteSupplierById` —
           the `verifyPasswordProcedure` base schema is
           overridden by `.input({ id: z.string() })`, so the
           middleware reads `undefined` at runtime.
       10. **No activity logging on any of the three mutating
           operations** — the service does not call
           `activityLogger.log` on `createStoreMapping`,
           `updateStoreMapping`, or `deleteStoreMapping`. This is
           a gap relative to `SupplierService` (which logs
           create / update / delete) and `StoreService` (which
           logs create / update / delete). Worth adding.
       11. **Empty `storeId` array is rejected** by both schemas
           (`z.array(z.string()).min(1)`) — clients must send at
           least one store.

  - id: trpc-default-setting
    kind: trpc
    status: documented
    routes_count: 3
    files:
      - src/lib/trpc/routers/default-setting.ts
      # Supporting files discovered while documenting this module:
      - src/app/(dashboard)/common/default-setting/features/schemas/create-default-setting-schema.ts
      - src/app/(dashboard)/common/default-setting/features/schemas/update-default-setting-schema.ts
      - src/app/(dashboard)/common/default-setting/features/type/index.ts
      - src/app/(dashboard)/common/default-setting/features/default-setting-service.ts
      - src/app/(dashboard)/common/default-setting/features/default-setting-repository.ts
    shared_schemas: [DefaultSettingFull, DefaultSettingBare]
    procedures:
      - defaultSetting.getDefaultSetting
      - defaultSetting.createDefaultSetting
      - defaultSetting.updateDefaultSetting
    notes: |
      Smallest tRPC module — three procedures only. The
      application treats the `DefaultSetting` Prisma model as a
      singleton config row. The model itself does NOT have a
      global unique constraint, but `storeId` is `@unique`, so at
      most one row exists per referenced Store.

      Notable findings:
        1. **TS type / runtime mismatch on the wire** — the input
           has `displayTaxField` and `displayFOCField` as
           top-level fields, but the repository destructures them
           out and writes them inside the `settings` JSON blob
           (default-setting-repository.ts:38, 51). The returned
           row has no top-level `displayTaxField` /
           `displayFOCField`. The TS type `DefaultSetting`
           (`type/index.ts:9-31`) reflects the **input** shape
           for these fields; the `Settings` interface in the
           same file is documented as "for type casting with
           returned data from api endpoint".
        2. **Bare/Full split**: `getDefaultSetting` returns the
           full shape with `paymentMethod: {id,name}` and
           `store: {id,name}` partial projections. The write
           methods (`createDefaultSetting`, `updateDefaultSetting`)
           return the **bare** row (no joined relations). The
           client must call `getDefaultSetting` separately to
           get the joined view.
        3. **Schema/state drift**:
             - `billTypeId` and `billType` are in the Prisma
               model (nullable, with FK) but **commented out**
               in both Zod schemas and the TS types. Looks like
               an in-progress feature.
             - `version` is in the Prisma model (`String?`) but
               missing from the TS type and Zod schema entirely.
             - `createdById` / `updatedById` are NOT in the
               Prisma model. Activity logging uses `ctx.user.id`
               for the log entry but does not record it on the
               row. Unique in the application in this regard.
             - `settings` is `Json` (not nullable) in Prisma,
               but `JsonValue | null` in the TS type.
        4. **Security: should be `authorizeProcedure`**. All
           three procedures use `authProcedure`. The default
           setting affects every downstream billing/alert flow,
           so this is privileged access. Worth gating behind a
           `manage_default_settings` action subject.
        5. **No DB-level singleton enforcement**. `getDefaultSetting`
           uses `findFirst` with no order, so if multiple rows
           ever exist (across different `storeId`s), the
           response is arbitrary. The application-level intent
           is clearly a singleton.
        6. **FK constraints use `onDelete: Cascade`** on
           `paymentMethod` and `store`. This is why
           `paymentMethods.deletePaymentMethod` checks
           `DefaultSetting.paymentMethodId` before allowing the
           delete (see `trpc-payment-methods`).
        7. **Module-level singleton service**: the router
           instantiates `defaultDefaultRepository` and
           `defaultSettingService` at module scope
           (default-setting.ts:9-12). A single service instance
           lives in module memory for the process lifetime.
        8. **Activity logging is complete** for both mutating
           operations.
        9. **`rounding` is a free-form string** (not a number) —
           no value validation at the router layer. The
           application interprets it downstream.

  - id: trpc-items
    kind: trpc
    status: documented
    routes_count: 2
    files:
      - src/lib/trpc/routers/items.ts
      # Supporting files discovered while documenting this module:
      - src/app/(dashboard)/common/items/features/items-service.ts
      - src/app/(dashboard)/common/items/features/items-repository.ts
      - src/app/(dashboard)/common/items/features/schemas/get-items-schema.ts
      - src/app/(dashboard)/common/items/features/types/index.ts
    shared_schemas:
      - Item
      - GetItemsInput
      - GetItemsResponse
    procedures:
      - items.getItems
      - items.getById
    notes: |
      **Read-only** tRPC surface over the `Item` model — only 2
      procedures: `getItems` (paginated, searchable) and
      `getById`. The full CRUD surface is reached via:
        - REST: `src/app/api/(common)/items/route.ts` +
          `src/app/api/(common)/items/[id]/route.ts` (documented
          as the `common-items` sub-area).
        - server actions: `src/app/(dashboard)/common/items/features/actions.ts`
          (out of scope for OpenAPI).

      Key findings:
        1. **Search uses `startsWith`, not `contains`** — the
           repository's `findItemsAndCount` builds the search
           clause with
           `name: { startsWith: query.search, mode: "insensitive" }`
           for all three searched fields (`name`, `itemId`,
           `generic`). This is different from
           `trpc-suppliers.getSuppliers` which uses `contains`.
           Two routers in the same setup area have inconsistent
           search semantics.
        2. **Inclusive `end` date** — the repository uses
           `lte: query.end` (inclusive), not `lt` (exclusive).
           Different from `trpc-suppliers.getSuppliers` which
           uses `lt`.
        3. **Decimal coercion** — `Item.taxValue` is read as
           `Prisma.Decimal` and coerced via `Number(item.taxValue)`.
           Lossy for high-precision tax rates; clients that need
           exact decimals should re-fetch.
        4. **Module-level singleton service** — `itemsService =
           new ItemsService(new ItemsRepository(prisma), new
           StockRepository(prisma))` is constructed at module
           scope (items.ts:11-14) and shared across all calls.
           This is the **only** tRPC router in the documented
           set so far that uses a module-level singleton. The
           `StockRepository` is wired in even though the current
           read methods do not use it — the service's
           `updateItem` does use
           `stockRepository.getTotalStockQtyAcrossAllStores(id)`
           for the unit-change guard, but the write methods are
           not exposed on this tRPC router.
        5. **No `getTotalCount` companion endpoint** — unlike
           other Setup routers (which split list and count into
           separate procedures), `itemsRouter` has no
           `items.getTotalItemsCount`. Clients that need the
           unfiltered total can compute it as
           `getItems({ page: 1, limit: 0 })` (the repository's
           `take: query.limit > 0 ? query.limit : undefined` makes
           `limit: 0` return all rows, but it's an N+1 cost).
        6. **Manifest drift** — the original `routes_count: ~8`
           was a placeholder. The actual count is **2** — the
           tRPC router is read-only. CRUD goes through REST
           and server actions.
        7. **`getById` input is a bare string, not an object**.
           The router does `authProcedure.input(z.string())` —
           clients send a JSON-encoded string as the request
           body. Documented as a `type: string` in the
           OpenAPI body schema.
        8. **Allergic-status typo** — the type module exports
           `illergyStatus` (sic — should be `allergyStatus`).
           The enum value is `NON_ALLERGIC` (with an underscore)
           which is preserved verbatim on the wire.
        9. **`sellingPriceGroup` is included with no Pick** —
           the repository's `include: { sellingPriceGroup: true }`
           returns the full `SellingPriceGroup` Prisma model. The
           `SellingPriceGroup` tRPC router is not yet documented
           (a future task); the reference in the schema is a thin
           pass-through.
       10. **No `authorizeProcedure` gating** — both procedures
           use `authProcedure`. Item data is not particularly
           sensitive but the full inventory is exposed to any
           logged-in user. Worth confirming with the team.

  - id: trpc-hospital-info
    kind: trpc
    status: documented
    routes_count: 2
    files:
      - src/lib/trpc/routers/hospital-info.ts
      # Supporting files discovered while documenting this module:
      - src/app/(dashboard)/common/hospital-info/features/hospital-info-service.ts
      - src/app/(dashboard)/common/hospital-info/features/hospital-info-repository.ts
      - src/app/(dashboard)/common/hospital-info/features/schemas/create-hospital-info.ts
      - src/app/(dashboard)/common/hospital-info/features/types/index.ts
    shared_schemas:
      - HospitalInfo
      - HospitalPhoneNumber
      - CreateHospitalInfoInput
      - GetHospitalInfoByIdResponse
    procedures:
      - hospitalInfo.getHospitalInfoById
      - hospitalInfo.createHospitalInfo
    notes: |
      **Singleton config surface** — only 2 procedures:
      `getHospitalInfoById` and `createHospitalInfo`. The
      `HospitalInfo` Prisma model is treated as a single global
      row.

      Both procedures use `authProcedure` (no
      `authorizeProcedure`). The hospital info drives the
      header logo / footer / contact details on every page —
      so this is a **privileged** surface. Worth gating
      behind a `manage_hospital_info` action subject.

      Key findings:
        1. **Misnamed procedure** — `getHospitalInfoById` does
           NOT take an id; it returns the singleton row. The
           router declares
           `getHospitalInfoById: authProcedure.query(...)` with
           no `.input(...)`. The procedure name is a historical
           artifact.
        2. **`createHospitalInfo` is an upsert** — the same
           procedure creates the row if it doesn't exist, or
           updates it if it does. The service's logic is in
           `hospital-info-service.ts:11-62` and uses
           `hospitalInfoRepository.findOne()` to branch. The
           update path runs a 3-step `prisma.$transaction`:
             1. `deleteMany` on `HospitalPhoneNumber` for this
                hospital.
             2. `createMany` with the new phone-number rows.
             3. `update` the parent `HospitalInfo` row.
        3. **No activity logging** — the service does NOT call
           `activityLogger.log` for create or update.
           Hospital-info changes are not tracked in the
           activity log. Worth adding for auditability.
        4. **No `createdBy` / `updatedBy` columns** on the
           `HospitalInfo` Prisma model — the model is a
           singleton config row, not a user-managed entity.
        5. **S3 logo cleanup is broken** — the service has a
           commented-out `pg-boss` job
           (`DELETE_HOSPITAL_INFO_LOGO_JOB`) that would delete
           the previous logo from S3 when the logo is replaced.
           The comment says "having issues with .send method /
           will look into it later / TODO: fix this". The
           current behaviour leaves orphaned logos in S3 when
           the hospital uploads a new logo.
        6. **No singleton enforcement at the DB layer** — the
           `HospitalInfo` model has no `@unique` constraint
           that would limit it to one row. If two rows ever
           exist (e.g. from a manual DB insert),
           `getHospitalInfoById` returns an arbitrary one (the
           first by `findFirst`'s implicit order). The
           application-level intent is clearly a singleton.
        7. **`phoneNos.type` is an application-level string**
           (not a Prisma `enum`). The values are lowercase
           strings (`"primary"`, `"additional"`). No validation
           at the DB layer; the type column is `String`.
        8. **Manifest drift** — the original `routes_count: ~3`
           was a placeholder. The actual count is **2**. The
           `(common)/hospital-info` REST sub-area (1 GET
           endpoint) is the third documented surface for the
           same model — that one is part of the `common`
           module.
        9. **No module-level singleton service** — the service
           is NOT exported as a module-level singleton (no
           `export const hospitalInfoService = new
           HospitalInfoService(...)` at the bottom of
           `hospital-info-service.ts`). The router creates a
           fresh `HospitalInfoService` on every call.
       10. **Typo in service source** — `exisitngHospital` (sic
           — should be `existingHospital`) appears twice
           (`hospital-info-service.ts:12, 28`).

