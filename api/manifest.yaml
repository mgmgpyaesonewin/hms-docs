           for detail endpoints. The repository
           filters to `opdBilling: { not: null }` for
           detail queries. List endpoints keep the
           fields nullable.

        6. **`/imaging-templates/{id}` throws 404 via
           `AppError`** ("Imaging template not
           found") when the id is unknown. The
           `/imaging-templates` list endpoint does
           not.

        7. **`DELETE /imaging-templates/{id}` is a
           hard delete** (`dbPrisma.imagingTemplate.delete`,
           not soft-delete). There is no batched
           delete — one id at a time. Response
           carries `success: true, message: "...",
           error: null` but no `result` field.

        8. **No RBAC on any of the 28 endpoints.**
           All use `auth: { required: true }` with
           no `permissions` array. Imaging data is
           clinically sensitive (results, patient
           demographics, attachments) — RBAC
           gating may be appropriate.

        9. **`ImagingIPDService` handles the IPD
           side of status transitions** —
           acknowledged / de-acknowledged /
           cancelled — invoked from each per-type
           service's `update*ServiceStatus` method.
           The shared pattern is the same across
           all 5 types (CT, ECG, ECHO, MRI, US,
           X-Ray).

        10. **`ImagingService` master has only a
            single endpoint** (`/api/imaging`) that
            takes `defaultQuerySchema`. It is
            used by RSC hydration paths and not
            directly by the per-type list routes.

        11. **CT add-on billing is CT-specific.**
            No sibling under ECG/ECHO/MRI/US/X-Ray.
            The shape is `CTAddOnWithRelations` with
            `serviceItems` and `pharmacyItems`
            add-on lines.

        12. **Imaging service status state machine
            (4 values):** `PENDING → ACKNOWLEDGED`,
            `ACKNOWLEDGED → DE_ACKNOWLEDGED`,
            `PENDING → CANCELLED`. The
            `isValidImageServiceTransition` helper
            (in `imaging.helper.ts`) enforces valid
            transitions.

        13. **All 6 per-type routes instantiate
            their service inside the route
            handler** (e.g. `const ctService = new
            CTService()` per request). The
            activity-log routes pre-instantiate as
            a module-level constant. Both patterns
            coexist; no DI framework is in use.

        14. **Manifest listed shared schemas as
            `[ImagingStudy, ImagingTemplate]`** —
            the actual model is `ImagingList` (no
            `ImagingStudy` model exists). Updated
            the list to the actual exposed shapes.

