      - GET /api/ed-bills
      - GET /api/ed-bills/{id}
      - GET /api/ed-bills/{id}/activities
      - GET /api/patients-for-ed
    notes: |
      Read-only REST surface. All 5 endpoints
      are GET-only. All 5 return
      `{ success: true, result, message: "",
      error: null }`.

      Architectural note: an "ED bill" is
      **not** a separate `EDBill` Prisma
      model — it's a `ProxyBill` row with
      `departmentType = DepartmentEnum.ED`.
      `EdBillRepository` writes to
      `prisma.proxyBill` (e.g.,
      `trx.proxyBill.create({ data: {
      ..., departmentType: DepartmentEnum.ED
      }})`). The ED module differs from the
      daycare module in two ways:
        1. `appointmentId` is **required**
           in `createEdBillSchema` (vs
           optional in `createProxyBillSchema`).
        2. Team-fees are not a separate case
           in the ED refine — only the four
           sub-bills (`serviceBill`,
           `servicePackageBill`,
           `procedureBill`, `pharmacyBill`)
           are checked.

      ## CRITICAL SECURITY FINDING

      **Three of the five ED endpoints
      declare `auth: { required: false }`**
      (the two list endpoints +
      `appointments-for-ed`). Patient PII
      (name, phone, nrcNo, township,
      region) and ED-bill data (totals,
      payment status, bill ids) are exposed
      to any anonymous caller.

      - `GET /api/ed-bills` — ED bill list,
        publicly reachable.
      - `GET /api/appointments-for-ed` —
        patient appointments, publicly
        reachable.
      - `GET /api/patients-for-ed` —
        patient PII list, publicly
        reachable.

      Only the two detail routes require
      auth:
        - `GET /api/ed-bills/{id}` — auth
          required.
        - `GET /api/ed-bills/{id}/activities`
          — auth required.

      This is the most serious
      unauthenticated PII exposure found in
      the documentation so far. Should be
      fixed immediately by changing
      `auth: { required: false }` to
      `auth: { required: true }` on the
      three list endpoints, ideally with
      RBAC permissions on top.

      Other findings:
        1. **No `permissions` array on any
           of the 5 endpoints**.
        2. **`getEdBillList` input schema
           has no `departmentType` filter**
           — the filter is hard-coded in
           the repo. Unlike
           `getProxyBillList` (the daycare
           counterpart), the ED list schema
           does not even declare a Zod
           default.
        3. **`patientGroup` filter on
           `/ed-bills` is bare
           `z.string()`** — inconsistent
           with the OPD list which uses
           `nativeEnum(patientGroup)`.
        4. **Heavy PII exposure** on
           `/api/patients-for-ed` (name,
           phone, nrcNo, township, region,
           email).
        5. **No PII scoping by store or
           tenant** on the unauthenticated
           list endpoints — any anonymous
           caller sees all rows.

