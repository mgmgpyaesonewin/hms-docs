# docs/schemas/trpc-roles.yaml
# Schemas for the tRPC `roles` router (src/lib/trpc/routers/roles.ts).
# This module also OWNS the RBAC vocabulary: `Action` and `Subject` enums
# are exported from src/app/(dashboard)/common/user-management/roles/features/utils.ts
# and referenced by virtually every authorizeProcedure call site.

# =============================================================================
# RBAC vocabulary — owned by this module
# =============================================================================

Action:
  type: string
  description: |
    RBAC action verb. The TS type is
    `Action = BaseAction | SpecialAction | (string & {})` from
    `src/app/(dashboard)/common/user-management/roles/features/utils.ts:41`.
    The `(string & {})` arm allows arbitrary strings to be assigned for
    forward compatibility, but the canonical actions are listed below.
  enum:
    # baseActions
    - View
    - Add
    - Edit
    - Delete
    - Export
    # specialActions (in declaration order)
    - Change Status
    - Add Billing
    - Collect
    - Uncollect
    - Acknowledge
    - De Acknowledge
    - Cancel
    - Print
    - Reprint
    - Deliver
    - Ward Clearance
    - Pharmacy Clearance
    - Cashier Clearance
    - Define Deposit Required

