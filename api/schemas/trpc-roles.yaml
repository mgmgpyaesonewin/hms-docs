# =============================================================================
# Input schemas
# =============================================================================

GetRolesResponse:
  type: object
  description: |
    Response shape of `roles.getRoles`.
    Service signature: `Promise<{ roles: Role[]; totalCount: number }>`.
  required:
    - roles
    - totalCount
  properties:
    roles:
      type: array
      items:
        $ref: ./trpc-roles.yaml#/Role
    totalCount:
      type: integer
      minimum: 0
      description: Total matching roles across all pages.

CreateRoleInput:
  type: object
  description: |
    Input for `roles.createRole`. Zod schema: `createRoleSchema` (alias for
    `baseRoleFormSchema`). Validates the role name, optional description,
    and the permission set; the permission validator calls
    `isActionRestricted(subject, action)` and rejects restricted pairs.
  required:
    - name
    - permissions
  properties:
    name:
      type: string
      minLength: 2
      maxLength: 30
      pattern: "^[A-Za-z0-9\\s]+$"
      description: |
        2–30 chars; alphanumeric + spaces only; not all digits.
    description:
      type: string
      maxLength: 500
      description: Optional free-text description.
    permissions:
      type: array
      minItems: 1
      description: At least one `{ action, subject }` pair is required.
      items:
        $ref: ./trpc-roles.yaml#/RolePermissionInput

UpdateRoleInput:
  type: object
  description: |
    Input for `roles.updateRole`. Zod schema: `editRoleSchema` =
    `baseRoleFormSchema.extend({ id: z.string() })`. Same validation as
    `CreateRoleInput` plus the `id` of the role to update.
  required:
    - id
    - name
    - permissions
  properties:
    id:
      type: string
      description: Role id. No UUID validation at the router layer.
    name:
      type: string
      minLength: 2
      maxLength: 30
      pattern: "^[A-Za-z0-9\\s]+$"
    description:
      type: string
      maxLength: 500
    permissions:
      type: array
      minItems: 1
      items:
        $ref: ./trpc-roles.yaml#/RolePermissionInput

RolePermissionInput:
  type: object
  description: |
    One `(action, subject)` permission pair. Zod schema is an inline
    `z.object({ action: z.enum(allActions).or(z.string()), subject: z.enum(subjects).or(z.string()) })`.
    After parse, the validator runs `isActionRestricted(subject, action)`;
    any pair where the subject config has `excludedActions` including the
    given action is rejected with "Contains restricted permissions".
  required:
    - action
    - subject
  properties:
    action:
      $ref: ./trpc-roles.yaml#/Action
    subject:
      $ref: ./trpc-roles.yaml#/Subject

# =============================================================================
# Response schemas
# =============================================================================

Role:
  type: object
  description: |
    Role record. TS type `Role` from
    `src/app/(dashboard)/common/user-management/roles/features/types/index.ts:4-18`.
    Returned by `roles.createRole`, `roles.getRoleById`, `roles.updateRole`,
    `roles.deleteRole` and embedded in `roles.getRoles` responses.
  required:
    - id
    - roleId
    - name
    - activeUsers
    - permissions
    - isSuperadmin
    - createdAt
    - updatedAt
    - createdById
    - createdBy
  properties:
    id:
      type: string
      format: uuid
    roleId:
      type: string
      description: Human-readable role code (e.g. "ADMIN", "DOCTOR").
    name:
      type: string
    description:
      type: string
      nullable: true
    activeUsers:
      type: integer
      minimum: 0
      description: Count of users currently assigned to this role.
    permissions:
      type: array
      items:
        $ref: ./trpc-roles.yaml#/Permission
    isSuperadmin:
      type: boolean
      description: |
        When true, bypasses the per-permission check in `checkPermission`
        (utils.ts:1812). Only the seeded superadmin role should have this
        set to `true`.
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time
    createdById:
      type: string
      format: uuid
    updatedById:
      type: string
      format: uuid
      nullable: true
    createdBy:
      $ref: ./trpc-users.yaml#/UserReference
      description: |
        Minimal user shape — `id`, `fullName`, `email`, `username` (per
        the TS `Pick<User, ...>`). Now defined in trpc-users.yaml.
    updatedBy:
      $ref: ./trpc-users.yaml#/UserReference
      nullable: true

Permission:
  type: object
  description: |
    Role-permission row. TS type `Permission` from
    `src/app/(dashboard)/common/user-management/roles/features/types/index.ts:20-27`.
  required:
    - id
    - createdAt
    - updatedAt
    - action
    - subject
    - roleId
  properties:
    id:
      type: string
      format: uuid
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time
    action:
      $ref: ./trpc-roles.yaml#/Action
    subject:
      $ref: ./trpc-roles.yaml#/Subject
    roleId:
      type: string
      format: uuid

# =============================================================================
# Placeholder cross-references
# =============================================================================

RoleSummary:
  type: object
  description: |
    Partial Role projection embedded in `User.role`. TS type:
    `Pick<Role, "id" | "name" | "permissions" | "isSuperadmin">`
    (trpc-users types/index.ts:24). Owned here.
  required:
    - id
    - name
    - isSuperadmin
  properties:
    id:
      type: string
      format: uuid
    name:
      type: string
    isSuperadmin:
      type: boolean
    permissions:
      type: array
      items:
        $ref: ./trpc-roles.yaml#/Permission

UserSummary:
  $ref: ./trpc-users.yaml#/UserSummary
  description: |
    Now defined in trpc-users.yaml (resolved). Used by `Role.createdBy`
    callers that want the narrower shape (no email).

User:
  $ref: ./trpc-users.yaml#/User
  description: |
    Placeholder. The full `User` type is owned by the trpc-users module
    (pending); the `checkPermission` function (utils.ts:1806-1819) reads
    `user.role.permissions`.
