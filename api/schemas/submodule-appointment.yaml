# docs/schemas/submodule-appointment.yaml
# Schemas for the submodule-appointment module
# (src/app/api/submodules/appointment/module-check/route.ts).
#
# The module exposes a single endpoint (a "module provisioned" health
# probe). It uses the project's standard REST envelope.

ModuleCheckResponse:
  type: object
  description: |
    Standard project REST response envelope. The submodule-check
    endpoint always returns `result: null` — only `success` and
    `message` carry information. `message` values (verbatim from
    the handler):
      - "Appointment Module exist" — success.
      - "Appointment Module is not enabled" — env flag explicitly
        disabled.
      - "Appointment directory is empty or missing" — env enabled
        but the directory is hollow.
      - "Appointment Module not available" — fallback for non-`Error`
        thrown values.
  required:
    - success
    - result
    - message
  properties:
    success:
      type: boolean
      description: True only when both the env flag and the filesystem check pass.
    result:
      type: object
      nullable: true
      description: |
        Always `null` for this endpoint. The property is required
        by the envelope contract (kept for shape consistency with
        other REST routes in the project).
    message:
      type: string
      description: Human-readable status. See module description for the full set of possible values.
