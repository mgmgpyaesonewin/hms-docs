# docs/schemas/imaging.yaml
# OpenAPI component schemas for the `imaging` module's
# REST surface (`src/app/api/(imaging)/`).
#
# The imaging module is structured around 6 imaging
# "types" (CT, ECG, ECHO, MRI, Ultrasound, X-Ray) — all
# sharing a single `ImagingList` data model with a
# `type` discriminator. The per-type `*ListValidator`
# in the repositories is just an alias of the shared
# `imagingListValidator` (see
# `repositories/imaging.repository.ts`).
#
# This file documents the response envelopes and the
# core shared shapes (ImagingList, ImagingService,
# ImagingTemplate, etc.). The 6 imaging types all share
# the same `ImagingList` body — only the list / detail
# / activities envelopes differ per type.

# =============================================================================
# Master imaging service
# =============================================================================

GetImagingServiceResponse:
  type: object
  properties:
    success: { type: boolean, example: true }
    result: {}
    message: { type: string, example: "" }
    error: { nullable: true }
  required: [success, result, message, error]
  description: |
    Result is the strategy-dispatched imaging list
    from `ImagingRepository.getImagingService` (shape
    depends on the strategies registered for the
    requested module — see
    `strategies/imaging-strategy-registry.ts`).

# =============================================================================
# Imaging templates
# =============================================================================

GetImagingTemplatesResponse:
  type: object
  properties:
    success: { type: boolean, example: true }
    result:
      type: object
      properties:
        templates:
          type: array
          items: { $ref: "#/ImagingTemplate" }
        totalCount: { type: integer }
    message: { type: string, example: "" }
    error: { nullable: true }
  required: [success, result, message, error]

GetImagingTemplateByIdResponse:
  type: object
  properties:
    success: { type: boolean, example: true }
    result: { $ref: "#/ImagingTemplate" }
    message: { type: string, example: "" }
    error: { nullable: true }
  required: [success, result, message, error]

DeleteImagingTemplateResponse:
  type: object
  properties:
    success: { type: boolean, example: true }
    message:
      type: string
      example: "Imaging template deleted successfully"
    error: { nullable: true }
  required: [success, message, error]
  description: |
    Note: no `result` field on delete — the service
    returns only `success` + `message` + `error`.

ImagingTemplate:
  type: object
  description: |
    Mirrors `ImagingTemplateWithRelations` (derived
    from `imagingTemplateValidator` in
    `imaging-template.repository.ts`).
  properties:
    id: { type: string, format: uuid }
    name: { type: string }
    type:
      type: string
      enum: [CT, MRI, X_RAY, ULTRASOUND, ECHO, ECG]
      description: "`ImagingType` enum."
    template: { type: string }
    createdById: { type: string, format: uuid }
    updatedById: { type: string, format: uuid }
    createdAt: { type: string, format: date-time }
    updatedAt: { type: string, format: date-time }
    createdBy:
      type: object
      properties:
        id: { type: string, format: uuid }
        fullName: { type: string }
        username: { type: string }
    updatedBy:
      type: object
      properties:
        id: { type: string, format: uuid }
        fullName: { type: string }
        username: { type: string }

