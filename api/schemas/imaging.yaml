# =============================================================================
# Shared body schemas
# =============================================================================

ImagingList:
  type: object
  description: |
    The shared `ImagingList` body used by all 6
    imaging types (CT, ECG, ECHO, MRI, Ultrasound,
    X-Ray). The shape is the
    `Prisma.ImagingListGetPayload<typeof imagingListValidator>`
    — i.e. the result of the shared
    `imagingListValidator` in
    `repositories/imaging.repository.ts`.

    Note that for detail endpoints, the type wrapper
    `ImagingListWithRequiredOpdBilling` makes
    `opdBilling` and `services[].opdBillingService`
    non-nullable. The structure below is the base
    shape (with nullable).
  properties:
    id: { type: string, format: uuid }
    type:
      type: string
      enum: [CT, MRI, X_RAY, ULTRASOUND, ECHO, ECG]
    referralDoctor:
      type: object
      nullable: true
      properties:
        id: { type: string }
        doctorId: { type: string }
        title: { type: string }
        user:
          type: object
          properties:
            fullName: { type: string }
    referralClinic:
      type: object
      nullable: true
      properties:
        id: { type: string }
        clinicId: { type: string }
        name: { type: string }
    opdBilling:
      type: object
      nullable: true
      description: |
        The OPD billing row (and its parent `Bill`).
        Null for IPD imaging lists. For detail
        responses (CT, etc.) the `opdBilling` is
        guaranteed non-null per the
        `ImagingListWithRequiredOpdBilling` type
        wrapper.
      properties:
        id: { type: string }
        bill:
          type: object
          properties:
            invoiceNo: { type: string }
            remark: { type: string, nullable: true }
            appointmentId: { type: string, format: uuid, nullable: true }
            store: {}
        patient:
          $ref: "./common-patients.yaml#/Patient"
    ipdDailyBill:
      type: object
      nullable: true
      properties:
        id: { type: string }
        invoiceNo: { type: string, nullable: true }
        remark: { type: string, nullable: true }
        store:
          type: object
          properties:
            id: { type: string }
            name: { type: string }
        admission:
          type: object
          properties:
            patient:
              $ref: "./common-patients.yaml#/Patient"
            discharges:
              type: object
              properties:
                isFinalBillPaid: { type: boolean }
    imagingListNewBorn:
      type: object
      nullable: true
      description: |
        Optional new-born baby reference (used for
        obstetric imaging).
      properties:
        newBornBaby:
          type: object
          properties:
            patient: { $ref: "./common-patients.yaml#/Patient" }
    services:
      type: array
      description: |
        The line-item services (one per billing
        service row). Ordered by `createdAt` ASC,
        `id` ASC. Each item carries either
        `ipdDailyService` or `opdBillingService`
        (NOT both).
      items: { $ref: "#/ImagingService" }
    opdPackageBill:
      type: object
      nullable: true
      properties:
        patient: { $ref: "./common-patients.yaml#/Patient" }
        store:
          type: object
          properties:
            name: { type: string }
    opdEmrImagingModuleJoints:
      type: array
      description: |
        Join rows to OPD-EMR imaging modules. The
        embedded `opdEmr` carries the related OPD
        EMR, with `opdEmrServices[]`, `patient`,
        `doctor`, etc.
      items:
        type: object
        properties:
          opdEmr:
            type: object
            properties:
              appointmentId: { type: string, format: uuid, nullable: true }
              patient: { $ref: "./common-patients.yaml#/Patient" }
              doctor:
                type: object
                properties:
                  doctorId: { type: string }
                  title: { type: string }
                  user:
                    type: object
                    properties:
                      fullName: { type: string }
              opdEmrServices:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string, format: uuid }
                    serviceId: { type: string }
                    qty: { type: integer }
                    priceType: { type: string }
                    price: { type: number }
                    amount: { type: number }
                    foc: { type: integer }
                    imagingServiceId: { type: string, format: uuid, nullable: true }
                    service:
                      type: object
                      properties:
                        id: { type: string }
                        name: { type: string }
                        addOthersForCt: { type: boolean }
                    doctor:
                      type: object
                      properties:
                        id: { type: string }
                        doctorId: { type: string }
                        specialization: { type: string, nullable: true }
                        title: { type: string }
                        user:
                          type: object
                          properties:
                            fullName: { type: string }
    createdBy:
      type: object
      properties:
        id: { type: string, format: uuid }
        fullName: { type: string }
        username: { type: string }
    updatedBy:
      type: object
      properties:
        id: { type: string, format: uuid }
        fullName: { type: string }
        username: { type: string }
    createdAt: { type: string, format: date-time }
    updatedAt: { type: string, format: date-time }

ImagingService:
  type: object
  description: |
    A line item on an `ImagingList`. The sub-row
    references either an `IPDDailyService` (for IPD
    imaging) or an `OPDBillingService` (for OPD
    imaging) — NOT both. Optional `addOn` and
    `result` link to the CT add-on and the result
    document.
  properties:
    id: { type: string, format: uuid }
    imagingListId: { type: string, format: uuid }
    type:
      type: string
      enum: [CT, MRI, X_RAY, ULTRASOUND, ECHO, ECG]
    status:
      type: string
      enum: [PENDING, ACKNOWLEDGED, DE_ACKNOWLEDGED, CANCELLED]
      description: |
        `ImagingServiceStatus` (see
        `imaging-service.types.ts`).
    ipdDailyService:
      type: object
      nullable: true
      properties:
        id: { type: string }
        priceType: { type: string, nullable: true }
        qty: { type: integer }
        foc: { type: integer }
        service:
          type: object
          properties:
            id: { type: string }
            name: { type: string }
            addOthersForCt: { type: boolean }
        doctor:
          type: object
          nullable: true
          properties:
            id: { type: string }
            doctorId: { type: string }
            specialization: { type: string, nullable: true }
            title: { type: string }
            user:
              type: object
              properties:
                fullName: { type: string }
    opdBillingService:
      type: object
      nullable: true
      properties:
        id: { type: string }
        priceType: { type: string, nullable: true }
        qty: { type: integer }
        foc: { type: integer }
        service:
          type: object
          properties:
            id: { type: string }
            name: { type: string }
            addOthersForCt: { type: boolean }
        doctor:
          type: object
          nullable: true
          properties:
            id: { type: string }
            doctorId: { type: string }
            specialization: { type: string, nullable: true }
            title: { type: string }
            user:
              type: object
              properties:
                fullName: { type: string }
    addOn:
      type: object
      nullable: true
      description: |
        Reference to the CT add-on for this
        service (CT-specific). Just an `id` stub
        in the validator.
      properties:
        id: { type: string, format: uuid }
    result:
      type: object
      nullable: true
      properties:
        id: { type: string, format: uuid }
        result: { type: string }
        attachments:
          type: array
          items: { type: string, format: uri }
        printOption: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        readingDoctors:
          type: array
          items:
            type: object
            properties:
              id: { type: string, format: uuid }
              doctor:
                type: object
                properties:
                  id: { type: string }
                  doctorId: { type: string }
                  title: { type: string }
                  specialization: { type: string, nullable: true }
                  user:
                    type: object
                    properties:
                      fullName: { type: string }

CTAddOn:
  type: object
  description: |
    CT add-on billing summary. Returned by
    `CTService.getAddOn`. The full shape comes
    from `CTAddOnWithRelations` (see
    `ct.types.ts`) which is built from the
    `ctAddOnValidator` in `ct.repository.ts`.
    Includes `serviceItems` (additional
    services), `pharmacyItems` (pharmacy
    add-ons), the parent `imagingService`, and
    the `dailyBill` link.
  properties:
    id: { type: string, format: uuid }
    imagingServiceId: { type: string, format: uuid }
    dailyBillId: { type: string, format: uuid, nullable: true }
    serviceItems:
      type: array
      items: {}
    pharmacyItems:
      type: array
      items: {}
    createdBy:
      type: object
      properties:
        id: { type: string, format: uuid }
        fullName: { type: string }
        username: { type: string }
    updatedBy:
      type: object
      properties:
        id: { type: string, format: uuid }
        fullName: { type: string }
        username: { type: string }
    createdAt: { type: string, format: date-time }
    updatedAt: { type: string, format: date-time }

ImagingListActivityLog:
  type: object
  description: |
    Activity-log entry for an `ImagingList` write
    event (create, result-add, status change, etc.).
    Returned by the per-type
    `*Service.getXListActivities`.
  properties:
    id: { type: string, format: uuid }
    entity:
      type: string
      example: "CT List"
    entityId: { type: string, format: uuid }
    action:
      type: string
      example: "Create"
    description: { type: string }
    remark: { type: string, nullable: true }
    userId: { type: string, format: uuid }
    user:
      type: object
      properties:
        id: { type: string, format: uuid }
        fullName: { type: string }
        username: { type: string }
    timestamp: { type: string, format: date-time }

ImagingServiceActivityLog:
  type: object
  description: |
    Activity-log entry for an `ImagingService`
    write event (status change, etc.). Returned by
    the per-type
    `*Service.getXServiceActivities`.
  properties:
    id: { type: string, format: uuid }
    entity:
      type: string
      example: "CT Service"
    entityId: { type: string, format: uuid }
    action: { type: string, example: "Update" }
    description: { type: string }
    remark: { type: string, nullable: true }
    userId: { type: string, format: uuid }
    user:
      type: object
      properties:
        id: { type: string, format: uuid }
        fullName: { type: string }
        username: { type: string }
    timestamp: { type: string, format: date-time }
