# docs/paths/common-reports-financial.yaml
# Financial & sales-side report endpoints of the
# `common` REST module. 15 endpoints covering
# sales, payment method, daily profit,
# purchasing, GRN, top products, supplier
# payment, batch item, payment method detail.
# All are GET-only, all require an authenticated
# session, none declare explicit RBAC permissions.
# Source files under src/app/api/(common)/reports/
# {sale-reports, payment-method-report, daily-profit-reports,
# purchasing-items, grn-*, top-products, supplier-payment,
# batch-item-reports, pharmacy-sale-reports,
# pharmacy-sale-return-items, used-items-report,
# stock-damage-item, stock-request-item, stock-transfer-report,
# stock-summary/export, expiry-update-activity-logs,
# foc-items-activity-logs, item-summary, supplier-items}.

# =============================================================================
# Sale reports
# =============================================================================

/api/reports/sale-reports:
  get:
    operationId: getSalesReport
    summary: Per-item sales rows
    description: |
      Returns one row per sold item with
      `date`, `itemId`, `itemName`, `invoiceNo`,
      `patientName`, `patientId`, `doctorName`,
      `doctorTitle`, `doctorId`, `billType`,
      `billTypeId`, `qty`, `unit`, `focQty`,
      `taxAmount`, `taxPercentage`,
      `discountAmount`, `discountPercentage`,
      `paymentStatus`, `maximumRetailPrice`. Row
      shape per `salesReportSchema`. Filters by
      `storeId`, `doctorId`, `billTypeId`,
      `paymentStatus` (`PENDING` / `PAID`).
    tags: [Reports - Financial]
    security:
      - cookieAuth: []
    x-security-note: |
      **No `permissions` declared**. `storeId`
      filter is `.nullable().optional()` — clients
      can omit it to see all stores. Worth
      confirming with the team that the route
      enforces store scoping server-side.
    parameters:
      - $ref: ./common.yaml#/PaginationQuery
      - in: query
        name: storeId
        schema: { type: string, nullable: true }
      - in: query
        name: doctorId
        schema: { type: string }
      - in: query
        name: billTypeId
        schema: { type: string }
      - in: query
        name: paymentStatus
        schema:
          type: string
          enum: [PENDING, PAID]
    responses:
      "200":
        description: |
          `{ success: true, result, message: "",
          error: "" }`. **PII exposure**: patient
          name + id per row.
        content:
          application/json:
            schema:
              $ref: ../schemas/common-reports.yaml#/GetSalesReportResponse
      "401":
        description: No valid session.
        content:
          application/json:
            schema:
              $ref: ../schemas/common.yaml#/ErrorEnvelope

# =============================================================================
# Payment method report
# =============================================================================

/api/reports/payment-method-report:
  get:
    operationId: getPaymentMethodReport
    summary: Payment-method aggregation
    description: |
      Returns aggregated payment-method totals
      for the given `modules` (`["OPD", "IPD"]`
      by default).
    tags: [Reports - Financial]
    security:
      - cookieAuth: []
    parameters:
      - $ref: ./common.yaml#/PaginationQuery
      - in: query
        name: modules
        description: |
          Repeated query string. Defaults to
          `["OPD", "IPD"]`. The route treats
          this as a Zod array of enum values.
        required: false
        schema:
          type: array
          items:
            type: string
            enum: [OPD, IPD]
        style: form
        explode: true
    responses:
      "200":
        description: |
          `{ success: true, result, message: "",
          error: null }`.
        content:
          application/json:
            schema:
              $ref: ../schemas/common-reports.yaml#/GetGenericObjectResponse
      "401":
        description: No valid session.
        content:
          application/json:
            schema:
              $ref: ../schemas/common.yaml#/ErrorEnvelope

/api/reports/payment-method-report/{id}:
  get:
    operationId: getPaymentMethodReportDetail
    summary: Payment-method detail rows
    description: |
      Per-payment-method detail rows. Wraps
      `paymentMethodReportService.getPaymentMethodReportDetail(id, query)`.
    tags: [Reports - Financial]
    security:
