      (revenue, cost, profit) for the requested
      date range. Schema is
      `getDailyProfitReportsSchema` (just the
      baseQuerySchema). Service:
      `dailyProfitReportsService.getDailyProfitReport(query)`.
    tags: [Reports - Financial]
    security:
      - cookieAuth: []
    parameters:
      - $ref: ./common.yaml#/PaginationQuery
    responses:
      "200":
        description: |
          `{ success: true, result, error: null,
          message: "" }`.
        content:
          application/json:
            schema:
              $ref: ../schemas/common-reports.yaml#/GetGenericObjectResponse
      "401":
        description: No valid session.
        content:
          application/json:
            schema:
              $ref: ../schemas/common.yaml#/ErrorEnvelope

/api/reports/daily-profit-reports/{date}:
  get:
    operationId: getDailyProfitReportByDate
    summary: Daily profit snapshot for a date
    description: |
      Returns the daily profit snapshot for the
      supplied `date` path parameter. The handler
      applies **timezone conversion** with
      `dayjs.utc(date).tz(timezone).toDate()`
      using the `X-Timezone` request header
      (defaults to `"Asia/Rangoon"`). Note the
      `process.env.TZ = "America/New_York"`
      side-effect at the top of the handler —
      this mutates the Node.js process TZ for
      the rest of the request and is not
      restored. Request-thread side-effect —
      concurrent requests under the same Node
      worker will see this flip.
    tags: [Reports - Financial]
    security:
      - cookieAuth: []
    x-security-note: |
      `process.env.TZ = "America/New_York"` is
      executed on every request. The header-based
      timezone is then layered on top. The
      effective timezone for downstream date
      math depends on which line runs first in
      the JS event loop — concurrent requests
      under the same Node worker will see the
      process env flipped while a sibling request
      is still in flight. Worth refactoring to
      not mutate the process env at all.
    parameters:
      - in: path
        name: date
        required: true
        schema: { type: string, description: "ISO date or YYYY-MM-DD" }
      - in: header
        name: X-Timezone
        required: false
        schema:
          type: string
          default: Asia/Rangoon
    responses:
      "200":
        description: |
          `{ success: true, error: null, message:
          "", result }`.
        content:
          application/json:
            schema:
              $ref: ../schemas/common-reports.yaml#/GetGenericObjectResponse
      "401":
        description: No valid session.
        content:
          application/json:
            schema:
              $ref: ../schemas/common.yaml#/ErrorEnvelope

