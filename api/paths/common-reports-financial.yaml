          type: string
          enum: [PENDING, APPROVED, REJECTED, RECEIVED, CANCELLED]
      - in: query
        name: paymentTerm
        schema: { type: string }
      - in: query
        name: supplier
        schema: { type: string }
    responses:
      "200":
        description: |
          `{ success: true, result, error: null,
          message: "" }`.
        content:
          application/json:
            schema:
              $ref: ../schemas/common-reports.yaml#/GetGenericObjectResponse
      "401":
        description: No valid session.
        content:
          application/json:
            schema:
              $ref: ../schemas/common.yaml#/ErrorEnvelope

/api/reports/grn-item-reports:
  get:
    operationId: getGRNItemReport
    summary: GRN item rows
    description: |
      Returns GRN item rows with the joined
      `grn`, `item`, `purchaseOrder`, `store`,
      `supplier` projections. Row shape per
      `grnItemReportSchema` (grnId, grn: { id,
      grnId, date, status, purchaseOrder, store,
      supplier }, purchasingId, itemId, item: {
      id, itemId, name, supplier, unit }, unit,
      purchasedPricePerUnit, qty, amount,
      status). Filters: `storeId` (.nullable),
      `supplierId`, `status` (`PENDING` /
      `APPROVED` / `REJECTED`).
    tags: [Reports - Financial]
    security:
      - cookieAuth: []
    x-security-note: |
      The repository's
      `getGRNItemReport` does not appear to
      enforce a `storeId` filter at the SQL
      level when `storeId` is `null` — clients
      who omit it will see all stores' GRN
      items. Multi-tenant hazard.
    parameters:
      - $ref: ./common.yaml#/PaginationQuery
      - in: query
        name: storeId
        schema: { type: string, nullable: true }
      - in: query
        name: supplierId
        schema: { type: string }
      - in: query
        name: status
        schema:
          type: string
          enum: [PENDING, APPROVED, REJECTED]
    responses:
      "200":
        description: |
          `{ success: true, result, message: "",
          error: "" }`. Supplier-side business
          data: purchase prices, qty, amounts.
        content:
          application/json:
            schema:
              $ref: ../schemas/common-reports.yaml#/GetGRNItemReportResponse
      "401":
        description: No valid session.
        content:
          application/json:
            schema:
              $ref: ../schemas/common.yaml#/ErrorEnvelope

