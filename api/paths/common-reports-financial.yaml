        name: id
        required: true
        schema: { type: string }
      - $ref: ./common.yaml#/PaginationQuery
      - in: query
        name: modules
        schema:
          type: array
          items:
            type: string
            enum: [OPD, IPD]
        style: form
        explode: true
    responses:
      "200":
        description: |
          `{ success: true, result, message: "",
          error: null }`.
        content:
          application/json:
            schema:
              $ref: ../schemas/common-reports.yaml#/GetGenericObjectResponse
      "401":
        description: No valid session.
        content:
          application/json:
            schema:
              $ref: ../schemas/common.yaml#/ErrorEnvelope

