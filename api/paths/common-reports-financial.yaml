/api/reports/stock-summary/export:
  get:
    operationId: exportStockSummary
    summary: Stock summary export (with auth-store scoping)
    description: |
      Returns the stock-item-summary export.
      Unlike the rest of the reports tree, this
      route explicitly resolves the current
      user's session via `AuthService` and
      forwards `session.storeId` to the service
      call (`stockSummaryService.stockItemSummaryExport(storeId, query)`).
      If the user has no `storeId` on their
      session, the call proceeds with `null` —
      the service is responsible for the
      fallback semantics.
    tags: [Reports - Operational]
    security:
      - cookieAuth: []
    x-security-note: |
      One of the few reports routes that pulls
      the session at all — most just call
      `verifyApiAuth()` and pass the query
      straight through. This is **correct** and
      shows the right pattern; the rest of the
      module is the outlier.
    parameters:
      - $ref: ./common.yaml#/PaginationQuery
    responses:
      "200":
        description: |
          `{ success: true, result, message: "",
          error: "" }`.
        content:
          application/json:
            schema:
              $ref: ../schemas/common-reports.yaml#/GetGenericObjectResponse
      "401":
        description: No valid session.
        content:
          application/json:
            schema:
              $ref: ../schemas/common.yaml#/ErrorEnvelope

