# =============================================================================
# Under-care doctor
# =============================================================================

/api/reports/under-care-doctor:
  get:
    operationId: getUnderCareDoctorSummary
    summary: Doctor-level under-care patient count
    description: |
      Returns one row per doctor with
      `doctorId`, `doctorName`, `totalPatients`.
      Row shape per `underCareDoctorReportSchema`.
      Filters: `start`, `end` (date range).
    tags: [Reports - Clinical]
    security:
      - cookieAuth: []
    x-security-note: |
      Bare `apiHandler` + manual `verifyApiAuth()`.
    parameters:
      - $ref: ./common.yaml#/PaginationQuery
      - in: query
        name: start
        schema: { type: string, format: date-time }
      - in: query
        name: end
        schema: { type: string, format: date-time }
    responses:
      "200":
        description: |
          `{ success: true, result, error: "" }`.
        content:
          application/json:
            schema:
              $ref: ../schemas/common-reports.yaml#/GetUnderCareDoctorSummaryResponse
      "401":
        description: No valid session.
        content:
          application/json:
            schema:
              $ref: ../schemas/common.yaml#/ErrorEnvelope

