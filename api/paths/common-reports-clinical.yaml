# docs/paths/common-reports-clinical.yaml
# Clinical & appointment-related report endpoints of
# the `common` REST module. 10 endpoints covering
# appointment analytics, follow-up, referral, and
# under-care-doctor views. Source files under
# src/app/api/(common)/reports/{appointments-by-*,
# follow-up-patients, referral-report, under-care-doctor}/.
# All are GET-only, all require an authenticated
# session, none declare explicit RBAC permissions.

# =============================================================================
# Appointments by doctor
# =============================================================================

/api/reports/appointments-by-doctor:
  get:
    operationId: getAppointmentsByDoctorReport
    summary: Doctor appointment-count summary
    description: |
      Returns one row per doctor with
      `totalAppointments`, `booked`, `confirmed`,
      `completed`, `cancelled` counts, plus
      `specialization` and `department`. PII is
      limited to doctor name + department.
    tags: [Reports - Clinical]
    security:
      - cookieAuth: []
    x-security-note: |
      Uses bare `apiHandler` with manual
      `verifyApiAuth()`. **No `permissions`
      declared** — any authenticated user can pull
      the cross-doctor appointment summary. Worth
      gating behind a "View Reports" action.
    parameters:
      - $ref: ./common.yaml#/PaginationQuery
      - in: query
        name: specialization
        schema: { type: string }
      - in: query
        name: department
        schema: { type: string }
    responses:
      "200":
        description: |
          `{ success: true, result, error: "" }`.
          `result` is whatever
          `appointmentByDoctorReportService.getReport`
          returns; the schema file
          `get-appointment-by-doctor-reports.schema.ts`
          defines the row shape as
          `appointmentsByDoctorReportSchema`
          (id, doctorId, doctorName, specialization,
          department, totalAppointments, booked,
          confirmed, completed, cancelled).
        content:
          application/json:
            schema:
              $ref: ../schemas/common-reports.yaml#/GetAppointmentsByDoctorResponse
      "401":
        description: No valid session.
        content:
          application/json:
            schema:
              $ref: ../schemas/common.yaml#/ErrorEnvelope

/api/reports/appointments-by-doctor/{id}:
  get:
    operationId: getAppointmentsByDoctorDoctorInfo
    summary: Doctor info card for the report
    description: |
      Returns the doctor info row
      (id, title, doctorId, user.fullName, …) used
      to header the report. Wraps
      `appointmentByDoctorReportService.getDoctorInfo(id)`.
    tags: [Reports - Clinical]
    security:
      - cookieAuth: []
    x-security-note: |
      `enhancedApiHandler` with
      `auth: { required: true }` only. No
      permissions array.
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    responses:
      "200":
        description: |
          `{ success: true, result, error: "",
          message: "" }`. Result is the `Doctor`
          row (or `null`).
        content:
          application/json:
            schema:
              $ref: ../schemas/common-reports.yaml#/GetDoctorInfoResponse
      "401":
        description: No valid session.
        content:
          application/json:
            schema:
              $ref: ../schemas/common.yaml#/ErrorEnvelope

/api/reports/appointments-by-doctor/{id}/patient:
  get:
    operationId: getAppointmentsByDoctorPatientList
    summary: Patient-level rows for a doctor
    description: |
      Returns the patient-level appointment
      rows for the given doctor id, with
      patientType/patientGroup/region/township/status
      filters.
    tags: [Reports - Clinical]
    security:
      - cookieAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
      - $ref: ./common.yaml#/PaginationQuery
      - in: query
        name: patientType
        schema: { type: string }
      - in: query
        name: patientGroup
        schema: { type: string }
      - in: query
        name: appointmentType
        schema: { type: string }
      - in: query
        name: region
        schema: { type: string }
      - in: query
        name: township
        schema: { type: string }
      - in: query
        name: status
        schema:
          type: string
          enum:
            - BOOKED
            - CONFIRMED
            - CANCELLED
            - COMPLETED
            - PENDING
            - RESCHEDULED
    responses:
      "200":
        description: |
          `{ success: true, result, error: "",
          message: "" }`. Row shape per
          `appointmentsByDoctorPatientSchema`
          (patientId, name, patientType,
          patientGroup, township, region,
          appointmentType, appointmentStatus,
          appointmentDate, start). **PII-heavy**
          (patient name, patient id, region /
          township).
        content:
          application/json:
            schema:
              $ref: ../schemas/common-reports.yaml#/GetAppointmentsByDoctorPatientResponse
      "401":
        description: No valid session.
        content:
          application/json:
            schema:
              $ref: ../schemas/common.yaml#/ErrorEnvelope

/api/reports/appointments-by-doctor/export:
  get:
    operationId: exportAppointmentsByDoctor
    summary: Export appointment rows by doctor
    description: |
      Returns one row per appointment, with both
      doctor-side and patient-side identifiers
      (id, doctorId, doctorName, patientId,
      patientName, township, region,
      appointmentType, appointmentDate, startTime,
      status). Despite the name "export", the
      response is JSON — the client renders the
      CSV. The schema is
      `appointmentsByDoctorReportExportSchema`
      (all string fields are nullable).
    tags: [Reports - Clinical]
    security:
      - cookieAuth: []
    x-security-note: |
      Bare `apiHandler` + manual `verifyApiAuth()`.
      **PII exposure**: full patient name + id +
      township + region + appointment timestamp
      per row.
    parameters:
      - $ref: ./common.yaml#/PaginationQuery
      - in: query
        name: specialization
        schema: { type: string }
      - in: query
        name: department
        schema: { type: string }
    responses:
      "200":
        description: |
          `{ success: true, result, error: "" }`.
          `result` is an array of export rows
          (PII-heavy).
        content:
          application/json:
            schema:
              $ref: ../schemas/common-reports.yaml#/GetAppointmentsByDoctorExportResponse
      "401":
        description: No valid session.
        content:
          application/json:
            schema:
              $ref: ../schemas/common.yaml#/ErrorEnvelope

/api/reports/appointments-by-specialization:
  get:
    operationId: getAppointmentsBySpecializationReport
    summary: Appointment count aggregated by specialization
    description: |
      Returns one row per specialization with
      `totalAppointments`, `booked`, `confirmed`,
      `completed`, `cancelled` counts. The service
      coerces the integer aggregates with
      `z.coerce.number()` — string inputs from
      raw SQL are tolerated.
    tags: [Reports - Clinical]
    security:
      - cookieAuth: []
    x-security-note: |
      Bare `apiHandler` + manual `verifyApiAuth()`.
      No RBAC.
    parameters:
      - $ref: ./common.yaml#/PaginationQuery
      - in: query
        name: specialization
        schema: { type: string }
    responses:
      "200":
        description: |
          `{ success: true, result, error: "" }`.
          Row shape per
          `appointmentsBySpecializationReportSchema`.
        content:
          application/json:
            schema:
              $ref: ../schemas/common-reports.yaml#/GetAppointmentsBySpecializationResponse
      "401":
        description: No valid session.
        content:
          application/json:
            schema:
              $ref: ../schemas/common.yaml#/ErrorEnvelope

# =============================================================================
# Follow-up patients
# =============================================================================

/api/reports/follow-up-patients:
  get:
    operationId: getFollowUpPatients
    summary: Follow-up patient list
    description: |
      Returns one row per upcoming follow-up
      appointment, with **heavy PII**: patient
      name, patient id, phone_no, age, gender,
      doctor name + id, specialization,
      appointment type id + name, status,
      createdAt + createdByName. Row shape per
      `followUpPatientSchema`.
    tags: [Reports - Clinical]
    security:
      - cookieAuth: []
    x-security-note: |
      `enhancedApiHandler` with
      `auth: { required: true }` only. PII
      includes phone number. The `age` field is
      typed `z.coerce.date()` in the schema —
      **runtime shape is a Date, not a number**
      (the service likely sends a `DATE` literal
      from raw SQL).
    parameters:
      - $ref: ./common.yaml#/PaginationQuery
      - in: query
        name: specialization
        schema: { type: string }
      - in: query
        name: appointmentTypeId
        schema: { type: string }
      - in: query
        name: gender
        schema:
          type: string
          enum: [MALE, FEMALE, OTHER]
      - in: query
        name: appointmentStatus
        schema:
          type: string
          enum: [BOOKED, CONFIRMED, CANCELLED, COMPLETED]
    responses:
      "200":
        description: |
          `{ success: true, result, message: "",
          error: "" }`.
        content:
          application/json:
            schema:
              $ref: ../schemas/common-reports.yaml#/GetFollowUpPatientsResponse
      "401":
        description: No valid session.
        content:
          application/json:
            schema:
              $ref: ../schemas/common.yaml#/ErrorEnvelope

