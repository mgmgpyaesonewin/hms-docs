# docs/paths/emr-ed.yaml
# ED-EMR REST surface under
# `src/app/api/(emr)/(ed)/`. 18
# read-only endpoints split into
# four "specialty" sub-trees
# (ed-emr, endo-ed-emr, hd-ed-emr,
# ot-ed-emr) plus the appointments /
# patients probes. Same shape as
# the OPD-EMR sub-tree (4 ops per
# sub-tree: list, detail,
# service-request list, detail).
#
# All 18 routes use
# `enhancedApiHandler` with
# `auth: { required: true }` only —
# no RBAC. All 18 are GET-only and
# return
# `{ success: true, result, message:
# "", error: null }`.
#
# **Code-reuse observation:** every
# route in this subtree imports from
# `@/app/(dashboard)/shared/emr/
# opd/service/opd-emr.service` —
# the **OPD-EMR** service file is
# the workhorse for the entire ED
# subtree as well. The 4 ED-side
# service exports (`edEmrService`,
# `endoEdEmrService`, `hdEdEmrService`,
# `otEdEmrService`) are all
# `OPDEmrService` instances with
# different `moduleType` configs.

# =============================================================================
# Appointments and patient lists
# =============================================================================

/api/appointments-for-ed-emr:
  get:
    operationId: getAppointmentsForEdEmr
    summary: Get a patient's appointments (for ED-EMR)
    description: |
      Returns the appointments for a
      single patient, used when
      building an ED EMR. Service:
      `OPDEmrService.getAppointmentForOpdEmr`
      (on the `edEmrService` instance,
      which is `OPDEmrService` with
      `moduleType: "ED"`,
      `appointmentModule:
      ModuleEnum.EMERGENCY`,
      `includeEdProxyBillJoints: true`).

      Schema: `getAppointmentForProxySchema`
      (same as the OPD-EMR version
      and the proxy-bill one).
    tags: [ED-EMR]
    security:
      - cookieAuth: []
    parameters:
      - in: query
        name: patientId
        required: true
        schema: { type: string }
      - in: query
        name: includeAppointmentId
        required: false
        schema: { type: string }
    responses:
      "200":
        description: |
          `{ success: true, result, message:
          "", error: null }`.
        content:
          application/json:
            schema:
              $ref: ../schemas/emr.yaml#/GetAppointmentsForOpdEmrResponse
      "401":
        description: No valid session.
        content:
          application/json:
            schema:
              $ref: ../schemas/common.yaml#/ErrorEnvelope

/api/patients-for-ed-emr:
  get:
    operationId: getPatientsForEdEmr
    summary: Patients eligible for ED-EMR
    description: |
      Returns the paginated list of
      patients suitable for an ED-EMR
      (reuses the shared
      `getPatientsSchema` from the
      `common` module). Service: `OPDEmrService
      .getPatientForOPDEmr` (on the
      `edEmrService` instance).

      PII-heavy: name, phone, nrcNo,
      township, region, etc.
    tags: [ED-EMR]
    security:
      - cookieAuth: []
    x-security-note: |
      `auth: { required: true }` only
      — no RBAC. PII-heavy.
    parameters:
      - $ref: ../schemas/common.yaml#/PaginationQuery
    responses:
      "200":
        description: |
          `{ success: true, result, message:
          "", error: null }`.
        content:
          application/json:
            schema:
              $ref: ../schemas/emr.yaml#/GetPatientsForOpdEmrResponse
      "401":
        description: No valid session.
        content:
          application/json:
            schema:
              $ref: ../schemas/common.yaml#/ErrorEnvelope

