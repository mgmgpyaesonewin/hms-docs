# docs/paths/trpc-units.yaml
# tRPC router: units (src/lib/trpc/routers/units.ts)
# CRUD over the `Unit` model. All six procedures use `authProcedure`
# (not `verifyPasswordProcedure`, not `authorizeProcedure`).
x-trpc-source: src/lib/trpc/routers/units.ts
x-trpc-router: units

/api/trpc/units.createUnit:
  post:
    summary: Create a new unit
    description: |
      Authenticated mutation. Creates a new Unit.

      Validation failures:
        - Empty `name` or `abbreviation` ŌåÆ 400.
        - A unit with the same `name` already exists
          (`getUnitByName` ŌĆö case-insensitive contains-match) ŌåÆ 400
          (`AppError("Unit with name <name> already exists", 400)`).
        - A unit with the same `abbreviation` already exists
          (`getUnitByAbbreviation` ŌĆö case-insensitive equality) ŌåÆ 400
          (`AppError("Unit with abbreviation <abbr> already exists", 400)`).

      Side effects:
        - Records `createdById` and `updatedById` as `ctx.user.id`.
        - Calls `revalidatePath("/set-up/units")`.
        - Logs the creation via `activityLogger`
          (description: "Created Unit", action: "Create",
          entity: "Unit", entityId: result.id).

      Response **does** include `createdBy` and `updatedBy` ŌĆö unlike
      the categories/sub-categories modules, the repository's
      `createUnit` uses `include: { createdBy: true, updatedBy: true }`.

      Service: `UnitService.createUnit`. Source:
      `src/lib/trpc/routers/units.ts:11-20`.
    tags:
      - Units
    operationId: trpc_units_createUnit
    security:
      - SessionAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../schemas/trpc-units.yaml#/CreateUnitInput
    responses:
      "200":
        description: Unit created. Full shape with `createdBy` and `updatedBy`.
        content:
          application/json:
            schema:
              $ref: ../schemas/trpc-units.yaml#/Unit
      "400":
        description: Validation failure (empty name/abbreviation, or name/abbreviation collision).
        content:
          application/json:
            schema:
              $ref: ../schemas/common.yaml#/ErrorEnvelope
      "401":
        description: No valid session.
        content:
          application/json:
            schema:
              $ref: ../schemas/common.yaml#/ErrorEnvelope

/api/trpc/units.getUnits:
  post:
    summary: List units (paginated, searchable)
    description: |
      Authenticated query. Returns a paginated list of units with the
      total row count.

      Response shape:
        ```
        { units: Unit[], count: number }
        ```
      (Field named `units`, **not** `data`.)

      Filters (from `defaultQuerySchema`):
        - `search` ŌĆö case-insensitive substring match against
          `name` **or** `abbreviation` (per
          `buildWhereFilter` at unit-repository.ts:143-164).

      The repository orders by `createdAt: desc`.

      Service: `UnitService.getUnits`. Source:
      `src/lib/trpc/routers/units.ts:22-30`.
    tags:
      - Units
    operationId: trpc_units_getUnits
    security:
      - SessionAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../schemas/common.yaml#/PaginationQuery
    responses:
      "200":
        description: Paginated list of units.
        content:
          application/json:
            schema:
              $ref: ../schemas/trpc-units.yaml#/GetUnitsResponse
      "401":
        description: No valid session.
        content:
          application/json:
            schema:
              $ref: ../schemas/common.yaml#/ErrorEnvelope

