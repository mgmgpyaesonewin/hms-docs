/api/reports/supplier-items/{id}:
  get:
    operationId: getSupplierItemsReportById
    summary: Items from a single supplier
    description: |
      Returns the line-item rows for a single
      supplier: `supplierName`, `totalAmount`,
      `items: [{ companyBatchNo, expiryDate,
      grossAmount, itemId, itemName,
      pricePerUnit, purchaseOrderId,
      purchasedDate, qty, unitName,
      unitAbbreviation }]`. Row shape per
      `supplierItemsByIdSchema`.

      The schema's transform **throws an
      Error("No items found for supplier.")**
      if the array is empty. `apiHandler`
      catches that and returns a 500 with
      `error: "No items found for supplier."`
      — meaning a missing supplier id
      surfaces as a 500, not a 404. The 500
      error message is also unhelpful
      (clients cannot distinguish
      "supplier not found" from "supplier has
      no items").
    tags: [Reports - Inventory]
    security:
      - cookieAuth: []
    x-security-note: |
      **500 on empty result** — the schema's
      transform throws if the SQL returns no
      rows, which is the "not found" case.
      apiHandler catches the throw and returns
      500. A 404 would be more accurate. The
      error message "No items found for
      supplier." is also generic — clients
      cannot tell apart "supplier not found"
      and "supplier exists but no purchases
      yet".
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
      - $ref: ./common.yaml#/PaginationQuery
    responses:
      "200":
        description: |
          `{ success: true, result, error: null }`
          (the route has no `message` field).
        content:
          application/json:
            schema:
              $ref: ../schemas/common-reports.yaml#/GetSupplierItemsByIdResponse
      "401":
        description: No valid session.
        content:
          application/json:
            schema:
              $ref: ../schemas/common.yaml#/ErrorEnvelope
      "500":
        description: |
          Returned when the supplier has no
          items. Error message: "No items found
          for supplier." Schema-thrown Error
          (not AppError), so the status code
          is 500.
        content:
          application/json:
            schema:
              $ref: ./common.yaml#/ErrorEnvelope
