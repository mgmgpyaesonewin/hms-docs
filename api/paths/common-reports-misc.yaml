    description: |
      Returns one row per supplier with
      `supplier`, `totalAmount`, `supplierId`.
      Row shape per `supplierItemsSchema`.
    tags: [Reports - Inventory]
    security:
      - cookieAuth: []
    x-security-note: |
      Bare `apiHandler` + manual `verifyApiAuth()`.
    parameters:
      - $ref: ./common.yaml#/PaginationQuery
    responses:
      "200":
        description: |
          `{ success: true, result, error: "" }`.
        content:
          application/json:
