      - in: query
        name: max
        schema: { type: boolean, description: "Preprocess `=== 'true'`" }
      - in: query
        name: emptyStock
        schema: { type: boolean, description: "Preprocess `=== 'true'`" }
      - in: query
        name: reOrder
        schema: { type: boolean, description: "Preprocess `=== 'true'`" }
    responses:
      "200":
        description: |
          `{ success: true, result, message: "",
          error: "" }`.
        content:
          application/json:
            schema:
              $ref: ../schemas/common-reports.yaml#/GetItemSummaryStockPerStoreResponse
      "401":
        description: No valid session.
        content:
          application/json:
            schema:
              $ref: ../schemas/common.yaml#/ErrorEnvelope

# =============================================================================
# Patient summary
# =============================================================================

/api/reports/patient-summary:
  get:
    operationId: getPatientSummaryByTownship
    summary: Patient count by township
    description: |
      Returns one row per township with
      `township`, `region`, `patient_count`.
      Row shape per `patientSummarySchema`
      (note: the **transform does not
      camelCase** the `patient_count` field —
      it stays as `patient_count` in the
      response, even though all the other
      field names are already lowercase).
      Filter: `region` (optional).
    tags: [Reports - Patient]
    security:
      - cookieAuth: []
    x-security-note: |
      Schema-typo: the `transform` for
      `patientSummarySchema` does not rename
      `patient_count` to `patientCount`. The
      wire shape is
      `{ township, region, patient_count }`
      while the other schemas in the same
      file camelCase every field. Worth
      flagging.
    parameters:
      - $ref: ./common.yaml#/PaginationQuery
      - in: query
        name: region
        schema: { type: string }
    responses:
      "200":
        description: |
          `{ success: true, result, message: "",
          error: "" }`.
        content:
          application/json:
            schema:
              $ref: ../schemas/common-reports.yaml#/GetPatientSummaryByTownshipResponse
      "401":
        description: No valid session.
        content:
          application/json:
            schema:
              $ref: ../schemas/common.yaml#/ErrorEnvelope

/api/reports/patient-summary/by-region:
  get:
    operationId: getPatientSummaryByRegion
    summary: Patient count by region
    description: |
      Returns one row per region. The service
      is `PatientSummaryService.getPatientSummaryByRegion(query)`.
    tags: [Reports - Patient]
    security:
      - cookieAuth: []
    x-security-note: |
      Bare `apiHandler` + manual `verifyApiAuth()`.
      The route declares
      `params: { id: number }` (mirroring the
      same bug as `/api/reports/item-summary`)
      but **the `id` is awaited and discarded
      — `await params;` then never used**. The
      route does not actually look up a
      specific region. The path
      `/by-region` is purely cosmetic.
    parameters:
      - $ref: ./common.yaml#/PaginationQuery
    responses:
      "200":
        description: |
          `{ success: true, result, error: "" }`.
        content:
          application/json:
            schema:
              $ref: ../schemas/common-reports.yaml#/GetGenericObjectResponse
      "401":
        description: No valid session.
        content:
          application/json:
            schema:
              $ref: ../schemas/common.yaml#/ErrorEnvelope

# =============================================================================
# Supplier items
# =============================================================================

