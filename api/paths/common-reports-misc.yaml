# docs/paths/common-reports-misc.yaml
# Inventory, patient, and supplier-item report
# endpoints of the `common` REST module. 12
# endpoints covering item summary, patient
# summary, supplier items. All are GET-only, all
# require an authenticated session, none declare
# explicit RBAC permissions. Source files under
# src/app/api/(common)/reports/{item-summary,
# patient-summary, supplier-items, top-products}.

# =============================================================================
# Item summary
# =============================================================================

/api/reports/item-summary:
  get:
    operationId: getItemSummary
    summary: Per-item stock summary
    description: |
      Returns one row per item with
      `id`, `item` (name), `itemId` (code),
      `generic`, `minQty`, `maxQty`,
      `reOrderQty`, `category`, `allStocksQty`,
      `unit`, `unitAbbreviation`. Row shape per
      `itemSummarySchema`.

      **The route declares
      `params: { id: number }` but the
      `id` path parameter is never read** —
      `getItemSummary` is called with the
      validated query, not the id. The
      declaration is a TypeScript-level
      misnomer; the route does NOT actually
      look up a single item by id. (Use
      `/api/reports/item-summary/{id}` for the
      single-item lookups.) This is a route
      bug — the params are silently ignored,
      so any caller that thinks they're
      fetching a single item will instead get
      the full paginated list.
    tags: [Reports - Inventory]
    security:
      - cookieAuth: []
    x-security-note: |
      Bare `apiHandler` with manual
      `verifyApiAuth()`. The unused
      `params: { id: number }` declaration is a
      latent bug.
    parameters:
      - $ref: ./common.yaml#/PaginationQuery
      - in: query
        name: min
        schema: { type: boolean, description: "Preprocess `=== 'true'`; only the literal string \"true\" yields true." }
      - in: query
        name: max
        schema: { type: boolean, description: "Preprocess `=== 'true'`; only the literal string \"true\" yields true." }
      - in: query
        name: emptyStock
        schema: { type: boolean, description: "Preprocess `=== 'true'`" }
      - in: query
        name: reOrder
        schema: { type: boolean, description: "Preprocess `=== 'true'`" }
    responses:
      "200":
        description: |
          `{ success: true, result, error: "" }`.
        content:
          application/json:
            schema:
              $ref: ../schemas/common-reports.yaml#/GetItemSummaryResponse
      "401":
        description: No valid session.
        content:
          application/json:
            schema:
              $ref: ../schemas/common.yaml#/ErrorEnvelope

/api/reports/item-summary/{id}:
  get:
    operationId: getItemSummaryById
    summary: Single-item summary info
    description: |
      Returns the info row for a single item
      (`itemName`, `itemId`, `generic`,
      `allStocksQty`, `unitName`). Row shape
      per `itemSummaryInfoSchema`. The service
      method is `getItemSummaryById(id)`.
    tags: [Reports - Inventory]
    security:
      - cookieAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    responses:
      "200":
        description: |
          `{ success: true, result, error: "" }`.
        content:
          application/json:
            schema:
              $ref: ../schemas/common-reports.yaml#/GetItemSummaryByIdResponse
      "401":
        description: No valid session.
        content:
          application/json:
            schema:
              $ref: ../schemas/common.yaml#/ErrorEnvelope

/api/reports/item-summary/{id}/batches:
  get:
    operationId: getItemSummaryByIdWithBatches
    summary: Per-batch breakdown for an item
    description: |
      Returns per-batch totals for the item
      (batchNo, totalQty, stores: [{ storeName,
      qty }]). Row shape per
      `itemSummaryByIdWithBatchSchema`.
    tags: [Reports - Inventory]
    security:
      - cookieAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    responses:
      "200":
        description: |
          `{ success: true, result, error: "" }`.
        content:
          application/json:
            schema:
              $ref: ../schemas/common-reports.yaml#/GetItemSummaryByIdWithBatchesResponse
      "401":
        description: No valid session.
        content:
          application/json:
            schema:
              $ref: ../schemas/common.yaml#/ErrorEnvelope

/api/reports/item-summary/{id}/item-batches:
  get:
    operationId: getItemSummaryByIdWithItemBatches
    summary: Per-item-batch breakdown for an item
    description: |
      Almost identical to `/batches` but the
      row key is `item_batch_no` (the
      `ItemBatch.no` column) instead of
      `batch_no` (the `Batch.no` column). The
      service
      (`getItemSummaryByIdWithItemBatches`) is
      distinct. The two sibling endpoints are
      only meaningfully different if an item
      has both `Batch` and `ItemBatch` rows —
      worth confirming the upstream model.
    tags: [Reports - Inventory]
    security:
      - cookieAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    responses:
      "200":
        description: |
          `{ success: true, result, error: null,
          message: "" }`. Row shape per
          `itemSummaryByIdWithItemBatchSchema`
          (itemBatchNo, totalQty, stores).
        content:
          application/json:
            schema:
              $ref: ../schemas/common-reports.yaml#/GetItemSummaryByIdWithItemBatchesResponse
      "401":
        description: No valid session.
        content:
          application/json:
            schema:
              $ref: ../schemas/common.yaml#/ErrorEnvelope

