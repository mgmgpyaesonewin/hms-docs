# docs/paths/common-service-category.yaml
# REST endpoint: GET /api/service-category
# Source: src/app/api/(common)/service-category/route.ts
#
# Single read-only endpoint. The corresponding write
# operations (create / update / delete) are reached via
# server actions / tRPC — they are NOT exposed as REST
# routes here.

/api/service-category:
  get:
    summary: List service categories (paginated, filterable)
    description: |
      Authenticated query. Returns a paginated list of
      service categories with the total row count.

      Response shape:
        ```
        {
          success: true,
          result: {
            servicecategory: ServiceCategory[],
            totalCount: number,
          },
          error: ""
        }
        ```

      Filters (from `getServiceCategorySchema`,
      interpreted by the repository's
      `findServiceCategory`):
        - `search` — case-insensitive substring match
          against `name`.
        - `start` / `end` — `createdAt` range
          (`gte` / `lte`).
        - `categoryId` — **accepted by Zod but NOT
          wired into the `where` clause** by the
          repository (service-category-repository.ts:33-67).
          Silently dropped.
        - `departmentId` — same as `categoryId`;
          accepted but ignored.

      Repository ordering: **`updatedAt: desc`** —
      this is unique among the `common-*`
      sub-areas (the rest order by `createdAt:
      desc`). The repository uses a
      `prisma.$transaction` to combine the
      `findMany` and `count` queries (rather than
      `Promise.all`); the practical effect is the
      same (consistent snapshot) but it's worth
      flagging as a stylistic outlier.

      The route uses `enhancedApiHandler` with
      `auth: { required: true }` but no
      `permissions` array, so any authenticated
      user can read the full list.

      Source:
      `src/app/api/(common)/service-category/route.ts:7-23`.
    tags:
      - Common / Service Category
    operationId: rest_common_service_category_list
    security:
      - SessionAuth: []
    parameters:
      - $ref: ../schemas/common.yaml#/PaginationQueryParams
      - in: query
        name: categoryId
        schema:
          type: string
        description: |
          Accepted but **not used** by the repository
          — silently dropped.
      - in: query
        name: departmentId
        schema:
          type: string
        description: |
          Accepted but **not used** by the repository
          — silently dropped.
    responses:
      "200":
        description: Paginated list of service categories.
        content:
          application/json:
            schema:
              $ref: ../schemas/common-service-category.yaml#/GetServiceCategoryResponse
      "401":
        description: No valid session.
        content:
          application/json:
            schema:
              $ref: ../schemas/common.yaml#/ErrorEnvelope

# -----------------------------------------------------------------------------
# Security notes
# -----------------------------------------------------------------------------
x-security-notes: |
  - **No RBAC permissions declared** — the route
    declares only `auth: { required: true }`, no
    `permissions` array. Any authenticated user can
    read the full list of service categories,
    including the `createdBy` / `updatedBy` PII
    projection.
  - **Inconsistent response envelope** — the success
    shape is `{ success: true, result, error: "" }`
    (no `message` field). The other `common-*`
    sub-areas that use `enhancedApiHandler` emit
    `{ success: true, result, message: "", error: null }`
    or similar.
  - **Repository field is `servicecategory` (no
    case boundary)** — the response field is named
    `servicecategory`, not `serviceCategories` or
    `data`. This is a service-side naming oddity
    consumers should be aware of.
  - **`categoryId` / `departmentId` filters are
    silently ignored** — the Zod schema accepts both
    fields but the repository's `findServiceCategory`
    does not consult them
    (service-category-repository.ts:33-67). This is
    a known dead-code/half-implementation pattern;
    the sub-category endpoint (see
    [[common-service-sub-category]]) **does** wire
    `categoryId` into its `where.serviceCategoryId`
    clause, so the asymmetry between the two
    endpoints is the most likely fix. The
    `departmentId` filter is not used by either
    endpoint and is presumably a planned feature.
  - **Ordering is `updatedAt: desc` (not
    `createdAt: desc`)** — unique among the
    `common-*` sub-areas. Means the list is
    "recently modified" rather than "recently
    created" — sensible for a setup page where
    edits are common, but worth documenting.
  - **Write path uses server actions / tRPC, not
    REST** — `createServiceCategory` /
    `updateServiceCategory` /
    `deleteServiceCategory` are reached via server
    actions or tRPC. The REST surface is read-only.
  - **Service activity-log typo** — the
    `updateServiceCategory` activity log emits
    `entity: "Servicev Category"`
    (service-category.service.ts:92) — a
    `v`-suffix typo. Same typo on
    `updateServiceSubCategory` (`entity: "Servicev
    Sub Category"`, line 104).
  - **Repository uses `Prisma.ServiceUpdateArgs`
    for the `ServiceCategory` update** — the
    `updateServiceCategory` method types its
    `data` parameter as
    `Prisma.ServiceUpdateArgs["data"]`
    (service-category-repository.ts:103) — a
    copy-paste leftover from a sibling `Service`
    repository. The Prisma types for `Service` and
    `ServiceCategory` are structurally similar
    enough that this works at runtime (the
    `$transaction` accepts the same shape), but the
    type system is now lying about what's being
    passed.
  - **Delete uses 409 for FK violations** — the
    repository's `deleteServiceCategory` catches
    `isForeignKeyConstraintViolationError` and
    re-throws as
    `AppError("This service category has previous
    history.You cannot delete right now.", 409)`
    (service-category-repository.ts:112-130). This
    is the **correct** status code (matching the
    project standard) — the sub-category endpoint
    does the same. Note the typo "history.You" with
    no space after the period.
  - **`@@index([name])` is redundant** — the
    Prisma model declares both `name @unique` and
    `@@index([name])`. The unique constraint
    already provides an index; the second index is
    dead weight at write time.
  - **Update uses 400 for "not found", 409 for
    "name already exists"** — mixed status codes
    in the same method
    (service-category.service.ts:64, 76). The
    409 is correct, but 400 for "not found" is
    inconsistent with `updateRole` (which uses
    404) and `updateSpecialization` (which uses
    400 — same as this one). The codebase has no
    standard.
