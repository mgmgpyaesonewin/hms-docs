openapi: 3.1.0

info:
  title: Summary Service API
  version: 0.1.0
  summary: Consultation Fees Invoice lifecycle and admin summary reporting
  description: |
    HTTP API for the Summary Service. Internal-only — bound to 127.0.0.1:4000.
    Called by the YCare HMS Next.js BFF.

    All endpoints (except `GET /healthz`) require HMAC-SHA256 authentication
    with a shared secret (see `hmac-auth.md`). The BFF signs each request;
    the service validates the signature, timestamp, and replay window.

    All multi-tenant data is scoped by the verified `X-Tenant-Id` header
    (signed as part of the HMAC), not by any value in the request body.

    `status` on the CFI reflects the **patient's payment to the hospital** for
    the consultation fee, NOT the doctor's receipt of payout. See README → Future work → Doctor payout workflow.

servers:
  - url: http://127.0.0.1:4000
    description: Local BFF (the only caller)

tags:
  - name: health
    description: Health check (no auth)
  - name: consultation-fees-invoices
    description: CFI list, detail, status, and adjustment endpoints

security:
  - HmacAuth: []

paths:
  /healthz:
    get:
      tags: [health]
      summary: Liveness probe
      description: |
        Returns 200 OK if the API process is running and can answer HTTP.
        Does NOT check Postgres or Redis (use `/readyz` for that, if added in v2).
      security: []
      responses:
        "200":
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /consultation-fees-invoices:
    get:
      tags: [consultation-fees-invoices]
      summary: List consultation fees invoices (paginated)
      description: |
        Returns CFIs for the verified tenant, filtered by date range, counter,
        doctor, status, and substring search on the OPD/IPD invoice number.
        Sorted by `billing_date DESC` by default.
      parameters:
        - $ref: "#/components/parameters/XTenantId"
        - $ref: "#/components/parameters/XTimestamp"
        - $ref: "#/components/parameters/XSignature"
        - $ref: "#/components/parameters/XServiceId"
        - name: from
          in: query
          required: false
          schema: { type: "string", format: "date-time" }
          description: Filter on `billing_date >= from`. Defaults to the start of the current month.
        - name: to
          in: query
          required: false
          schema: { type: "string", format: "date-time" }
          description: Filter on `billing_date < to`. Defaults to now.
        - name: counterId
          in: query
          required: false
          schema: { type: "string", format: "uuid" }
        - name: doctorId
          in: query
          required: false
          schema: { type: "string", format: "uuid" }
        - name: status
          in: query
          required: false
          schema:
            type: "string"
            enum: ["UNPAID", "PAID", "VOID"]
          description: Multi-value via repeated query string (`?status=UNPAID&status=PAID`).
        - name: search
          in: query
          required: false
          schema: { type: "string", minLength: 1, maxLength: 200 }
          description: |
            Substring match (case-insensitive) against the parent's OPD or IPD
            patient-direct invoice number (`invoice_no` on the CFI, denormalized
            from the parent invoice). The CFI itself has no separate invoice
            number — the search finds CFIs by the parent's invoice number,
            whether OPD or IPD. **v1 caveat:** only OPD invoices create CFIs, so
            searching an IPD invoice number returns zero results in v1. The search
            semantics are forward-compatible with v2+ IPD support. Doctor name and
            patient name are intentionally not searchable (use the `doctorId` filter
            and the HMS patient search, respectively). Min 1, max 200 characters.
            Backed by a `pg_trgm` GIN index (ADR 0010).
        - name: limit
          in: query
          required: false
          schema: { type: "integer", minimum: 1, maximum: 100, default: 25 }
        - name: cursor
          in: query
          required: false
          schema: { type: "string" }
          description: Opaque cursor from a previous response.
        - name: sort
          in: query
          required: false
          schema:
            type: "string"
            enum: ["billing_date_desc", "billing_date_asc", "paid_at_desc", "amount_desc", "payout_amount_desc"]
          default: "billing_date_desc"
      responses:
        "200":
          description: A page of CFIs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CfiListResponse"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /consultation-fees-invoices/aggregates:
    get:
      tags: [consultation-fees-invoices]
      summary: Aggregate counters for the dashboard
      description: |
        Returns totals (sum, count) by status for the current filter.
        Reads from Redis if available, falls back to Postgres otherwise.
        The `X-Cache-Status` response header indicates which path was used.
      parameters:
        - $ref: "#/components/parameters/XTenantId"
        - $ref: "#/components/parameters/XTimestamp"
        - $ref: "#/components/parameters/XSignature"
        - $ref: "#/components/parameters/XServiceId"
        - name: from
          in: query
          required: false
          schema: { type: "string", format: "date-time" }
        - name: to
          in: query
          required: false
          schema: { type: "string", format: "date-time" }
        - name: counterId
          in: query
          required: false
          schema: { type: "string", format: "uuid" }
        - name: doctorId
          in: query
          required: false
          schema: { type: "string", format: "uuid" }
        - name: status
          in: query
          required: false
          schema:
            type: "string"
            enum: ["UNPAID", "PAID", "VOID"]
      responses:
        "200":
          description: Aggregates
          headers:
            X-Cache-Status:
              schema: { type: "string", enum: ["hit", "bypass"] }
              description: "hit = served from Redis; bypass = computed from Postgres (Redis was down)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CfiAggregatesResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }

  /consultation-fees-invoices/{id}:
    get:
      tags: [consultation-fees-invoices]
      summary: Get one CFI with full history
      parameters:
        - $ref: "#/components/parameters/XTenantId"
        - $ref: "#/components/parameters/XTimestamp"
        - $ref: "#/components/parameters/XSignature"
        - $ref: "#/components/parameters/XServiceId"
        - name: id
          in: path
          required: true
          schema: { type: "string", format: "uuid" }
      responses:
        "200":
          description: The CFI
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CfiDetailResponse"
        "404": { $ref: "#/components/responses/NotFound" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /consultation-fees-invoices/{id}/status:
    patch:
      tags: [consultation-fees-invoices]
      summary: Update the CFI's status
      description: |
        Allowed transitions: UNPAID → PAID, UNPAID → VOID. Terminal states
        (PAID, VOID) cannot transition. Returns 409 INVALID_TRANSITION
        otherwise. The `If-Match` header carries the version; returns 409
        VERSION_MISMATCH on conflict.
      parameters:
        - $ref: "#/components/parameters/XTenantId"
        - $ref: "#/components/parameters/XTimestamp"
        - $ref: "#/components/parameters/XSignature"
        - $ref: "#/components/parameters/XServiceId"
        - name: id
          in: path
          required: true
          schema: { type: "string", format: "uuid" }
        - name: If-Match
          in: header
          required: true
          schema: { type: "integer" }
          description: The current `version` of the CFI (optimistic locking).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: "object"
              required: ["status"]
              properties:
                status:
                  type: "string"
                  enum: ["PAID", "VOID"]
                reason:
                  type: "string"
                  maxLength: 500
                  description: Optional for PAID; recommended for VOID.
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cfi"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: |
            Conflict. The body has a `code` field:
            - `VERSION_MISMATCH` — `If-Match` does not match the current version. Body includes `currentVersion`.
            - `INVALID_TRANSITION` — the requested status is not reachable from the current status. Body includes `currentStatus` and `requestedStatus`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConflictResponse"

  /consultation-fees-invoices/{id}/adjustment:
    post:
      tags: [consultation-fees-invoices]
      summary: Add or update the CFI's adjustment
      description: |
        Updates the `adjustment` field. Allowed only while the CFI is `UNPAID`.
        Returns 409 ADJUSTMENT_LOCKED if the CFI is `PAID` or `VOID`.
        The `If-Match` header carries the version; returns 409 VERSION_MISMATCH
        on conflict.
      parameters:
        - $ref: "#/components/parameters/XTenantId"
        - $ref: "#/components/parameters/XTimestamp"
        - $ref: "#/components/parameters/XSignature"
        - $ref: "#/components/parameters/XServiceId"
        - name: id
          in: path
          required: true
          schema: { type: "string", format: "uuid" }
        - name: If-Match
          in: header
          required: true
          schema: { type: "integer" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: "object"
              required: ["amount", "reason"]
              properties:
                amount:
                  type: "number"
                  format: "double"
                  minimum: 0
                  description: Non-negative. CHECK constraint enforces `amount <= cfi.amount`.
                reason:
                  type: "string"
                  minLength: 1
                  maxLength: 500
      responses:
        "200":
          description: Adjustment updated; `payout_amount` recomputed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cfi"
        "400":
          description: |
            Validation failure:
            - amount out of range (negative, exceeds cfi.amount, etc.)
            - reason empty or > 500 chars
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: |
            Conflict. The body has a `code` field:
            - `VERSION_MISMATCH` — `If-Match` does not match the current version.
            - `ADJUSTMENT_LOCKED` — CFI is `PAID` or `VOID`; adjustment is immutable.
            - `ADJUSTMENT_EXCEEDS_AMOUNT` — new adjustment would make payout negative.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConflictResponse"

components:
  securitySchemes:
    HmacAuth:
      type: "apiKey"
      in: "header"
      name: "X-Signature"
      description: |
        HMAC-SHA256 signature. See `hmac-auth.md` for the exact algorithm.

        Required headers on every request (except /healthz):
        - `X-Service-Id: hms-bff`
        - `X-Timestamp: <unix-seconds>` (within ±5 minutes of server time)
        - `X-Tenant-Id: <uuid>` (the verified tenant identity)
        - `X-Signature: <hex>` (HMAC of `METHOD || "\n" || path || "\n" || sha256(body) || "\n" || timestamp || "\n" || serviceId || "\n" || tenantId`)

  parameters:
    XTenantId:
      name: X-Tenant-Id
      in: header
      required: true
      schema: { type: "string", format: "uuid" }
    XTimestamp:
      name: X-Timestamp
      in: header
      required: true
      schema: { type: "integer", description: "Unix seconds" }
    XSignature:
      name: X-Signature
      in: header
      required: true
      schema: { type: "string", description: "Hex-encoded HMAC-SHA256" }
    XServiceId:
      name: X-Service-Id
      in: header
      required: true
      schema: { type: "string", enum: ["hms-bff"] }

  schemas:
    HealthResponse:
      type: "object"
      required: ["status"]
      properties:
        status: { type: "string", enum: ["ok"] }
        uptimeSeconds: { type: "number" }

    Cfi:
      type: "object"
      required:
        - id
        - tenantId
        - opdInvoiceId
        - invoiceNo
        - patientId
        - patientName
        - doctorId
        - doctorName
        - counterId
        - counterName
        - amount
        - adjustment
        - payoutAmount
        - status
        - version
        - billingDate
        - createdAt
        - updatedAt
      properties:
        id: { type: "string", format: "uuid" }
        tenantId: { type: "string", format: "uuid" }
        opdInvoiceId: { type: "string", format: "uuid" }
        invoiceNo: { type: "string" }
        patientId: { type: "string", format: "uuid" }
        patientName: { type: "string" }
        doctorId: { type: "string", format: "uuid" }
        doctorName: { type: "string" }
        counterId: { type: "string", format: "uuid" }
        counterName: { type: "string" }
        amount: { type: "number", format: "double" }
        adjustment: { type: "number", format: "double" }
        payoutAmount: { type: "number", format: "double" }
        status: { type: "string", enum: ["UNPAID", "PAID", "VOID"] }
        version: { type: "integer" }
        billingDate: { type: "string", format: "date-time" }
        paidAt: { type: "string", format: "date-time", nullable: true }
        voidedAt: { type: "string", format: "date-time", nullable: true }
        createdAt: { type: "string", format: "date-time" }
        updatedAt: { type: "string", format: "date-time" }

    CfiListResponse:
      type: "object"
      required: ["items", "nextCursor"]
      properties:
        items:
          type: "array"
          items: { $ref: "#/components/schemas/Cfi" }
        nextCursor:
          type: "string"
          nullable: true
          description: Opaque cursor for the next page. Null when no more pages.

    CfiDetailResponse:
      allOf:
        - $ref: "#/components/schemas/Cfi"
        - type: "object"
          required: ["statusHistory", "adjustmentHistory"]
          properties:
            statusHistory:
              type: "array"
              items: { $ref: "#/components/schemas/CfiStatusChange" }
            adjustmentHistory:
              type: "array"
              items: { $ref: "#/components/schemas/CfiAdjustment" }

    CfiStatusChange:
      type: "object"
      required: ["id", "fromStatus", "toStatus", "changedAt", "changedById", "invoiceVersionAtChange"]
      properties:
        id: { type: "string", format: "uuid" }
        fromStatus: { type: "string", enum: ["UNPAID", "PAID", "VOID"], nullable: true }
        toStatus: { type: "string", enum: ["UNPAID", "PAID", "VOID"] }
        changedAt: { type: "string", format: "date-time" }
        changedById: { type: "string", format: "uuid" }
        reason: { type: "string", nullable: true }
        invoiceVersionAtChange: { type: "integer" }

    CfiAdjustment:
      type: "object"
      required: ["id", "previousAmount", "newAmount", "reason", "changedAt", "changedById", "invoiceVersionAtChange"]
      properties:
        id: { type: "string", format: "uuid" }
        previousAmount: { type: "number", format: "double" }
        newAmount: { type: "number", format: "double" }
        reason: { type: "string" }
        changedAt: { type: "string", format: "date-time" }
        changedById: { type: "string", format: "uuid" }
        invoiceVersionAtChange: { type: "integer" }

    CfiAggregatesResponse:
      type: "object"
      required: ["total", "byStatus"]
      properties:
        total:
          type: "object"
          required: ["count", "amount", "payoutAmount"]
          properties:
            count: { type: "integer" }
            amount: { type: "number", format: "double", description: "Sum of consultation fees" }
            payoutAmount: { type: "number", format: "double" }
        byStatus:
          type: "object"
          required: ["UNPAID", "PAID", "VOID"]
          properties:
            UNPAID:
              type: "object"
              properties:
                count: { type: "integer" }
                amount: { type: "number", format: "double" }
                payoutAmount: { type: "number", format: "double" }
            PAID:
              type: "object"
              properties:
                count: { type: "integer" }
                amount: { type: "number", format: "double" }
                payoutAmount: { type: "number", format: "double" }
            VOID:
              type: "object"
              properties:
                count: { type: "integer" }
                amount: { type: "number", format: "double" }
                payoutAmount: { type: "number", format: "double" }

    ErrorResponse:
      type: "object"
      required: ["code", "message"]
      properties:
        code: { type: "string" }
        message: { type: "string" }
        details: { type: "object", additionalProperties: true }

    ConflictResponse:
      type: "object"
      required: ["code", "message"]
      properties:
        code:
          type: "string"
          enum: ["VERSION_MISMATCH", "INVALID_TRANSITION", "ADJUSTMENT_LOCKED", "ADJUSTMENT_EXCEEDS_AMOUNT"]
        message: { type: "string" }
        currentVersion: { type: "integer", description: "For VERSION_MISMATCH" }
        currentStatus:
          type: "string"
          enum: ["UNPAID", "PAID", "VOID"]
          description: "For INVALID_TRANSITION or ADJUSTMENT_LOCKED"
        requestedStatus:
          type: "string"
          enum: ["UNPAID", "PAID", "VOID"]
          description: "For INVALID_TRANSITION"

  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: HMAC signature missing, invalid, expired, or replayed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: |
        CFI not found, OR the CFI belongs to a different tenant
        (the response is the same in both cases to avoid leaking existence).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
