      - in: query
        name: page
        schema: { type: integer, minimum: 1, default: 1 }
      - in: query
        name: limit
        schema: { type: integer, minimum: 0, default: 10 }
      - in: query
        name: memberCardId
        schema: { type: string, format: uuid }
      - in: query
        name: patientId
        schema: { type: string, format: uuid }
      - in: query
