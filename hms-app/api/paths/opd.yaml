# =============================================================================
# OPD OT request — list / by-id
# =============================================================================
#
# Backed by the `opdOTRequestService` singleton
# (no container — uses 3 private repos).

/api/opd-ot-request:
  get:
    operationId: getOPDOTRequests
    summary: OPD OT request list (paginated)
    description: |
      Authenticated query. Returns a paginated
      list of `OPDOTRequest` rows with the
      deep include tree. Service:
      `opdOTRequestService.getOPDOTRequests` →
      `OPDOTRequestRepository.getOPDOTRequests`.

      Search matches: `patient.name`,
      `patient.patientId`, `appointmentId`,
      `room.name`. Filters: `gender`,
      `buildingId`, `wardId`, `roomTypeId`,
      `urgentOrElective`, `status`, and
      `start/end` against `operationDate`.
    tags: [OPD]
    parameters:
      - in: query
        name: search
        schema: { type: string }
      - in: query
        name: page
        schema: { type: integer, minimum: 1, default: 1 }
      - in: query
        name: limit
        schema: { type: integer, minimum: 0, default: 10 }
      - in: query
        name: start
        schema: { type: string, format: date-time }
      - in: query
        name: end
        schema: { type: string, format: date-time }
      - in: query
        name: gender
        schema: { type: string, enum: [MALE, FEMALE, OTHER] }
      - in: query
        name: buildingId
        schema: { type: string, format: uuid }
      - in: query
        name: wardId
        schema: { type: string, format: uuid }
      - in: query
        name: roomTypeId
        schema: { type: string, format: uuid }
      - in: query
        name: urgentOrElective
        schema: { type: string, enum: [URGENT, ELECTIVE] }
      - in: query
        name: status
        schema: { type: string, enum: [REQUESTED, BOOKED, CONFIRMED, COMPLETED, CANCELLED, APPROVED] }
    responses:
      "200":
        description: OPD OT requests for the page.
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GetOPDOTRequestsResponse" }
      "401": { $ref: "#/components/responses/Unauthorized" }

/api/opd-ot-request/{id}:
  get:
    operationId: getOPDOTRequestById
    summary: OPD OT request by id
    description: |
      Authenticated query. Returns a single
      `OPDOTRequest` by id with the deep
      include tree. Service:
      `opdOTRequestService.findById` →
      `OPDOTRequestRepository.findById`.

      Returns `result: null` if not found (no
      HTTP 404).
    tags: [OPD]
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    responses:
      "200":
        description: OPD OT request (or `null`).
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GetOPDOTRequestByIdResponse" }
      "401": { $ref: "#/components/responses/Unauthorized" }

# =============================================================================
# OPD refund bill — list / by-id
# =============================================================================
#
# Backed by `OpdRefundService` (via
# `OpdRefundServiceContainer`).

/api/opd-refund-bills:
  get:
    operationId: getOPDRefundBills
    summary: OPD refund bill list (paginated)
    description: |
      Authenticated query. Returns a paginated
      list of `OpdRefundBill` rows. Service:
      `OpdRefundService.list` →
      `OpdRefundRepository.list`.

      Search matches: `refundBillInvoiceNo`,
      `opdBilling.invoiceNo`, and
      `opdBilling.patient.{name, phoneNo, patientId}`.
      Date filter against `dateTime`.
      `patientType` filter is special-cased:
      `OPD` filters to non-emergency OR walk-in
      bills; any other value filters to
      `EMERGENCY` patient type.
      `isCredit` is mapped to
      `opdBilling.isConsignment`.
    tags: [OPD]
    parameters:
      - in: query
        name: search
        schema: { type: string }
      - in: query
        name: page
        schema: { type: integer, minimum: 1, default: 1 }
      - in: query
        name: limit
        schema: { type: integer, minimum: 0, default: 10 }
      - in: query
        name: start
        schema: { type: string, format: date-time }
      - in: query
        name: end
        schema: { type: string, format: date-time }
      - in: query
        name: patientType
        schema: { type: string }
      - in: query
        name: billTypeId
        schema: { type: string, format: uuid }
      - in: query
        name: isCredit
        schema:
          type: boolean
          description: Coerced from string — `"true"` → `true`.
    responses:
      "200":
        description: OPD refund bills for the page.
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GetOPDRefundBillsResponse" }
      "401": { $ref: "#/components/responses/Unauthorized" }

/api/opd-refund-bills/{id}:
  get:
    operationId: getOPDRefundBillById
    summary: OPD refund bill by id
    description: |
      Authenticated query. Returns a single
      `OpdRefundBill` by id with the full
      include tree. Service:
      `OpdRefundService.view` →
      `OpdRefundRepository.view`.
    tags: [OPD]
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    responses:
      "200":
        description: OPD refund bill (or `null`).
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GetOPDRefundBillByIdResponse" }
      "401": { $ref: "#/components/responses/Unauthorized" }

# =============================================================================
# OPD refundable find — search / by-id
# =============================================================================
#
# Used by the refund form's "find a bill to
# refund" picker.

/api/opd-refund-bills/find-opd-billings:
  get:
    operationId: findOpdBillingsForRefund
    summary: Search OPD billings for refund
    description: |
      Authenticated query. Returns OPD billings
      matching the filter, each decorated with
      `refundCheck: { message, isRefundable }`.
      Service:
      `OpdRefundService.findOpdBillings` →
      `OpdBillingService.getOPDBillings` →
      `OpdRefundService.getOpdBillRefundStatus`
      (per-bill refundable check).

      Returns `{ opdBillings: [], totalCount: 0 }`
      when `query.search` is missing — the
      filter is required for any work to
      happen.

      The `refundCheck.message` may be one of:
        - `null` (refundable).
        - `"Cannot refund a credit bill!"`.
        - `"No refundable amount left!"`.
        - `"Can't refund cancelled bill!"`.
        - `"No refundable items found!"`.
        - `"No refundable items left!"`.

      Note: the response uses `messag: ""`
      (typo) alongside the `result` key.
    tags: [OPD]
    parameters:
      - in: query
        name: search
        schema: { type: string }
      - in: query
        name: page
        schema: { type: integer, minimum: 1, default: 1 }
      - in: query
        name: limit
        schema: { type: integer, minimum: 0, default: 10 }
      - in: query
        name: start
        schema: { type: string, format: date-time }
      - in: query
        name: end
        schema: { type: string, format: date-time }
      - in: query
        name: patientType
        schema: { type: string, enum: [OPD, IPD, EMERGENCY, LOCAL, FOREIGNER] }
      - in: query
        name: billTypeId
        schema: { type: string, format: uuid }
      - in: query
        name: paymentMethodId
        schema: { type: string, format: uuid }
      - in: query
        name: patientGroup
        schema: { type: string }
      - in: query
        name: doctorId
        schema: { type: string, format: uuid }
      - in: query
        name: storeId
        schema: { type: string, format: uuid }
      - in: query
        name: opdBillingPaymentStatus
        schema: { type: string }
      - in: query
        name: serviceId
        schema: { type: string, format: uuid }
      - in: query
        name: patientId
        schema: { type: string, format: uuid }
      - in: query
        name: memberCardTypeId
        schema: { type: string, format: uuid }
      - in: query
        name: isConsignment
        schema:
          type: boolean
          description: Coerced from string — `"true"` → `true`.
      - in: query
        name: isBuyMemberCard
        schema:
          type: boolean
          description: Coerced from string — `"true"` → `true`.
    responses:
      "200":
        description: OPD billings with refund-check status.
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GetOPDFindOpdBillingsResponse" }
      "401": { $ref: "#/components/responses/Unauthorized" }

/api/opd-refund-bills/find-opd-billings/{id}:
  get:
    operationId: findOpdBillingForRefundById
    summary: OPD bill + refundable items
    description: |
      Authenticated query. Returns the OPD
      billing for the given id, filtered to
      only the still-refundable services,
      procedures, and pharmacy items, plus the
      list of approved sale-returns. Service:
      `OpdRefundService.getOpdBillWithRefundables`
      →
      `OpdBillingService.getById` (decorated)
      + `OpdRefundService.excludeRefundedItemsFromOpdBill`.

      The OPD billing is filtered to
      services/procedures that are NOT already
      in any refund bill, AND are not cancelled,
      AND are marked cancellable.
    tags: [OPD]
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    responses:
      "200":
        description: OPD billing + refundable items.
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GetOPDFindOpdBillingByIdResponse" }
      "401": { $ref: "#/components/responses/Unauthorized" }

