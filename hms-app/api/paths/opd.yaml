# =============================================================================
# Package bill — room-types (standalone raw route)
# =============================================================================
#
# This is the only route in the OPD module
# that does NOT use any `*Handler` wrapper.
# It manually does `AuthService.getSession()`
# then `prisma.opdPackageBill.findMany` and
# returns the flattened room-types. No
# pagination, no decoration.

/api/package-bills/room-types:
  get:
    operationId: getPackageBillRoomTypes
    summary: Room types covered by a patient's package bills
    description: |
      Authenticated query. Returns the
      room-type / days / package-name tuples
      for all `OpdPackageBill` rows belonging
      to the given patient.

      **Non-standard route implementation**:
      manual `AuthService.getSession()` check,
      raw `prisma.opdPackageBill.findMany` with
      a deeply-nested `select`, no
      `*Handler` wrapper, no service layer.
      Returns a non-standard envelope:
      `{ roomTypes: [...] }` directly (no
      `success` / `result` / `error` /
      `message`).

      Returns 400 with
      `{ error: "patientId is required" }` when
      `patientId` is missing. Returns 500 with
      `{ error: "Internal server error" }` on
      any unhandled exception.
    tags: [OPD]
    parameters:
      - in: query
        name: patientId
        required: true
        schema: { type: string, format: uuid }
    responses:
      "200":
        description: Room types covered by the patient's package bills.
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GetPackageBillRoomTypesResponse" }
      "400":
        description: "`{ error: \"patientId is required\" }`"
      "401":
        description: "`{ error: \"Unauthorized\" }`"
      "500":
        description: "`{ error: \"Internal server error\" }`"

# =============================================================================
# Package bill — service-packages (member-card decorated)
# =============================================================================

/api/package-bills/service-packages:
  get:
    operationId: getPackageBillServicePackages
    summary: Service packages for package bill
    description: |
