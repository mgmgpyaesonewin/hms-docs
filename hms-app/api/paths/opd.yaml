      →
      `OpdPackageBillRepository.getPackageBills`.

      Search matches: `invoiceNo`, and
      `patient.{name, phoneNo, patientId}`. Filters:
      `patientType`, `billTypeId`,
      `paymentMethodId`, `patientGroup`,
      `storeId`, `patientId`. Date filter
      against `createdAt`. The repository
      skips the `storeId` filter when its value
      is the literal string `"null"`.
    tags: [OPD]
    parameters:
      - in: query
        name: search
        schema: { type: string }
      - in: query
        name: page
        schema: { type: integer, minimum: 1, default: 1 }
      - in: query
        name: limit
        schema: { type: integer, minimum: 0, default: 10 }
      - in: query
        name: start
        schema: { type: string, format: date-time }
      - in: query
        name: end
        schema: { type: string, format: date-time }
      - in: query
        name: patientType
        schema: { type: string, enum: [OPD, IPD, EMERGENCY, LOCAL, FOREIGNER] }
      - in: query
        name: billTypeId
        schema: { type: string, format: uuid }
      - in: query
        name: paymentMethodId
        schema: { type: string, format: uuid }
      - in: query
        name: patientGroup
        schema: { type: string }
      - in: query
        name: storeId
        schema: { type: string, format: uuid, description: "Skipped when value is the literal string `\"null\"`." }
      - in: query
        name: patientId
        schema: { type: string, format: uuid }
    responses:
      "200":
        description: Package bills for the page.
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GetPackageBillsResponse" }
