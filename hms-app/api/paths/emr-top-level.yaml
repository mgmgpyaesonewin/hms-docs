/api/emr/patient-vital-signs/{id}:
  get:
    operationId: getPatientVitalSignsTabData
    summary: Vital signs (merged across care settings)
    description: |
      Returns merged, deduped, sorted
      vital signs for a patient. Pulls
      from `IPDVitalSign`,
      `OPDEmrVitalSign`, and the ED
      counterpart. The service maps the
      `Decimal` DB columns
      (`systolicBloodPressure`,
      `weight`, `bodyTemperature`, etc.)
      to JS `number` and the `Date`
      columns to ISO strings via
      `Number(...)` + `Date.toISOString()`.
      Service: `PatientEmrService
      .getPatientVitalSignsTabData`.
    tags: [EMR]
    security:
      - cookieAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
      - $ref: ../schemas/common.yaml#/PaginationQuery
    responses:
      "200":
        description: |
          `{ success: true, result, message:
          "", error: null }`.
        content:
          application/json:
            schema:
              $ref: ../schemas/emr.yaml#/GetPatientVitalSignsTabResponse
      "401":
        description: No valid session.
        content:
          application/json:
            schema:
              $ref: ../schemas/common.yaml#/ErrorEnvelope

