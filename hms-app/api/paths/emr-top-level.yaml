        content:
          application/json:
            schema:
              $ref: ../schemas/common.yaml#/ErrorEnvelope

/api/emr/patient-treatment-procedures/{id}:
  get:
    operationId: getPatientTreatmentProcedureTabData
    summary: Treatment procedures (OT, HD, CATHLAB)
    description: |
      Returns merged treatment
      procedures for a patient — pulls
      from `OTRequest`, `HDRequest`,
      and `CathLabRequest` (with the
      `operationType` / `cathLabRequestCardiologist`
      relations populated). Each record
      carries a discriminated union
      with one of `otSummary`,
      `hdSummary`, `cathLabSummary`
      populated and the others `null`.
      Service: `PatientEmrService
      .getPatientTreatmentProcedureTabData`.

      Note: `recordedAt` is computed
      as `combineDateAndTime
      (operationDate, operationTime)`
      (or `hdDate`/`hdTime` for HD)
      — when both are present they're
      merged into a single `Date`; when
      only one is present that one is
      used. Falls back to `item.operationDate`
      when both are null.
    tags: [EMR]
    security:
      - cookieAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
      - $ref: ../schemas/common.yaml#/PaginationQuery
    responses:
      "200":
        description: |
          `{ success: true, result, message:
          "", error: null }`.
        content:
          application/json:
            schema:
              $ref: ../schemas/emr.yaml#/GetPatientTreatmentProceduresTabResponse
      "401":
        description: No valid session.
        content:
          application/json:
            schema:
              $ref: ../schemas/common.yaml#/ErrorEnvelope

/api/emr/patient-investigation/{id}:
  get:
    operationId: getPatientInvestigationTabData
    summary: Investigations (lab + imaging + endo)
    description: |
      Returns merged investigations for
      a patient. Pulls from
      `OPDEmrServiceRequest`,
      `EDEmrServiceRequest`,
      `IPDServiceRequest`, and
      `EndoRequest`. Each record has a
      `kind` discriminator
      (`"SERVICE_REQUEST" | "ENDO"`)
      and a `reportAction` object that
      points to the linked `labReport`,
      `imagingService`, or `endoReport`
      (or `null` if the upstream report
      is missing / not yet verified).
      Service: `PatientEmrService
      .getPatientInvestigationTabData`.
    tags: [EMR]
    security:
      - cookieAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
      - $ref: ../schemas/common.yaml#/PaginationQuery
    responses:
      "200":
        description: |
          `{ success: true, result, message:
          "", error: null }`.
        content:
          application/json:
            schema:
              $ref: ../schemas/emr.yaml#/GetPatientInvestigationTabResponse
      "401":
        description: No valid session.
        content:
          application/json:
            schema:
              $ref: ../schemas/common.yaml#/ErrorEnvelope

/api/emr/patient-discharge-summary/{id}:
  get:
    operationId: getPatientDischargeSummaryTabData
    summary: Discharge summaries (IPD)
    description: |
      Returns the discharge-summary
      records (one per IPD discharge
      event) for a patient. Sorts by
      `createdAt` (the intimation
      timestamp) desc, paginates in
      JS. Service: `PatientEmrService
      .getPatientDischargeSummaryTabData`.
    tags: [EMR]
    security:
      - cookieAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
      - $ref: ../schemas/common.yaml#/PaginationQuery
    responses:
      "200":
        description: |
          `{ success: true, result, message:
          "", error: null }`.
        content:
          application/json:
            schema:
              $ref: ../schemas/emr.yaml#/GetPatientDischargeSummaryTabResponse
      "401":
        description: No valid session.
        content:
          application/json:
            schema:
              $ref: ../schemas/common.yaml#/ErrorEnvelope

# =============================================================================
# Clinical-document activity log
# =============================================================================

/api/emr/clinical-documents/{id}/activities:
  get:
    operationId: getEmrClinicalDocumentActivities
    summary: Activity log for an EMR clinical document
    description: |
      Returns the activity-log entries
      for a single clinical-document
      record (the per-document
      create / update / delete trail).
      Service: `opd-emr.service` →
      `OPDEmrService.getEmrClinicalDocumentActivities`
      → `EmrClinicalDocumentRepository
      .getClinicalDocumentActivities`.

      **Note:** although the import
      line in `route.ts` says
      `edEmrService`, the underlying
      service is the same `OPDEmrService`
      instance — the `edEmrService`
      export from
      `@/app/(dashboard)/shared/emr/opd/service/opd-emr.service`
      is an `OPDEmrService` configured
      with `moduleType: "ED"`. The
      `getEmrClinicalDocumentActivities`
      method is module-agnostic, so
      both names are equivalent.
    tags: [EMR]
    security:
      - cookieAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
        description: Clinical-document id.
    responses:
      "200":
        description: |
          `{ success: true, result, message:
          "", error: null }`. Result is
          the list of activity-log rows.
        content:
          application/json:
            schema:
              $ref: ../schemas/emr.yaml#/GetEmrClinicalDocumentActivitiesResponse
      "401":
        description: No valid session.
        content:
          application/json:
            schema:
              $ref: ../schemas/common.yaml#/ErrorEnvelope
