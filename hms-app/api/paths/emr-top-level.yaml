# docs/paths/emr-top-level.yaml
# Top-level EMR REST surface. 9
# patient-centric read-only endpoints
# under `src/app/api/(emr)/emr/`. Each
# route takes a `patientId` path
# parameter and returns a single
# "tab" of merged EMR data across
# OPD, IPD, ED care settings.
#
# The data is assembled by
# `PatientEmrService` (`src/app/
# (dashboard)/shared/emr/services/
# patient-emr.service.ts`) which fans
# out to a single repository
# `PatientEmrRepository.getPatientEmrRawRecords`
# (etc.) to fetch raw records from
# each care setting, then merges +
# sorts + paginates them in JS.
#
# All 9 endpoints are GET-only, all
# use `enhancedApiHandler` with
# `auth: { required: true }` only —
# no RBAC. All 9 return
# `{ success: true, result, message:
# "", error: null }`.

# =============================================================================
# Patient profile (snapshot tab)
# =============================================================================

/api/emr/patient-profile/{id}:
  get:
    operationId: getPatientProfileTabData
    summary: Patient profile snapshot (latest across IPD/OPD/ED)
    description: |
      Returns a single "profile" snapshot
      for a patient: the latest vital
      sign across IPD, OPD, ED; the
      upcoming-or-latest appointment;
      the latest referral name; and
      the latest-visit timestamp.
      Service: `PatientEmrService
      .getPatientProfileTabData`
      → `PatientEmrRepository
      .getPatientProfileSnapshot`.

      Returns 404 (`AppError
      "Patient not found"`) when no
      `Patient` row exists for the
      supplied id.

      **Note:** `{id}` is a patient id,
      not an appointment / admission /
      EMR id. All sibling endpoints in
      this file also take a patient id
      as `{id}`.
    tags: [EMR]
    security:
      - cookieAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
        description: Patient id (UUID).
    responses:
      "200":
        description: |
          `{ success: true, result, message:
          "", error: null }`.
        content:
          application/json:
            schema:
              $ref: ../schemas/emr.yaml#/GetPatientProfileTabResponse
      "401":
        description: No valid session.
        content:
          application/json:
            schema:
              $ref: ../schemas/common.yaml#/ErrorEnvelope
      "404":
        description: Patient not found.
        content:
          application/json:
            schema:
              $ref: ../schemas/common.yaml#/ErrorEnvelope

# =============================================================================
# Tab data (paginated, date-range filtered)
# =============================================================================
#
# The following 7 routes share the
# same query schema
# `getPatientEmrTabQuerySchema` which
# is just `baseQuerySchema`
# (pagination + search + start/end).
# They all merge records across IPD /
# OPD / ED before paginating in JS.
# Each returns a `totalCount` plus
# the paginated array of records.

/api/emr/patient-doctor-notes/{id}:
  get:
    operationId: getPatientDoctorNotesTabData
    summary: Doctor notes (merged across care settings)
    description: |
      Returns merged, deduped, sorted
      doctor notes for a patient. Pulls
      from `IPDDoctorNote`, `OPDEmrDoctorNote`,
      and `EDEmrDoctorNote` (the latter
      two via the `OPDEMRDoctorNote`
      join). Service: `PatientEmrService
      .getPatientDoctorNotesTabData`.
    tags: [EMR]
    security:
      - cookieAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
      - $ref: ../schemas/common.yaml#/PaginationQuery
    responses:
      "200":
        description: |
          `{ success: true, result, message:
          "", error: null }`.
        content:
          application/json:
            schema:
              $ref: ../schemas/emr.yaml#/GetPatientDoctorNotesTabResponse
      "401":
        description: No valid session.
        content:
          application/json:
            schema:
              $ref: ../schemas/common.yaml#/ErrorEnvelope

