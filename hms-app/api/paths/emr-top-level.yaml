        name: id
        required: true
        schema: { type: string, format: uuid }
      - $ref: ../schemas/common.yaml#/PaginationQuery
    responses:
      "200":
        description: |
          `{ success: true, result, message:
          "", error: null }`.
        content:
          application/json:
            schema:
              $ref: ../schemas/emr.yaml#/GetPatientTreatmentPrescriptionsTabResponse
      "401":
