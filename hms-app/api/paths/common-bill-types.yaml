# docs/paths/common-bill-types.yaml
# REST endpoint: GET /api/bill-types
# Source: src/app/api/(common)/bill-types/route.ts
#
# Single read-only endpoint. The corresponding write
# operations (create / update) live on `BillTypeService`
# but are reached via server actions / tRPC — they are NOT
# exposed as REST routes here.

/api/bill-types:
  get:
    summary: List bill types (paginated, filterable)
    description: |
      Authenticated query. Returns a paginated list of
      bill types with the total row count.

      Response shape:
        ```
        { billTypes: BillType[]; totalCount: number }
        ```
      (Field named `billTypes`, **not** `data`.)

      Filters (from `getBillTypesSchema`):
        - `search` — case-insensitive substring match against
          `name`.
        - `module` — Prisma string-array contains filter
          (`where.modules = { has: query.module }`).
          Matches against the `modules` array, **not**
          `defaultModules`.
        - `start` / `end` — `createdAt` range.

      The repository orders by `createdAt: desc`.

      Note on auth: this route uses the simpler
      `apiHandler` wrapper, **not** `enhancedApiHandler`.
      Authentication is checked manually via `verifyApiAuth()`
      at the start of the handler — equivalent to
      `auth: { required: true }` in `enhancedApiHandler`,
      but bypasses the `auth.permissions` and
      `auth.assertStoreId` machinery entirely. The error
      envelope is the `apiHandler` default
      (`{ success: false, message: "Internal Server Error",
      result: null, error: <err msg> }`).

      Source:
      `src/app/api/(common)/bill-types/route.ts:12-27`.
    tags:
      - Common / Bill Types
    operationId: rest_common_bill_types_list
    security:
      - SessionAuth: []
    parameters:
      - $ref: ../schemas/common.yaml#/PaginationQueryParams
      - in: query
        name: module
        schema:
          type: string
        description: |
          Prisma string-array contains filter
          (`where.modules = { has: query.module }`).
    responses:
      "200":
        description: Paginated list of bill types.
        content:
          application/json:
            schema:
              $ref: ../schemas/common-bill-types.yaml#/GetBillTypesResponse
      "401":
        description: No valid session.
        content:
          application/json:
            schema:
              $ref: ../schemas/common.yaml#/ErrorEnvelope

# -----------------------------------------------------------------------------
# Security notes
# -----------------------------------------------------------------------------
x-security-notes: |
  - **No RBAC permissions** — auth is checked manually via
    `verifyApiAuth()` at the top of the handler; the route
    does not declare
    `auth: { required: true, permissions: [...] }`. Any
    authenticated user can list bill types. Consistent with
    the other single-endpoint common-lookup routes.
  - **Dead `params` declaration** — the handler signature
    is `(req, { params }: { params: Promise<{ id: number }> })`
    and the first line is `await params`, but the route
    file has no `[id]` segment. The `params` object is
    always empty `{}` and the `await` is a no-op. The
    `id: number` type is also wrong (the Prisma id is a
    UUID string). Looks like a copy-paste leftover from a
    sibling route. Not blocking.
  - **No `data` field on success** — the response envelope
    is `{ success: true, result, error: "" }` (no `message`
    field). This differs from `enhancedApiHandler` callers,
    which emit `{ success: true, result, message: "",
    error: null }` or similar. The `apiHandler` error path
    is `{ success: false, message: "Internal Server Error",
    result: null, error: <err> }`.
  - **`module` query param is a raw string** — the Zod
    schema accepts any string, with no enum validation.
    Malformed values will throw at the Prisma layer,
    surfaced as a generic 500.
  - **Write operations (create / update) are NOT exposed
    as REST routes** — they live on `BillTypeService` and
    are reached via server actions / tRPC (not part of
    this documentation set). This REST sub-area is
    read-only. Notably, there is no `delete` method on
    the service either — bill types are soft-managed and
    can have `defaultModules` reset to empty instead.
  - **Service-layer invariant on `defaultModules`**: the
    service enforces that at most one BillType has a
    given module in its `defaultModules` array (via
    `getDefaultBillTypeByModule`). This is enforced at
    the application layer only — the Prisma schema has
    no DB-level constraint preventing duplicates.
  - **Service-layer `getBillTypeById` /
    `getBillTypeByName` use `include: { createdBy: true,
    updatedBy: true }`** (the list endpoint uses
    `select: { id: true, fullName: true, username: true }`).
    The full-include helpers are used internally by
    `createBillType` / `updateBillType` for the
    duplicate-name check; the actual **return value** of
    `create` / `update` is a bare row from `prisma.create`
    / `prisma.update` (no `include`).
  - **`createBillType` and `updateBillType` both check
    for duplicate modules** — the create payload's
    `modules` array cannot contain the same module name
    twice. Same check on update. Returns 409 with a
    list of duplicates.
