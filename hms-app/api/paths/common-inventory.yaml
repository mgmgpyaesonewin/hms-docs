# -----------------------------------------------------------------------------
# Security notes
# -----------------------------------------------------------------------------
x-security-notes: |
  - **No RBAC permissions declared** on any
    of the 13 routes — all declare only
    `auth: { required: true }` (or
    `auth: { required: true, assertStoreId:
    true }` for the store-scoped ones), no
    `permissions` array. Any authenticated
    user can read stock info, batch qty,
    stock movements, stock requests, etc.
  - **Six routes use `assertStoreId: true`**
    (or manual `verifyApiAuth()` with
    `storeId` check):
      - `stock-adjustment`
      - `stock-movements`
      - `stock-movements/summary/[itemId]`
      - `stock-requests`
      - `stock-requests/target-store-stock`
      - `stock-movements` itself
    These throw 401 if the session has no
    `storeId`. This is the multi-tenant
    boundary for the stock domain.
  - **The `total-stock-qty` route is a bare
    `async function GET(req)`** — not
    wrapped in `apiHandler` /
    `enhancedApiHandler`. It manually calls
    `verifyApiAuth()` and `validateSearchParams`.
    See [[common-auth]] (heartbeat / resume
    session) for the same pattern.
  - **`itemId` is not consistently typed
    across routes**:
      - `all-stocks-count` —
        `z.string().uuid().nonempty()`.
      - `unique-batches` — `z.string()`
        (no UUID validation).
      - `stock-highest-purchased-price` —
        `z.string().nonempty().uuid()`.
      - `target-store-stock` —
        `z.string()` (no UUID validation).
  - **`getUniqueBatches` is silently
    misnamed** — the repository's
    `getUniqueBatches(itemId)` returns
    stock rows (not just batches). The
    "unique" in the name likely refers to
    `distinct: ['batchId']` (or similar)
    on the Prisma query.
  - **`getAllStocksCount` throws 400 if
    `itemId` is falsy** — the service
    re-checks `if (!itemId)` (the Zod
    schema already requires
    `uuid().nonempty()`, so this is a
    redundant check, not a double-guard
    against bad input).
  - **`getHighestPurchasedPrice` returns
    `number | null`** — `null` when no
    stock exists for the item. The
    `Stock.pricePerUnit` column is
    `Decimal` in the Prisma model; the
    repository converts to `Number` for
    the response (lossy for very large
    values).
  - **`stock-adjustment`'s response key
    is `adjustments`, not `data`** —
    the `StockAdjustmentService.getStockAdjustments`
    returns the result of
    `repository.findAdjustments`, which
    has its own shape.
  - **The `batch-stock-qty` /
    `total-stock-qty` / `stocks` /
    `store-stocks` / `stock-info`
    endpoints all use `getStocksSchema` or
    related variants** — the shape is
    consistent (pagination +
    optional itemId / storeId / batchId
    filters). The `defaultQuerySchema`
    is used for `stock-adjustment`.
  - **`stock-movements/summary/[itemId]`
    has `date` default to `new Date()`**
    — `z.coerce.date().default(new Date())`.
    Coercion accepts ISO date strings,
    timestamps, etc. The aggregate is
    scoped to the caller's `storeId` and
    the given `date`.
  - **`stock-requests/target-store-stock`
    has the same 401 semantics as
    `stock-movements`** — `assertStoreId:
    true` throws if the session has no
    `storeId`. The query params are
    `storeId` (target store) and `itemId`
    (the item to look up stock for). The
    `storeId` query param is for the
    target store, NOT the caller's
    store — the route does not verify
    that the caller has access to the
    target store.
