# -----------------------------------------------------------------------------
# /api/inventory/stock-movements/summary/[itemId]
# -----------------------------------------------------------------------------
/api/inventory/stock-movements/summary/{itemId}:
  get:
    summary: Get summarized stock movement for an item
    description: |
      Authenticated query. Returns a
      per-`StockMovementType` aggregate for the
      given `itemId` on a given `date`,
      scoped to the caller's `storeId`.

      Path parameters:
        - `itemId` — the item's primary key
          (UUID string).

      Query parameters:
        - `date` — date, defaults to
          `new Date()`. `z.coerce.date().default(new Date())`.

      Response shape:
        ```
        { success: true, result: ... }
        ```
      No `message` / `error` fields on success.

      Source:
      `src/app/api/(common)/inventory/stock-movements/summary/[itemId]/route.ts:14-43`.
    tags:
      - Common / Inventory
    operationId: rest_common_inventory_stock_movements_summary
    security:
      - SessionAuth: []
    parameters:
      - in: path
        name: itemId
        required: true
        schema:
          type: string
          format: uuid
      - in: query
        name: date
        schema:
          type: string
          format: date-time
    responses:
      "200":
        description: Summarized stock movement for the given item.
        content:
          application/json:
            schema:
              $ref: ../schemas/common-inventory.yaml#/GetStockMovementsSummaryResponse
      "401":
        description: No valid session, or no `storeId` in session.
        content:
          application/json:
            schema:
              $ref: ../schemas/common.yaml#/ErrorEnvelope

