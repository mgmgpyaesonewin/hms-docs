# docs/paths/common-inventory.yaml
# REST endpoints (13 total — note: manifest says
# 10, the actual route count is 13):
#   GET /api/inventory/all-stocks-count
#   GET /api/inventory/batch-stock-qty
#   GET /api/inventory/stock-adjustment
#   GET /api/inventory/stock-highest-purchased-price
#   GET /api/inventory/stock-info
#   GET /api/inventory/stock-movements
#   GET /api/inventory/stock-movements/summary/[itemId]
#   GET /api/inventory/stock-requests
#   GET /api/inventory/stock-requests/target-store-stock
#   GET /api/inventory/stocks
#   GET /api/inventory/store-stocks
#   GET /api/inventory/total-stock-qty
#   GET /api/inventory/unique-batches
# Source: src/app/api/(common)/inventory/*/route.ts
#
# This REST sub-area is read-only. The write
# operations (create / update / delete) are reached
# via server actions or other routes (e.g. via the
# shared `pharmacy` services). The endpoints are
# small projections of the stock domain — most
# return aggregate counts / sums / distinct batches
# for use in pharmacy sale flows.

# -----------------------------------------------------------------------------
# /api/inventory/all-stocks-count
# -----------------------------------------------------------------------------
/api/inventory/all-stocks-count:
  get:
    summary: Get total stock qty for an item across all stores
    description: |
      Authenticated query. Returns the total
      stock quantity for the given `itemId`,
      aggregated across all stores.

      Query parameters:
        - `itemId` — required, UUID.
          `z.string().uuid().nonempty()`.

      Response shape:
        ```
        {
          success: true,
          result: { totalStockQty: number } | null,
          message: "",
          error: null
        }
        ```

      Source:
      `src/app/api/(common)/inventory/all-stocks-count/route.ts:7-31`.
    tags:
      - Common / Inventory
    operationId: rest_common_inventory_all_stocks_count
    security:
      - SessionAuth: []
    parameters:
      - in: query
        name: itemId
        required: true
        schema:
          type: string
          format: uuid
    responses:
      "200":
        description: |
          Total stock quantity across all stores
          for the given item.
        content:
          application/json:
            schema:
              $ref: ../schemas/common-inventory.yaml#/GetAllStocksCountResponse
      "400":
        description: `itemId` is missing or not a UUID.
        content:
          application/json:
            schema:
              $ref: ../schemas/common.yaml#/ErrorEnvelope
      "401":
        description: No valid session.
        content:
          application/json:
            schema:
              $ref: ../schemas/common.yaml#/ErrorEnvelope

