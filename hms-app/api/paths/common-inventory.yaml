# -----------------------------------------------------------------------------
# /api/inventory/stock-adjustment
# -----------------------------------------------------------------------------
/api/inventory/stock-adjustment:
  get:
    summary: List stock adjustments (paginated, scoped to current store)
    description: |
      Authenticated query. Returns a paginated
      list of stock adjustments, scoped to the
      caller's `storeId` (extracted from the
      session by `verifyApiAuth()` and required
      — the route throws 401 if `storeId` is
      missing).

      Response shape:
        ```
        {
          success: true,
          result: { adjustments: ..., totalCount: number } | ...,
          error: ""
        }
        ```
      No `message` field on success.

      The route uses `apiHandler` (bare) with
      manual `verifyApiAuth()` and `defaultQuerySchema`.

      Source:
      `src/app/api/(common)/inventory/stock-adjustment/route.ts:9-30`.
    tags:
      - Common / Inventory
    operationId: rest_common_inventory_stock_adjustment_list
    security:
      - SessionAuth: []
    parameters:
      - $ref: ../schemas/common.yaml#/PaginationQueryParams
    responses:
      "200":
        description: Paginated list of stock adjustments.
        content:
          application/json:
            schema:
              $ref: ../schemas/common-inventory.yaml#/GetStockAdjustmentResponse
      "401":
        description: No valid session, or no `storeId` in session.
        content:
          application/json:
            schema:
              $ref: ../schemas/common.yaml#/ErrorEnvelope

# -----------------------------------------------------------------------------
# /api/inventory/stock-highest-purchased-price
# -----------------------------------------------------------------------------
/api/inventory/stock-highest-purchased-price:
  get:
    summary: Get the highest purchased price for an item
    description: |
      Authenticated query. Returns the highest
      `pricePerUnit` across all stock rows for
      the given `itemId`.

      Query parameters:
        - `itemId` — required, UUID.
          `z.string().nonempty().uuid()`.

      Response shape:
        ```
        { success: true, result: number | null, error: "" }
        ```

      Source:
      `src/app/api/(common)/inventory/stock-highest-purchased-price/route.ts:13-31`.
    tags:
      - Common / Inventory
    operationId: rest_common_inventory_stock_highest_purchased_price
    security:
      - SessionAuth: []
    parameters:
      - in: query
        name: itemId
        required: true
        schema:
          type: string
          format: uuid
    responses:
      "200":
        description: Highest purchased price, or `null` if no stock exists.
        content:
          application/json:
            schema:
              $ref: ../schemas/common-inventory.yaml#/GetStockHighestPurchasedPriceResponse
      "401":
        description: No valid session.
        content:
          application/json:
            schema:
              $ref: ../schemas/common.yaml#/ErrorEnvelope

