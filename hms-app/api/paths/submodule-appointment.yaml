# docs/paths/submodule-appointment.yaml
# REST endpoint: GET /api/submodules/appointment/module-check
#
# Source: src/app/api/submodules/appointment/module-check/route.ts
#
# This is a "module provisioned" check for the appointment module
# (which is a private git submodule — see project memory at
# docs/manifest.yaml url_mapping note and CLAUDE.md). It verifies:
#   1. The env flag NEXT_PUBLIC_APPOINTMENT_MODULE_ENABLED is not "false".
#   2. The module's source directory
#      (`src/app/(dashboard)/appointment`) is not empty/missing.
#
# On any failure, returns HTTP 404 with a human-readable message in
# the standard `{ success, result, message }` envelope. Note: HTTP
# 404 is used as a generic "not available" status, NOT only for
# resource-not-found semantics.

/api/submodules/appointment/module-check:
  get:
    summary: Check that the appointment submodule is provisioned
    description: |
      Public probe (no auth required). Used by the dashboard to
      detect whether the private appointment submodule has been
      cloned and is enabled.

      The handler returns 200 with `{ success: true, ... }` only if
      **both** checks pass:
        1. `process.env.NEXT_PUBLIC_APPOINTMENT_MODULE_ENABLED` is
           not strictly equal to `"false"` (any other value —
           including undefined — is treated as "enabled" by the env
           string check).
        2. The filesystem directory
           `<cwd>/src/app/(dashboard)/appointment` exists and
           contains at least one file (or a non-empty sub-folder).
           This is checked by recursively walking the directory with
           `readDirRecursive` (src/lib/dir-utils.ts:17-35) and then
           checking every entry with `hasEmptyDir`
           (src/lib/dir-utils.ts:37-50), which returns `true` only
           if every entry is a folder whose children are themselves
           empty folders (a fully hollow tree).

      On any failure, returns HTTP 404 with the same envelope shape
      and a `message` describing the failure. Note that the
      filesystem walk is **synchronous** (`fs.readdirSync` /
      `fs.statSync`) and runs on the request thread — acceptable for
      a health probe but not for hot paths.

      Response envelope shape (both success and failure):
        ```
        { success: boolean; result: null; message: string }
        ```
      This is the project's standard REST response envelope. `result`
      is always `null` for this endpoint.

      Source: `src/app/api/submodules/appointment/module-check/route.ts:5-45`.
    tags:
      - Submodules
    operationId: submodule_appointment_module_check
    security: []
    responses:
      "200":
        description: |
          Module is enabled (env flag) **and** provisioned on disk
          (non-empty directory). Response uses the project standard
          REST envelope with `result: null`.
        content:
          application/json:
            schema:
              $ref: ../schemas/submodule-appointment.yaml#/ModuleCheckResponse
            examples:
              ok:
                summary: Module is enabled and provisioned
                value:
                  success: true
                  result: null
                  message: "Appointment Module exist"
      "404":
        description: |
          Module is **not** available. The `message` field
          distinguishes the failure mode:
            - "Appointment Module is not enabled" — env flag is
              explicitly disabled.
            - "Appointment directory is empty or missing" — env is
              enabled but the directory is hollow or absent (most
              often: the submodule is not initialised — see project
              memory `project_submodules.md`).
            - "Appointment Module not available" — fallback for
              non-`Error` thrown values (should not occur in
              practice; preserved for defensiveness).
        content:
          application/json:
            schema:
              $ref: ../schemas/submodule-appointment.yaml#/ModuleCheckResponse
            examples:
              disabled:
                summary: Env flag is "false"
                value:
                  success: false
                  result: null
                  message: "Appointment Module is not enabled"
              missing:
                summary: Submodule not initialised (hollow dir)
                value:
                  success: false
                  result: null
                  message: "Appointment directory is empty or missing"

# -----------------------------------------------------------------------------
# Security notes
# -----------------------------------------------------------------------------
x-security-notes: |
  - **No auth required** — this endpoint is publicly reachable. It
    leaks two pieces of information to an unauthenticated caller:
      1. Whether the appointment submodule has been initialised on
         the server (via the env flag and directory-walk).
      2. The filesystem path
         `src/app/(dashboard)/appointment` (hard-coded in the
         handler, but still disclosed implicitly by the endpoint's
         behaviour).
    The information disclosure is minor and consistent with other
    health/probe endpoints, but worth knowing if the deployment
    surfaces a public probe URL.
  - **HTTP 404 used as a generic "not available" status** — the
    handler returns 404 for every failure mode (env disabled, dir
    missing, fallback), not just for resource-not-found semantics.
    Clients should branch on `success` / `message`, not on the
    status code alone.
  - **Synchronous filesystem I/O on the request thread** — the
    handler uses `fs.readdirSync` / `fs.statSync` and runs the
    recursive walk on the event loop. This is acceptable for a
    rare health-probe call but would be a problem if hit
    frequently or on a large subtree.
  - **Env flag check is loose** — the condition
    `process.env.NEXT_PUBLIC_APPOINTMENT_MODULE_ENABLED === "false"`
    means that unset, empty, "0", "no", and any non-`"false"`
    value are all treated as "enabled". The flag is also exposed
    to the client (`NEXT_PUBLIC_*`), so the value ships in the
    browser bundle. The server-side check is what actually
    protects the endpoint.
  - **The endpoint itself does not import or use `authProcedure` /
    any session check** — it is genuinely public. The
    `appointment` *UI* module at `src/app/(dashboard)/appointment/`
    is a separate, auth-gated surface.
