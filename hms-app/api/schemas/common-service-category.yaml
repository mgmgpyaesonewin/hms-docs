# docs/schemas/common-service-category.yaml
# Schemas for the common-service-category sub-area of
# the `common` REST module. Single endpoint:
#   GET /api/service-category
# Source: src/app/api/(common)/service-category/route.ts

# =============================================================================
# Input schemas
# =============================================================================

GetServiceCategoryQuery:
  allOf:
    - $ref: ./common.yaml#/PaginationQuery
    - type: object
      description: |
        `enhancedApiHandler` `validation: { query:
        getServiceCategorySchema }`. The schema is
        `z.object({ categoryId, departmentId }).merge(
        baseQuerySchema).transform(transformPaginationSchema)`,
        so the post-transform shape is
        `{ page, limit, offset, search?, start?, end?,
        categoryId?, departmentId? }`.

        The repository's `findServiceCategory`
        **ignores** `categoryId` and `departmentId`
        (service-category-repository.ts:33-67) — they
        are accepted by the Zod schema but never
        wired into the `where` clause. The repository
        only honors `search` (case-insensitive
        substring on `name`), `start` / `end`
        (`createdAt` range, `gte` / `lte`). The
        `categoryId` and `departmentId` fields are
        silently dropped — see security notes.
      properties:
        categoryId:
          type: string
          description: |
            Accepted but **not used** by the
            repository. Silently dropped.
        departmentId:
          type: string
          description: |
            Accepted but **not used** by the
            repository. Silently dropped.

# =============================================================================
# Response schemas
# =============================================================================

GetServiceCategoryResponse:
  type: object
  description: |
    Response shape of `GET /api/service-category`. The
    repository returns
    `Promise<{ servicecategory: ServiceCategory[]; totalCount: number }>`
    (service-category-repository.ts:32-68) and the
    route wraps it in
    `{ success: true, result, error: "" }` — no
    `message` field on success.

    Note: the repository field is named
    `servicecategory` (no hyphen, no camel case
    boundary) — not `serviceCategories` and not
    `data`.
  required:
    - success
    - result
    - error
  properties:
    success:
      type: boolean
      enum: [true]
    result:
      type: object
      required: [servicecategory, totalCount]
      properties:
        servicecategory:
          type: array
          items:
            $ref: ./common-service-category.yaml#/ServiceCategory
        totalCount:
          type: integer
          minimum: 0

# =============================================================================
# Entity schemas
# =============================================================================

ServiceCategory:
  type: object
  description: |
    Canonical service-category shape. TS type
    `ServiceCategory` from
    `src/app/(dashboard)/shared/opd/types/service-category.types.ts:1-16`.

    Maps to the Prisma `ServiceCategory` model
    (prisma/schema.prisma, @@map("service_categories")).
    The list endpoint's repository uses a shared
    `serviceCategoryValidator` (a
    `Prisma.validator<Prisma.ServiceCategoryDefaultArgs>()`
    with `include: { createdBy: { select: { id,
    fullName, username } }, updatedBy: { select: { id,
    fullName, username } } }`) — i.e., the canonical
    3-field `Publisher` projection. The `findMany` and
    the `count` are executed in a single
    `prisma.$transaction` (rather than `Promise.all`).
  required:
    - id
    - name
    - createdBy
    - createdAt
    - updatedBy
    - updatedAt
  properties:
    id:
      type: string
      format: uuid
    name:
      type: string
      description: |
        `@unique` in the Prisma model (with a
        redundant `@@index([name])` — the unique
        constraint already provides an index).
    createdBy:
      $ref: ./common.yaml#/Publisher
    updatedBy:
      $ref: ./common.yaml#/Publisher
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time
