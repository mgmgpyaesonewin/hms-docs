GetOpdEmrPharmacyRequestsResponse:
  type: object
  description: |
    Response shape of
    `GET /api/opd-emr/pharmacy-request`.
    Paginates pharmacy requests
    filed from an OPD-EMR.
  required: [success, result, message, error]
  properties:
    success: { type: boolean, enum: [true] }
    result:
      type: object
      additionalProperties: true
    message: { type: string, example: "" }
    error:
      oneOf:
        - type: "null"

GetOpdEmrPharmacyRequestByIdResponse:
  type: object
  description: |
    Response shape of
    `GET /api/opd-emr/pharmacy-request/{id}`.
  required: [success, result, message, error]
  properties:
    success: { type: boolean, enum: [true] }
    result:
      type: object
      additionalProperties: true
    message: { type: string, example: "" }
    error:
      oneOf:
        - type: "null"

# =============================================================================
# IPD-EMR list & detail
# =============================================================================

GetIpdEmrListResponse:
  type: object
  description: |
    Response shape of the 3 IPD
    list endpoints:
      - `GET /api/ipd-emr`
      - `GET /api/cathlab-ipd-emr`
      - `GET /api/endo-ipd-emr`

    `result` is a list of `IPDEMR`
    rows projected via
    `ipdEmrValidator` (which
    includes the publisher
    projection, `admission.{id,
    admissionId}`,
    `patient.{id, name, patientId,
    dateofBirth, gender,
    patientType, patientGroup,
    guardianName}`, and
    `ipdEmrRequestLink` — a
    join-table).
  required: [success, result, message, error]
  properties:
    success: { type: boolean, enum: [true] }
    result:
      type: array
      items:
        $ref: ../schemas/emr.yaml#/IpdEmr
    message: { type: string, example: "" }
    error:
      oneOf:
        - type: "null"

GetIpdEmrByIdResponse:
  type: object
  description: |
    Response shape of the 3 IPD
    detail endpoints:
      - `GET /api/ipd-emr/{id}`
      - `GET /api/cathlab-ipd-emr/{id}`
      - `GET /api/endo-ipd-emr/{id}`

    `result` is the IPDEMR row
    matching the supplied id, or
    `null` if not found.
  required: [success, result, message, error]
  properties:
    success: { type: boolean, enum: [true] }
    result:
      oneOf:
        - $ref: ../schemas/emr.yaml#/IpdEmr
        - type: "null"
    message: { type: string, example: "" }
    error:
      oneOf:
        - type: "null"

IpdEmr:
  type: object
  description: |
    IPD / Cathlab / ENDO-EMR row
    (the `IPDEMR` Prisma model
    projected via
    `ipdEmrValidator`). The same
    row shape is used across all 3
    IPD list/detail endpoints. The
    `moduleType` (a sibling enum
    to `IPDEMRRequestType` —
    `"HD" | "OT" | "ENDO" |
    "ENDO_IPD" | "CATH_LAB"`)
    distinguishes the variant.
  required:
    - id
    - moduleType
    - admission
    - patient
    - createdAt
    - updatedAt
  properties:
    id: { type: string, format: uuid }
    moduleType:
      type: string
      enum: [HD, OT, ENDO, ENDO_IPD, CATH_LAB]
    admissionId: { type: string, format: uuid, nullable: true }
    patientId: { type: string, format: uuid }
    remark: { type: string, nullable: true }
    admission:
      type: object
      properties:
        id: { type: string, format: uuid }
        admissionId: { type: string, nullable: true }
    patient:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        patientId: { type: string, nullable: true }
        dateofBirth: { type: string, format: date-time, nullable: true }
        gender: { type: string, nullable: true }
        patientType: { type: string, nullable: true }
        patientGroup: { type: string, nullable: true }
        guardianName: { type: string, nullable: true }
    ipdEmrRequestLink:
      type: array
      items: {}
    createdBy:
      $ref: ../schemas/common.yaml#/Publisher
      nullable: true
    updatedBy:
      $ref: ../schemas/common.yaml#/Publisher
      nullable: true
    createdAt: { type: string, format: date-time }
    updatedAt: { type: string, format: date-time }
