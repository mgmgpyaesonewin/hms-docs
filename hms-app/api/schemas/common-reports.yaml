          additionalProperties: true
    message: { type: string, example: "" }
    error: { type: string, example: "" }

GRNItemReportRow:
  type: object
  description: |
    Row shape of
    `GET /api/reports/grn-item-reports`. Per
    `grnItemReportSchema`. Business data:
    purchase prices, qty, amounts.
  required:
    - grnId
    - grn
    - purchasingId
    - itemId
    - item
    - unit
    - purchasedPricePerUnit
    - qty
    - amount
    - status
  properties:
    grnId: { type: string }
    grn:
      type: object
      required: [id, date, status]
      properties:
        id: { type: string }
        grnId: { type: string }
        date: { type: string, format: date-time }
        status:
          type: string
          enum: [PENDING, APPROVED, REJECTED]
        purchaseOrder:
          type: object
          nullable: true
          properties:
            id: { type: string }
            purchaseOrderId: { type: string }
            totalAmount: { type: number }
            totalItemQty: { type: number }
        store:
          type: object
          nullable: true
          properties:
            id: { type: string }
            name: { type: string }
        supplier:
          type: object
          nullable: true
          properties:
            id: { type: string }
            companyName: { type: string }
    purchasingId: { type: string }
    itemId: { type: string }
    item:
      type: object
      required: [id, name, unit]
      properties:
        id: { type: string }
        itemId: { type: string }
        name: { type: string }
        supplier:
          type: object
          nullable: true
          properties:
            id: { type: string }
            companyName: { type: string }
        unit:
          type: object
          properties:
            id: { type: string }
            name: { type: string }
    unit: { type: string }
    purchasedPricePerUnit: { type: number, minimum: 0 }
    qty: { type: number, minimum: 0 }
    amount: { type: number, minimum: 0 }
    status:
      type: string
      enum: [PENDING, APPROVED, REJECTED]

