GetDoctorInfoResponse:
  type: object
  description: |
    Response shape of the doctor-info card
    endpoints
    (`/api/reports/appointments-by-doctor/{id}`,
    `/api/reports/referral-report/doctor/{id}/doctor-info`,
    `/api/reports/under-care-doctor/{id}`).
    `{ success: true, result, error: "",
    message: "" }` for the appointment one;
    `{ success: true, result, error: "" }` for
    the referral one; `{ success: true,
    result, error: "", message: "" }` for
    the under-care one. The result is the
    `Doctor` row from
    `getDoctorInfo(id)` (canonical Doctor
    type — id, doctorId, title,
    user.fullName, etc.).
  required: [success, result]
  properties:
    success: { type: boolean, enum: [true] }
    result:
      oneOf:
        - $ref: ../schemas/common-doctors.yaml#/Doctor
        - type: "null"
        - type: object
          additionalProperties: true
    error: { type: string }
    message: { type: string }

