    - totalAppointments
    - booked
    - confirmed
    - completed
    - cancelled
  properties:
    specialization: { type: string }
    totalAppointments: { type: number, minimum: 0 }
    booked: { type: number, minimum: 0 }
    confirmed: { type: number, minimum: 0 }
    completed: { type: number, minimum: 0 }
    cancelled: { type: number, minimum: 0 }

GetAppointmentsBySpecializationResponse:
  type: object
  description: |
    Response shape of
    `GET /api/reports/appointments-by-specialization`.
    `{ success: true, result, error: "" }`.
  required: [success, result, error]
  properties:
    success: { type: boolean, enum: [true] }
    result:
      oneOf:
        - type: array
          items:
            $ref: ../schemas/common-reports.yaml#/AppointmentsBySpecializationRow
        - type: object
          additionalProperties: true
    error: { type: string, example: "" }

FollowUpPatientRow:
  type: object
  description: |
    Row shape of
    `GET /api/reports/follow-up-patients`. Per
    `followUpPatientSchema`. PII: patientName,
    patientId, phoneNo, age.
  required:
    - appointmentDate
    - appointmentTime
    - patientName
    - patientId
    - age
    - gender
    - phoneNo
    - title
    - doctorName
    - doctorId
    - specialization
    - appointmentTypeId
    - appointmentTypeName
    - status
    - createdAt
    - createdByName
  properties:
    appointmentDate: { type: string, format: date-time }
    appointmentTime: { type: string, format: date-time }
    patientName: { type: string }
    patientId: { type: string }
    age:
      type: string
      format: date-time
      description: |
        **The schema declares
        `z.coerce.date()` for this field**, so
        the wire shape is a `Date` (or an
        ISO-8601 string), not a number.
        Misleading field name — this is a date
        type, not an age-in-years.
    gender:
      type: string
      enum: [MALE, FEMALE, OTHER]
    phoneNo: { type: string }
    title: { type: string }
    doctorName: { type: string }
    doctorId: { type: string }
    specialization: { type: string }
    appointmentTypeId: { type: string }
    appointmentTypeName: { type: string }
    status:
      type: string
      enum: [BOOKED, CONFIRMED, CANCELLED, COMPLETED]
    createdAt: { type: string, format: date-time }
    createdByName: { type: string }

GetFollowUpPatientsResponse:
  type: object
  description: |
