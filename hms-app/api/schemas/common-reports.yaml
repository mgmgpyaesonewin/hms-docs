  description: |
    Row shape of
    `GET /api/reports/appointments-by-specialization`.
    Per
    `appointmentsBySpecializationReportSchema`.
    The numeric fields are
    `z.coerce.number()` in the schema — the
    service may feed string aggregates from
    raw SQL.
  required:
