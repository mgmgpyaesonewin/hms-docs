# docs/schemas/common-reports.yaml
# Schemas for the common-reports sub-area of
# the `common` REST module. 47 endpoints across
# three path files (clinical, financial, misc).
# All endpoints are GET-only, all require an
# authenticated session, none declare explicit
# RBAC permissions. See the per-file notes for
# per-route details.

# =============================================================================
# Generic envelopes
# =============================================================================
#
# Most reports endpoints return a passthrough
# service result. The schema's exact field
# shape (array vs object, with or without a
# count) is not formally constrained by Zod
# in the repository — the Zod schemas in
# src/app/(dashboard)/common/reports/features/
# schemas/ define the *row* shape, not the
# *envelope*. The envelopes are documented
# per-endpoint in the path files.

GenericServiceResult:
  type: object
  description: |
    Common passthrough shape for report
    endpoints whose repository returns a
    service-specific object that the
    application does not formally type. The
    wire shape is whatever the service
    produces — typically
    `{ rows: [...], totalCount: number }` or
    a bare array.
  additionalProperties: true

# =============================================================================
# Clinical / appointment reports
# =============================================================================

AppointmentsByDoctorRow:
  type: object
  description: |
    Row shape of
    `GET /api/reports/appointments-by-doctor`
    (and `/export` uses a similar but
    per-appointment shape). Per
    `appointmentsByDoctorReportSchema`.
  required:
    - id
    - doctorId
    - doctorName
    - specialization
    - department
    - totalAppointments
    - booked
    - confirmed
    - completed
    - cancelled
  properties:
    id: { type: string }
    doctorId: { type: string }
    doctorName: { type: string }
    specialization: { type: string }
    department: { type: string }
    totalAppointments: { type: integer, minimum: 0 }
    booked: { type: integer, minimum: 0 }
    confirmed: { type: integer, minimum: 0 }
    completed: { type: integer, minimum: 0 }
    cancelled: { type: integer, minimum: 0 }

GetAppointmentsByDoctorResponse:
  type: object
  description: |
    Response shape of
    `GET /api/reports/appointments-by-doctor`.
    `{ success: true, result, error: "" }`.
  required: [success, result, error]
  properties:
    success: { type: boolean, enum: [true] }
    result:
      oneOf:
        - type: array
          items:
            $ref: ../schemas/common-reports.yaml#/AppointmentsByDoctorRow
        - type: object
          additionalProperties: true
    error: { type: string, example: "" }

AppointmentsByDoctorExportRow:
  type: object
  description: |
    Row shape of
    `GET /api/reports/appointments-by-doctor/export`.
    Per
    `appointmentsByDoctorReportExportSchema`.
    All fields nullable (the raw SQL joins
    can drop fields for cancelled
    appointments).
  properties:
    id: { type: string, nullable: true }
    doctorId: { type: string, nullable: true }
    doctorName: { type: string, nullable: true }
    patientId: { type: string, nullable: true }
    patientName: { type: string, nullable: true }
    township: { type: string, nullable: true }
    region: { type: string, nullable: true }
    appointmentType: { type: string, nullable: true }
    appointmentDate: { type: string, format: date-time, nullable: true }
    startTime: { type: string, format: date-time, nullable: true }
    status: { type: string, nullable: true }

