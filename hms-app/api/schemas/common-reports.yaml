PatientSummaryByTownshipRow:
  type: object
  description: |
    Row shape of
    `GET /api/reports/patient-summary`. Per
    `patientSummarySchema`. **The schema
    transform does not rename `patient_count`
    to `patientCount`** — the wire shape
    includes `patient_count` while every
    other field name happens to already be
    lowercase.
  required: [township]
  properties:
    township: { type: string, nullable: true }
    region: { type: string, nullable: true }
    patient_count:
      type: integer
      minimum: 0
      nullable: true
      description: |
        **Field name is `patient_count` on
        the wire** — the schema's
        `.transform` does not rename it
        (inconsistent with the other reports
        schemas in the same file).

