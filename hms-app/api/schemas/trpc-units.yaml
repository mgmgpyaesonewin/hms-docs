# docs/schemas/trpc-units.yaml
# Schemas for the tRPC `units` router
# (src/lib/trpc/routers/units.ts).

# =============================================================================
# Input schemas
# =============================================================================

CreateUnitInput:
  type: object
  description: |
    Input for `units.createUnit`. Zod schema `createUnitSchema` in
    `src/app/(dashboard)/common/set-up/units/features/schemas/create-unit-schema.ts:3-6`.
  required:
    - name
    - abbreviation
  properties:
    name:
      type: string
      minLength: 1
      description: Must be unique among units (case-insensitive contains-match).
    abbreviation:
      type: string
      minLength: 1
      description: Must be unique among units (case-insensitive equality).

UpdateUnitByIdInput:
  type: object
  description: |
    Input for `units.updateUnitById`. The router merges
    `updateUnitByIdSchema` with `validateIdSchema` at
    `src/lib/trpc/routers/units.ts:50`, giving an effective schema of
    `{ id, name, abbreviation }`.

    `updateUnitByIdSchema`
    (`src/app/(dashboard)/common/set-up/units/features/schemas/update-unit-schema.ts:3-6`):
    only `name` and `abbreviation`. `validateIdSchema` adds `id`.
  required:
    - id
    - name
    - abbreviation
  properties:
    id:
      type: string
      description: Unit id. No UUID validation at the router layer.
    name:
      type: string
      minLength: 1
      description: New name. Must be unique among other units when changed.
    abbreviation:
      type: string
      minLength: 1
      description: New abbreviation. Must be unique among other units when changed.

UnitIdInput:
  type: object
  description: |
    Input for `units.getUnitById` and `units.deleteUnitById`. Zod schema
    `validateIdSchema` in
    `src/app/(dashboard)/common/set-up/units/features/schemas/validate-unit-id-schema.ts:3-5`.
  required:
    - id
  properties:
    id:
      type: string
      description: Unit id. No UUID validation at the router layer.

# =============================================================================
# Response schemas
# =============================================================================

GetUnitsResponse:
  type: object
  description: |
    Response shape of `units.getUnits`. Repository signature
    (unit-repository.ts:28): `Promise<{ units: Unit[]; count: number }>`.

    Note the field name `units` (not `data`) — matches the
    `categories.getCategories` / `subCategories.getSubCategories`
    convention of using a domain-specific plural.
  required:
    - units
    - count
  properties:
    units:
      type: array
      items:
        $ref: ./trpc-units.yaml#/Unit
    count:
      type: integer
      minimum: 0

GetUnitTotalCountResponse:
  type: integer
  minimum: 0
  description: |
    Response shape of `units.getUnitTotalCount`. Bare integer
    (`prisma.unit.count()`), no filter.

DeleteUnitResponse:
  type: object
  description: |
    Response shape of `units.deleteUnitById`. The repository returns
    `void` (no returned row), so the router wraps the success in a
    static message envelope.
  required:
    - message
  properties:
    message:
      type: string
      example: "Unit deleted successfully!"

Unit:
  type: object
  description: |
    Canonical unit shape. TS type `Unit` from
    `src/app/(dashboard)/common/set-up/units/features/types/index.ts:1-19`.

    Maps to the Prisma `Unit` model. The repository populates
    `createdBy` / `updatedBy` on **every** read AND write method (all
    Prisma calls use `include: { createdBy: true, updatedBy: true }`),
    so the response of `createUnit`, `getUnits`, `getUnitById`, and
    `updateUnitById` is the full `Unit` shape. The only operation that
    does not return a `Unit` is `deleteUnitById` (returns `void` and
    is wrapped as `{ message }` at the router).
  required:
    - id
    - name
    - abbreviation
    - createdAt
    - updatedAt
    - createdById
    - createdBy
  properties:
    id:
      type: string
      format: uuid
    name:
      type: string
      description: Unique among units (case-insensitive contains-match, per repository lookup).
    abbreviation:
      type: string
      description: Unique among units (case-insensitive equality, per repository lookup).
    createdById:
      type: string
      format: uuid
      description: Always set. (Prisma column, non-nullable.)
    updatedById:
      type: string
      format: uuid
      nullable: true
      description: Prisma column, nullable. Set on updates; may be null on a freshly created record.
    createdBy:
      $ref: ./common.yaml#/Publisher
      description: |
        The repository includes `createdBy: true`, which expands to
        `select: { id, fullName, username }` (the full `User` row is
        returned, but only those three fields are declared in the TS
        `Unit` projection). See Publisher for the canonical shape.
    updatedBy:
      $ref: ./common.yaml#/Publisher
      nullable: true
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time
  x-runtime-populated-by: |
    `createdBy` and `updatedBy` are populated by **every** Prisma call
    in `unit-repository.ts` — all use
    `include: { createdBy: true, updatedBy: true }`. There is no
    Bare/Full split for this module.

    Source: `unit-repository.ts:17-20, 35-38, 69-72, 87-90, 106-110, 128-129`.
