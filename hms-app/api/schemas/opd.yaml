# docs/schemas/opd.yaml
# OpenAPI component schemas for the OPD REST
# surface (`src/app/api/(opd)/`).
#
# Backed by:
#   - `OpdBillingService` + `OpdBillingRepository`
#     (the central billing service, 16 fields of
#     decorated output via `getById` — proxy bill
#     merging, cancellable services, member-card
#     decoration, sale-return backfill, proxy
#     pharmacy items)
#   - `OpdRefundService` + `OpdRefundRepository`
#     (refund-bill list/detail + refundable
#     detection on `OPDBilling` rows)
#   - `OpdPackageBillService` + `OpdPackageBillRepository`
#     (package-bill list/detail + show)
#   - `OpdOTRequestService` (singleton, no
#     container — uses 3 private repos:
#     `OPDOTRequestRepository`,
#     `AppointmentService`,
#     `IPDOTRequestRepository`)
#   - `GetOpdEmrServicesByAppointmentQuery`
#     (one-off `Query<>` implementation — the
#     only OPD endpoint that uses the
#     contracts/Query pattern)
#   - `ProcedureService` / `MainProcedureService`
#     / `ServicePackageService` (CRUD on lookup
#     tables)
#
# The OPD module has the largest REST surface
# in the project (27 endpoints / 25 path files —
# the manifest listed 27 routes counting both
# list and by-id variants). Most responses share
# the **standard envelope**:
#   `{ success: true, result, error: "" | null, message: "" | null }`
# but a few deviations exist (see `notes` in
# `docs/manifest.yaml`):
#   - 1 endpoint uses `messag: ""` (typo) —
#     `find-opd-billings`.
#   - 1 endpoint (`room-types`) returns a
#     non-standard envelope (raw `NextResponse.json({ roomTypes })`).

# =============================================================================
# Procedure (lookup table)
# =============================================================================

GetProceduresResponse:
  type: object
  properties:
    success: { type: boolean, example: true }
    result:
      type: object
      properties:
        procedures:
          type: array
          items: { $ref: "#/Procedure" }
        totalCount: { type: integer }
    error: { type: string, nullable: true }
  required: [success, result, error]

Procedure:
  type: object
  description: |
    `Procedure` lookup row (department-scoped
    procedure catalogue). The OPD `procedures`
    list endpoint projects this with `createdBy` /
    `updatedBy` (id, fullName, username) and
    `department` (id, name) relations.

    Procedure IDs are auto-generated with the
    `PROID` prefix (zero-padded 5-digit counter,
    e.g. `PROID00001`).
  properties:
    id: { type: string, format: uuid }
    procedureId:
      type: string
      description: |
        Human-friendly id (e.g. `PROID00001`).
        Generated by `generateProcedureId` on
        create.
    name: { type: string }
    departmentId: { type: string, format: uuid }
    department:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
    localPrice:
      type: number
      minimum: 0
    foreignerPrice: { type: number, minimum: 0 }
    insurancePrice: { type: number, minimum: 0 }
    governmentPrice: { type: number, minimum: 0 }
    status:
      type: string
      enum: [ACTIVE, INACTIVE]
    createdBy:
      type: object
      properties:
        id: { type: string, format: uuid }
        fullName: { type: string }
        username: { type: string }
    updatedBy:
      type: object
      properties:
        id: { type: string, format: uuid }
        fullName: { type: string }
        username: { type: string }
    createdAt: { type: string, format: date-time }
    updatedAt: { type: string, format: date-time }

# =============================================================================
# Main procedure (lookup table)
# =============================================================================

GetMainProceduresResponse:
  type: object
  properties:
    success: { type: boolean, example: true }
    result:
      type: object
      properties:
        mainProcedures:
          type: array
          items: { $ref: "#/MainProcedure" }
        totalCount: { type: integer }
    error: { type: string, nullable: true }
  required: [success, result, error]

MainProcedure:
  type: object
  description: |
    `MainProcedure` lookup row. Groups
    `Procedure` rows into a higher-level category.
    The OPD `main-procedures` list endpoint projects
    this with `createdBy` / `updatedBy` (id,
    fullName, username).
  properties:
    id: { type: string, format: uuid }
    name: { type: string }
    status:
      type: string
      enum: [ACTIVE, INACTIVE]
    createdBy:
      type: object
      properties:
        id: { type: string, format: uuid }
        fullName: { type: string }
        username: { type: string }
    updatedBy:
      type: object
      properties:
        id: { type: string, format: uuid }
        fullName: { type: string }
        username: { type: string }
    createdAt: { type: string, format: date-time }
    updatedAt: { type: string, format: date-time }

MainProcedureMutationResponse:
  type: object
  description: |
    Generic mutation response for
    `POST /api/main-procedures`,
    `PUT /api/main-procedures`,
    `DELETE /api/main-procedures?id=...`.
    `result` is the created/updated `MainProcedure`
    row, or `{ success: true }` for delete.
  properties:
    success: { type: boolean, example: true }
    result: { $ref: "#/MainProcedure" }
    error: { type: string, nullable: true }
  required: [success, result, error]

# =============================================================================
# Service package
# =============================================================================

GetServicePackagesResponse:
  type: object
  properties:
    success: { type: boolean, example: true }
    result:
      type: object
      properties:
        servicePackage:
          type: array
          items: { $ref: "#/ServicePackage" }
        totalCount: { type: integer }
    error: { type: string, nullable: true }
  required: [success, result, error]

GetServicePackageByIdResponse:
  type: object
  properties:
    success: { type: boolean, example: true }
    result:
      oneOf:
        - $ref: "#/ServicePackage"
        - type: "null"
    error: { type: string, nullable: true }
  required: [success, result, error]

ServicePackage:
  type: object
  description: |
    `ServicePackage` is a pre-bundled group of
    services + procedures with a single price.
    Service-package IDs are auto-generated with
    the `SPID-` prefix (zero-padded 6-digit
    counter, e.g. `SPID-000001`).

    The list endpoint (`findServicePackage`)
    projects this with `createdBy` / `updatedBy`,
    `items[]` (service rows with `service`
    include), `servicePackageProcedures[]`, and
    `servicePackageRoomTypes[]`.

    The by-id endpoint projects items with the
    full `category` / `subCategory` / `department`
    include on each `service`.
  properties:
    id: { type: string, format: uuid }
    servicePackageId:
      type: string
      description: |
        Human-friendly id (e.g. `SPID-000001`).
        Generated by `generateServicePackageId`
        on create.
    name: { type: string }
    price: { $ref: "#/SubPriceSchema" }
    isActive: { type: boolean }
    items:
      type: array
      description: Per-included-service rows.
      items:
        type: object
        properties:
          id: { type: string, format: uuid }
          serviceId: { type: string, format: uuid }
          servicePackageId: { type: string, format: uuid }
          service:
            type: object
            description: |
              On the by-id endpoint this includes
              `category` / `subCategory` /
              `department`; on the list endpoint
              it's the bare row.
          createdAt: { type: string, format: date-time }
          updatedAt: { type: string, format: date-time }
    servicePackageProcedures:
      type: array
      items:
        type: object
        properties:
          id: { type: string, format: uuid }
          procedureId: { type: string, format: uuid }
          servicePackageId: { type: string, format: uuid }
    servicePackageRoomTypes:
      type: array
      items:
        type: object
        properties:
          id: { type: string, format: uuid }
          roomTypeId: { type: string, format: uuid }
          days: { type: integer }
          roomType:
            type: object
            nullable: true
            properties:
              id: { type: string, format: uuid }
              name: { type: string }
    createdBy:
      type: object
      properties:
        id: { type: string, format: uuid }
        fullName: { type: string }
        username: { type: string }
    updatedBy:
      type: object
      properties:
        id: { type: string, format: uuid }
        fullName: { type: string }
        username: { type: string }
    createdAt: { type: string, format: date-time }
    updatedAt: { type: string, format: date-time }

SubPriceSchema:
  type: object
  description: |
    4-tier service / service-package price
    (local / foreigner / insurance / government).
    On `ServicePackage.price` this is stored as
    JSON; the schema validates all 4 fields
    must be positive integers.
  properties:
    local: { type: number, minimum: 1 }
    foreigner: { type: number, minimum: 1 }
    insurance: { type: number, minimum: 1 }
    government: { type: number, minimum: 1 }
  required: [local, foreigner, insurance, government]

# =============================================================================
# OPD billing (the central entity)
# =============================================================================

GetOPDBillingsResponse:
  type: object
  properties:
    success: { type: boolean, example: true }
    result:
      type: object
      properties:
        opdBillings:
          type: array
          items: { $ref: "#/OPDBilling" }
        totalCount: { type: integer }
    error: { type: string }
    message: { type: string }
  required: [success, result, error, message]

GetOPDBillingByIdResponse:
  type: object
  description: |
    Returned by `/api/opd-billings/{id}` and
    `/api/opd-billings/{id}/details`. The `result`
    is the **fully decorated** `OPDBilling` (see
    `OPDBilling` schema description) — the service
    chains:
      1. `getById` (raw)
      2. `applyCancellableServices` (sets
         `OPDBillingService[].cancellable` based
         on lab / imaging / proxy state)
      3. `attachCancellableProcedures` (sets
         `opdBillingProcedures[].cancellable`
         based on proxy procedure-bill state)
      4. `attachMemberData` (decorates services
         with `memberCardTypeService` /
         `memberCardServiceUsage`)
      5. `backFillPharmacyItemsSaleReturn`
         (recomputes `remainingQty`)
      6. `backFillProxyPharmacyItems` (attaches
         `cancelRecord` from the proxy-bill
         pharmacy sale)
  properties:
    success: { type: boolean, example: true }
    result:
      oneOf:
        - $ref: "#/OPDBilling"
        - type: "null"
    message: { type: string, example: "" }
    error: { type: string, example: "" }
  required: [success, result, message, error]

OPDBilling:
  type: object
  description: |
    `OPDBilling` — the central billing record.
    The by-id response is **the most
    heavily-decorated object in the entire
    OpenAPI surface** (a single record can be
    several KB). The 6-stage decoration chain
    is documented in `GetOPDBillingByIdResponse`.
  properties:
    id: { type: string, format: uuid }
    invoiceNo: { type: string }
    date: { type: string, format: date-time }
    createdAt: { type: string, format: date-time }
    updatedAt: { type: string, format: date-time }
    patientId: { type: string, format: uuid, nullable: true }
    doctorId: { type: string, nullable: true }
    appointmentId: { type: string, format: uuid, nullable: true }
    appointment:
      type: object
      nullable: true
    pharmacySaleId: { type: string, format: uuid, nullable: true }
    storeId: { type: string, format: uuid, nullable: true }
    paymentMethodId: { type: string, format: uuid }
    totalAmount: { type: number, minimum: 0 }
    subtotal: { type: number, minimum: 0 }
    receivedAmount: { type: number, minimum: 0 }
    change: { type: number, minimum: 0 }
    isWalkIn: { type: boolean }
    isConsignment: { type: boolean }
    isBuyMemberCard: { type: boolean }
    invoiceRounding: { type: string, nullable: true }
    taxPercentage: { type: number, nullable: true }
    taxAmount: { type: number, nullable: true }
    discountPercentage: { type: number, nullable: true }
    discountAmount: { type: number, nullable: true }
    remark: { type: string, nullable: true }
    labRefNo: { type: string, nullable: true }
    displayFOCField: { type: boolean }
    departmentType: { type: string }
    opdBillingPaymentStatus:
      type: string
      enum: [PAID, UNPAID, CANCEL]
    patient:
      type: object
      nullable: true
      description: Slim patient projection.
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        patientId: { type: string }
        patientType: { type: string }
        patientGroup: { type: string }
        phoneNo: { type: string }
        guardianName: { type: string }
    billType:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
    paymentMethod:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
    store:
      type: object
      nullable: true
      properties:
        name: { type: string }
    doctor:
      type: object
      nullable: true
      properties:
        title: { type: string }
        user:
          type: object
          properties:
            fullName: { type: string }
    OPDBillingService:
      type: array
      description: |
        Per-line services on the bill. Each
        row is decorated with `cancellable`
        (boolean) and (when member-card data
        is present) `memberCardTypeService` /
        `memberCardServiceUsage`.
      items: { $ref: "#/OPDBillingServiceItem" }
    opdBillingProcedures:
      type: array
      nullable: true
      description: Per-line procedures (each `cancellable` boolean).
      items: { $ref: "#/OPDBillingProcedureItem" }
    OPDBillingPharmacySale:
      type: array
      items: { $ref: "#/OPDBillingPharmacySale" }
    servicePackages:
      type: array
      items: { $ref: "#/OPDBillingServicePackage" }
    opdBillingPaymentMethods:
      type: array
      items: { $ref: "#/OPDBillingPaymentMethod" }
    pharmacySale:
      type: object
      nullable: true
      properties:
        id: { type: string, format: uuid }
        invoiceNo: { type: string }
        totalAmount: { type: number, minimum: 0 }
        proxyBillId: { type: string, format: uuid, nullable: true }
        items:
          type: array
          items: { $ref: "#/SaleItem" }
    memberCard:
      type: object
      nullable: true
    memberCardId: { type: string, format: uuid, nullable: true }
    memberList:
      type: array
      description: Slim member-list rows (id, memberCardId, memberCardType id+name).
      items:
        type: object
        properties:
          id: { type: string, format: uuid }
          memberCardId: { type: string, format: uuid }
          memberCard:
            type: object
            properties:
              id: { type: string, format: uuid }
              memberCardId: { type: string }
              memberCardTypeId: { type: string, format: uuid }
              memberCardType:
                type: object
                properties:
                  id: { type: string, format: uuid }
                  name: { type: string }
                  validityYears: { type: integer, minimum: 1 }
                  maxMembers: { type: integer, minimum: 1 }
                  price: { type: number, minimum: 0 }
    opdBillingImagingAddOnPharmacyItems:
      type: array
      description: |
        Imaging-add-on pharmacy rows (when an
        imaging service has pharmacy items
        attached via the imaging add-on flow).
      items:
        type: object
    opdRefundBills:
      type: array
      items:
        type: object
        properties:
          id: { type: string, format: uuid }
    createdBy:
      type: object
      properties:
        id: { type: string, format: uuid }
        fullName: { type: string }
        username: { type: string }
    updatedBy:
      type: object
      properties:
        id: { type: string, format: uuid }
        fullName: { type: string }
        username: { type: string }
    cancelledBy:
      type: object
      nullable: true
      properties:
        id: { type: string, format: uuid }
        fullName: { type: string }
        username: { type: string }
    cancelledById: { type: string, format: uuid, nullable: true }
    cancelledRemark: { type: string, nullable: true }

OPDBillingServiceItem:
  type: object
  description: |
    Per-line OPD service. The `cancellable`
    boolean is **set by the service layer** based
    on lab / imaging / proxy state (not a database
    column).
  properties:
    id: { type: string, format: uuid }
    opdBillingId: { type: string, format: uuid }
    serviceId: { type: string, format: uuid }
    price: { type: number, minimum: 0 }
    priceType: { type: string }
    qty: { type: number, minimum: 0 }
    foc: { type: number, nullable: true }
    discountPercentage: { type: number, nullable: true }
    discountAmount: { type: number, nullable: true }
    amount: { type: number, minimum: 0 }
    isCancel: { type: boolean }
    cancellable: { type: boolean, nullable: true, description: Decorated by the service layer. }
    cancelRemark: { type: string, nullable: true }
    cancelledBy: { type: object, nullable: true }
    cancelledAt: { type: string, nullable: true }
    doctorId: { type: string, nullable: true }
    doctor:
      type: object
      nullable: true
      properties:
        doctorId: { type: string }
        specializationName: { type: string }
        title: { type: string }
        user: { type: object, properties: { fullName: { type: string } } }
    service:
      type: object
      properties:
        id: { type: string, format: uuid }
        serviceId: { type: string }
        name: { type: string }
        categoryId: { type: string, format: uuid }
        category: { type: object }
        isConsultationService: { type: boolean }
        includeInRegistration: { type: boolean }
    isTeamFee: { type: boolean }
    appointmentId: { type: string, nullable: true }
    source:
      type: string
      enum: [PRE_PAID, POST_PAID, MANUAL_ENTRY, APPOINTMENT, IMAGING_ADDON]
    externalSourceId: { type: string, nullable: true }
    isDiagnosicService: { type: boolean, nullable: true }
    memberCardTypeService: { type: object, nullable: true, description: Decorated in. }
    memberCardServiceUsage: { type: object, nullable: true, description: Decorated in. }
    referral: { type: object, nullable: true }

OPDBillingProcedureItem:
  type: object
  description: Per-line OPD procedure.
  properties:
    id: { type: string, format: uuid }
    opdBillingId: { type: string, format: uuid }
    procedureId: { type: string, format: uuid }
    procedure: { type: object }
    qty: { type: number, minimum: 0 }
    price: { type: number, minimum: 0 }
    discountPercentage: { type: number, nullable: true }
    discountAmount: { type: number, nullable: true }
    foc: { type: number, nullable: true }
    amount: { type: number, minimum: 0 }
    isCancel: { type: boolean, nullable: true }
    cancel_remark: { type: string, nullable: true }
    cancellable: { type: boolean, nullable: true, description: Decorated by the service layer. }
    doctorId: { type: string, nullable: true }
    doctor:
      type: object
      nullable: true
      properties:
        doctorId: { type: string }
        title: { type: string }
        specializationName: { type: string }
        user: { type: object, properties: { fullName: { type: string } } }

OPDBillingServicePackage:
  type: object
  description: Per-line service-package.
  properties:
    servicePackageId: { type: string, format: uuid }
    price: { type: number, minimum: 0 }
    discountAmount: { type: number, nullable: true }
    discountPercentage: { type: number, nullable: true }
    amount: { type: number, minimum: 0 }
    servicePackage:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        price: { $ref: "#/SubPriceSchema" }
        items:
          type: array
          items:
            type: object
            properties:
              id: { type: string, format: uuid }
              serviceId: { type: string, format: uuid }
              servicePackageId: { type: string, format: uuid }
              service: { type: object }

OPDBillingPaymentMethod:
  type: object
  properties:
    paymentMethodId: { type: string, format: uuid }
    receivedAmount: { type: number, minimum: 0 }
    paymentMethod:
      type: object
      properties:
        name: { type: string }

OPDBillingPharmacySale:
  type: object
  description: |
    Per-pharmacy-sale row on the OPD bill. Each
    row is decorated with the full `pharmacySale`
    (items, sale-returns, totals) and the
    bill-side `opdBillingPharmacySaleItems[]`.
  properties:
    id: { type: string, format: uuid }
    OPDBillingId: { type: string, format: uuid }
    pharmacySaleId: { type: string, format: uuid }
    OPDBilling:
      type: object
      properties:
        id: { type: string, format: uuid }
        invoiceNo: { type: string }
    pharmacySale:
      type: object
      properties:
        id: { type: string, format: uuid }
        invoiceNo: { type: string }
        totalAmount: { type: number, minimum: 0 }
        discountAmount: { type: number, nullable: true }
        discountPercentage: { type: number, nullable: true }
        invoiceRounding: { type: string, nullable: true }
        items:
          type: array
          items: { $ref: "#/SaleItem" }
        SaleReturn:
          type: array
          items: { $ref: "#/SaleReturn" }
    opdBillingPharmacySaleItems:
      type: array
      items: { $ref: "#/OpdBillingPharmacySaleItem" }
    isLinkedWithProxyBill: { type: boolean }

OpdBillingPharmacySaleItem:
  type: object
  description: Per-pharmacy-item row on the bill.
  properties:
    id: { type: string, format: uuid }
    opdBillingPharmacySaleId: { type: string, format: uuid }
    pharmacySaleItemId: { type: string }
    itemId: { type: string, format: uuid }
    stockId: { type: string, format: uuid }
    qty: { type: number, minimum: 0 }
    foc: { type: number, nullable: true }
    mrp: { type: number, minimum: 0 }
    amount: { type: number, minimum: 0 }
    isExcluded: { type: boolean }
    returnedQty: { type: number, nullable: true }
    remainingQty: { type: number, nullable: true }
    item:
      type: object
      properties:
        id: { type: string, format: uuid }
        itemId: { type: string }
        name: { type: string }
        generic: { type: string }
        allerygy: { type: string }
        unit:
          type: object
          properties:
            id: { type: string, format: uuid }
            name: { type: string }
            abbreviation: { type: string }
        category:
          type: object
          properties:
            id: { type: string, format: uuid }
            name: { type: string }
    stock:
      type: object
      properties:
        id: { type: string, format: uuid }
        batchId: { type: string }
        companyBatchNo: { type: string, nullable: true }
        itemBatchNo: { type: string, nullable: true }
        itemId: { type: string, format: uuid }
        expiredAt: { type: string }
        qty: { type: number, minimum: 0 }
    pharmacySaleItem: { type: object }
    cancelRecord:
      type: object
      nullable: true
      properties:
        isCancel: { type: boolean }
      description: |
        Pulled from the matching proxy-bill
        pharmacy-sale item by the
        `backFillProxyPharmacyItems` service
        step.

SaleItem:
  type: object
  description: |
    Pharmacy-sale item (raw row from the
    `PharmacySaleItem` table). The
    `backFillPharmacyItemsSaleReturn` step
    backfills `returnedQty` and `remainingQty`
    on this row based on approved sale-returns.
  properties:
    id: { type: string }
    qty: { type: number, minimum: 0 }
    focQty: { type: number, nullable: true }
    maximumRetailPrice: { type: number, minimum: 0 }
    amount: { type: number, minimum: 0 }
    snapshotStockQty: { type: number, nullable: true }
    stock:
      type: object
      properties:
        id: { type: string, format: uuid }
        expiredAt: { type: string, nullable: true }
        batchId: { type: string }
        companyBatchNo: { type: string, nullable: true }
        itemBatchNo: { type: string, nullable: true }
        qty: { type: number, minimum: 0 }
        item:
          type: object
          properties:
            id: { type: string, format: uuid }
            name: { type: string }
            itemId: { type: string }
            allergy: { type: string, nullable: true }
            unit: { type: object }
            category: { type: object }
            brandName: { type: string, nullable: true }
    returnedQty: { type: number, nullable: true }
