# Proxy bill by patient id (the catch-all in `(opd)`)
# =============================================================================

GetProxyBillByPatientIdResponse:
  type: object
  description: |
    Returned by
    `GET /api/proxybill-by-patientId/{id}`. The
    service returns ALL proxy bills for the
    given patient (no pagination, no filter)
    — full `ProxyBill[]`.

    Note: the route has a leftover
    `console.log("Patient Id route", id)`
    statement.
  properties:
    success: { type: boolean, example: true }
    result:
      type: array
      items: { $ref: "#/ProxyBill" }
    message: { type: string, example: "" }
    error: { type: string, example: "" }
  required: [success, result, message, error]

