# =============================================================================
# OPD refundable find (search + check)
# =============================================================================

GetOPDFindOpdBillingsResponse:
  type: object
  description: |
    Returned by
    `GET /api/opd-refund-bills/find-opd-billings`.
    The service calls
    `opdBillingService.getOPDBillings` then
    decorates each bill with `refundCheck`
    (computed by `getOpdBillRefundStatus`):
      - `{ message: null, isRefundable: true }`
        if bill can be refunded.
      - `{ message: "...", isRefundable: false }`
        with one of:
          - "Cannot refund a credit bill!"
          - "No refundable amount left!"
          - "Can't refund cancelled bill!"
          - "No refundable items found!"
          - "No refundable items left!"

    Note: the implementation has a typo in
    the response — `messag: ""` instead of
    `message: ""`. Both keys are present in
    the actual response body.
  properties:
    success: { type: boolean, example: true }
    result:
      type: object
      properties:
        opdBillings:
          type: array
          items:
            allOf:
              - $ref: "#/OPDBilling"
              - type: object
                properties:
                  refundCheck:
                    type: object
                    properties:
                      message: { type: string, nullable: true }
                      isRefundable: { type: boolean }
        totalCount: { type: integer }
    messag: { type: string, example: "", description: "Typo — present alongside `message` in the actual response." }
    error: { type: string, nullable: true }
  required: [success, result, messag, error]

GetOPDFindOpdBillingByIdResponse:
  type: object
  description: |
    Returned by
    `GET /api/opd-refund-bills/find-opd-billings/{id}`.
    The service returns
    `{ opdBill: OPDBilling, saleReturns: SaleReturn[] }`
    where the OPD bill is filtered to only
    show the still-refundable services,
    procedures, and pharmacy items (i.e. ones
    that are not cancelled, marked cancellable,
    AND not already in a refund bill).
  properties:
    success: { type: boolean, example: true }
    result:
      type: object
      properties:
        opdBill:
          oneOf:
            - $ref: "#/OPDBilling"
            - type: "null"
        saleReturns: { type: array, items: { $ref: "#/SaleReturn" } }
    message: { type: string, example: "" }
    error: { type: string, nullable: true }
  required: [success, result, message, error]

# =============================================================================
# OPD EMR services by appointment
# =============================================================================

GetOpdEmrServicesByAppointmentResponse:
  type: object
  description: |
    Returned by
    `GET /api/opd-emr-services-by-appointment`.
    The service:
      1. Loads the `OPDEMR` for the (appointment,
         patient) pair (throws 400 if not found).
      2. Loads the `OPDEMRService` rows and
         **splits** them into
         `imagingServices` and `labServices`
         based on which foreign key is set.
      3. Loads the `OPDEMRPharmacyRequest` rows
         into `pharmacyRequests`.

    Each `imagingServices` row includes the
    `ImagingService.addOn` (with pharmacy items,
    service items, procedure items) and the
    `ImagingService.status`. Each `labServices`
    row includes the `LabService` projection
